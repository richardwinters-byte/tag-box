function App(){

    const el=canvasRef.current;if(!el)return;

      if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinchRef.current={d,z:zm}}};

  },[rot.x,rot.y,zm]);

  // ── AI Upload Handler ──
  const handleAI=useCallback(async(e,type)=>{
    const file=e.target.files?.[0];if(!file)return;
    setAiLoading(true);setAiResult(null);
    try{const b64=await new Promise((r,j)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(",")[1]);rd.onerror=()=>j("fail");rd.readAsDataURL(file)});

        ?`Analyze this ${isPDF?"PDF":"image"} spec sheet for a box. Extract dimensions and box type. Respond ONLY with JSON: {"length_mm":number,"width_mm":number,"height_mm":number,"box_type":"FEFCO code","confidence":"high/medium/low","notes":"observations"}`
        :`Analyze this photo of a box. Identify FEFCO type and estimate dimensions in mm. Respond ONLY with JSON: {"box_type":"FEFCO code","length_mm":number,"width_mm":number,"height_mm":number,"material_guess":"type","confidence":"high/medium/low","notes":"observations"}`;
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[
          {type:isPDF?"document":"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:prompt}]}]})});
      const data=await resp.json();const txt=data.content?.find(c=>c.type==="text")?.text||"";
      const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());

      if(parsed.length_mm>0&&parsed.width_mm>0&&parsed.height_mm>0){
        setDims({L:Math.round(parsed.length_mm),W:Math.round(parsed.width_mm),H:Math.round(parsed.height_mm)});
        const mb=BOXES.find(b=>b.id===parsed.box_type);if(mb)setBoxId(mb.id)}
    }catch(err){setAiResult({error:err.toString()})}finally{setAiLoading(false);if(e.target)e.target.value=""}
  },[]);

  // ── Components ──
  const Dim=({label,k})=>(
    <div style={{background:T.c1,borderRadius:14,border:`1px solid ${T.bd}`,padding:"12px 16px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>

      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button onClick={()=>setDims(d=>({...d,[k]:Math.max(0,d[k]-5)}))}

        <input type="number" value={dims[k]} onChange={e=>setDims(d=>({...d,[k]:Math.max(0,parseFloat(e.target.value)||0)}))}
          style={{flex:1,background:"none",border:"none",color:T.tx,fontSize:28,fontWeight:800,textAlign:"center",outline:"none",fontFamily:"SF Mono,monospace"}}/>
        <button onClick={()=>setDims(d=>({...d,[k]:d[k]+5}))}
          style={{width:44,height:44,borderRadius:12,background:T.c2,border:`1px solid ${T.bd}`,color:T.ac,fontSize:22,fontWeight:700,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      </div>
    </div>
  );

  const Sheet=({title,children,onClose})=>(
    <div style={{position:"fixed",inset:0,zIndex:200}} onClick={onClose}>
      <div className="fade-anim" style={{position:"absolute",inset:0,background:"rgba(0,0,0,.6)"}}/>
      <div className="sheet-anim" onClick={e=>e.stopPropagation()} style={{position:"absolute",bottom:0,left:0,right:0,background:T.c1,borderRadius:"24px 24px 0 0",maxHeight:"80vh",display:"flex",flexDirection:"column",paddingBottom:`max(16px,env(safe-area-inset-bottom))`}}>
        <div style={{display:"flex",justifyContent:"center",padding:"10px 0 6px"}}><div style={{width:40,height:4,borderRadius:2,background:T.bd}}/></div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 20px 12px"}}>
          <span style={{fontWeight:800,fontSize:18,color:T.tx}}>{title}</span>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:16,background:T.c2,border:"none",color:T.t2,fontSize:15,fontWeight:700}}>✕</button>
        </div>
        <div style={{overflow:"auto",padding:"0 20px 16px",flex:1}}>{children}</div>
      </div>
    </div>
  );

  // ═══ RENDER ═══
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg,overflow:"hidden"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 6px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${T.ac},${T.ac2})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#000"}}>BX</div>
          <div><div style={{fontWeight:800,fontSize:16}}>{bt?.n||"TAG Box"}</div>
            <div style={{fontSize:11,color:T.t3}}>{mat?.n} · {L}×{W}×{H}mm</div></div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setDk(!dk)} style={{width:36,height:36,borderRadius:18,background:T.c2,border:"none",fontSize:17}}>{dk?"☀️":"🌙"}</button>
          <button onClick={()=>setSheet("export")} style={{height:36,padding:"0 16px",borderRadius:18,background:`linear-gradient(135deg,${T.ac},${T.ac2})`,border:"none",fontWeight:800,fontSize:13,color:"#000"}}>Export</button>
        </div>
      </div>

      {/* Quick cost bar */}
      {unitCost&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 16px",marginBottom:2}}>
        <div style={{display:"flex",gap:12}}>
          <span style={{fontSize:11,color:T.t3}}>Unit: <b style={{color:T.gn}}>${unitCost}</b></span>
          {bct&&<span style={{fontSize:11,color:T.t3}}>BCT: <b style={{color:T.gn}}>{bct.s}N</b></span>}
          <span style={{fontSize:11,color:T.t3}}>Segs: <b>{result?.segments.length||0}</b></span>
        </div>
        <button onClick={()=>setSheet("quote")} style={{fontSize:11,color:T.ac,background:"none",border:"none",fontWeight:700}}>Details →</button>
      </div>}

      {/* Content */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>

        {tab==="design"&&<div style={{flex:1,overflow:"auto",padding:"0 16px 16px",WebkitOverflowScrolling:"touch"}}>
          <Dim label="LENGTH" k="L"/><Dim label="WIDTH" k="W"/><Dim label="HEIGHT" k="H"/>
          <button onClick={resetDims} style={{width:"100%",padding:12,borderRadius:12,background:T.c2,border:`1px solid ${T.bd}`,color:T.t2,fontSize:13,fontWeight:600,marginBottom:16}}>↺ Reset Dimensions</button>
          {!valid.ok&&<div style={{padding:14,borderRadius:14,background:T.rd+"15",border:`1px solid ${T.rd}33`,marginBottom:12}}>
            {valid.e.map((e,i)=><div key={i} style={{color:T.rd,fontSize:13,fontWeight:600}}>✗ {e}</div>)}</div>}

          <div style={{fontWeight:800,fontSize:13,color:T.t3,marginBottom:6,letterSpacing:1}}>MATERIAL</div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:12,WebkitOverflowScrolling:"touch"}}>
            {MATS.map(m=><button key={m.id} onClick={()=>setMatId(m.id)} style={{flexShrink:0,padding:"10px 16px",borderRadius:12,background:matId===m.id?T.ac+"20":T.c1,border:`2px solid ${matId===m.id?T.ac:T.bd}`,minWidth:90}}>
              <div style={{fontWeight:700,fontSize:13,color:matId===m.id?T.ac:T.tx}}>{m.n}</div>
              <div style={{fontSize:11,color:T.t3,marginTop:2}}>{m.t}mm</div>
            </button>)}</div>

          <div style={{fontWeight:800,fontSize:13,color:T.t3,marginBottom:6,letterSpacing:1}}>BOX TYPE</div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:8,WebkitOverflowScrolling:"touch"}}>
            <button onClick={()=>setCatF(null)} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,background:!catF?T.ac:"transparent",border:`1px solid ${!catF?T.ac:T.bd}`,color:!catF?"#000":T.t2,fontSize:12,fontWeight:700}}>All</button>
            {CATS.map(c=><button key={c.id} onClick={()=>setCatF(catF===c.id?null:c.id)} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,background:catF===c.id?T.ac:"transparent",border:`1px solid ${catF===c.id?T.ac:T.bd}`,color:catF===c.id?"#000":T.t2,fontSize:12,fontWeight:600}}>{c.i} {c.n}</button>)}</div>
          {fBoxes.map(b=>{const sel=boxId===b.id;return <button key={b.id} onClick={()=>changeBox(b.id)}
            style={{display:"flex",alignItems:"center",gap:14,padding:16,borderRadius:16,background:sel?T.ac+"12":T.c1,border:`2px solid ${sel?T.ac:T.bd}`,width:"100%",marginBottom:8,textAlign:"left"}}>

            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15,color:sel?T.ac:T.tx}}>{b.n}</div>
              <div style={{fontSize:12,color:T.t3}}>{b.s} — {b.d}</div></div>
            {sel&&<div style={{width:28,height:28,borderRadius:14,background:T.ac,display:"flex",alignItems:"center",justifyContent:"center",color:"#000",fontWeight:900,fontSize:14}}>✓</div>}
          </button>})}
        </div>}

        {tab==="preview"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{display:"flex",gap:6,padding:"6px 16px",flexShrink:0}}>
            {[["2d","2D Dieline"],["3d","3D Interactive"]].map(([k,l])=><button key={k} onClick={()=>setPm(k)}
              style={{flex:1,padding:12,borderRadius:12,background:pm===k?T.ac:T.c2,border:"none",color:pm===k?"#000":T.t2,fontSize:15,fontWeight:700}}>{l}</button>)}</div>
          <div ref={canvasRef} style={{flex:1,overflow:"hidden",margin:"6px 12px 8px",borderRadius:16,border:`1px solid ${T.bd}`,position:"relative"}}>
            {!result?<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:T.t3}}>Fix dimensions to preview</div>
            :pm==="2d"?(()=>{const{segments:ss,width:ww,height:hh}=result;const p=10;const dm={cut:"none",fold:"6,3",crease:"8,3,2,3",glue:"3,3",perf:"2,4",tongue:"4,2",groove:"2,2,6,2"};const sw={cut:1.2,fold:.7,crease:.5,glue:.5,perf:.6,tongue:1,groove:.8};
              return <svg viewBox={`${-p} ${-p} ${ww+p*2} ${hh+p*2}`} style={{width:"100%",height:"100%",background:T.cv}}>
                <defs><pattern id="gr" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke={T.bd} strokeWidth=".15"/></pattern></defs>
                <rect x={-p*4} y={-p*4} width={(ww+p*2)*4} height={(hh+p*2)*4} fill="url(#gr)"/>
                {ss.map((s,i)=><line key={i} x1={s.x1} y1={hh-s.y1} x2={s.x2} y2={hh-s.y2} stroke={LC[s.type]} strokeWidth={sw[s.type]||.6} strokeDasharray={dm[s.type]} strokeLinecap="round"/>)}
                <text x={ww/2} y={hh+p-1} textAnchor="middle" fill={T.ac} fontSize="5" fontFamily="monospace">{ww.toFixed(0)}×{hh.toFixed(0)}mm</text></svg>})()
            :(()=>{const sc=Math.min(110/Math.max(L,W,H),.45)*zm,sl=L*sc,sw=W*sc,sh=H*sc,cx=200,cy=175;
              const cX=Math.cos(rot.x*Math.PI/180),sX=Math.sin(rot.x*Math.PI/180),cY=Math.cos(rot.y*Math.PI/180),sY=Math.sin(rot.y*Math.PI/180);
              const proj=(x,y,z)=>{const x1=x*cY-z*sY,z1=x*sY+z*cY,y1=y*cX-z1*sX,z2=y*sX+z1*cX;return{px:cx+x1*400/(400+z2),py:cy-y1*400/(400+z2),z:z2}};
              const V=[[-sl/2,-sh/2,-sw/2],[sl/2,-sh/2,-sw/2],[sl/2,sh/2,-sw/2],[-sl/2,sh/2,-sw/2],[-sl/2,-sh/2,sw/2],[sl/2,-sh/2,sw/2],[sl/2,sh/2,sw/2],[-sl/2,sh/2,sw/2]];
              const F=[[0,1,2,3],[5,4,7,6],[4,0,3,7],[1,5,6,2],[3,2,6,7],[4,5,1,0]];
              const pv=V.map(v=>proj(v[0],v[1],v[2]));
              const fd=F.map(f=>{const pts=f.map(vi=>pv[vi]);const v1={x:pts[1].px-pts[0].px,y:pts[1].py-pts[0].py};const v2={x:pts[3].px-pts[0].px,y:pts[3].py-pts[0].py};const cr=v1.x*v2.y-v1.y*v2.x;return{pts,avgZ:pts.reduce((s,p)=>s+p.z,0)/4,alpha:Math.min(.5,Math.abs(cr)/(Math.max(sl,sw,sh)*60+1)*.6+.05),cross:cr}}).sort((a,b)=>a.avgZ-b.avgZ);
              const E=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
              const mB=proj(0,-sh/2-18,0),mS=proj(sl/2+18,0,0),mL=proj(-sl/2-18,0,0);
              return <svg viewBox="0 0 400 350" style={{width:"100%",height:"100%",background:T.cv,touchAction:"none"}}>
                <rect width="400" height="350" fill={T.cv}/>
                <ellipse cx={cx} cy={cy+sh/2*zm+20} rx={sl*.6} ry={sw*.15} fill={T.ac} fillOpacity=".06"/>
                {fd.filter(f=>f.cross>0).map((f,i)=><polygon key={i} points={f.pts.map(p=>`${p.px},${p.py}`).join(" ")} fill={`rgba(245,158,11,${f.alpha.toFixed(2)})`} stroke={T.ac} strokeWidth=".8" strokeOpacity=".5"/>)}
                {E.map((e,i)=><line key={i} x1={pv[e[0]].px} y1={pv[e[0]].py} x2={pv[e[1]].px} y2={pv[e[1]].py} stroke={T.ac} strokeWidth="1.2" strokeOpacity=".65"/>)}
                <text x={mB.px} y={mB.py+14} textAnchor="middle" fill={T.t2} fontSize="13" fontFamily="monospace" fontWeight="800">{L}mm</text>
                <text x={mS.px+10} y={mS.py} fill={T.t2} fontSize="13" fontFamily="monospace" fontWeight="800">{H}mm</text>
                <text x={mL.px-10} y={mL.py} textAnchor="end" fill={T.t2} fontSize="13" fontFamily="monospace" fontWeight="800">{W}mm</text>
                <text x={200} y={338} textAnchor="middle" fill={T.t3} fontSize="11" fontFamily="monospace">Drag to orbit · Pinch to zoom · {(zm*100).toFixed(0)}%</text></svg>})()}
          </div>
          {result&&<div style={{display:"flex",gap:8,padding:"0 16px 6px",overflowX:"auto",flexShrink:0}}>
            {Object.entries(LC).filter(([t])=>segC[t]).map(([t,c])=><div key={t} style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
              <div style={{width:14,height:3,borderRadius:2,background:c}}/><span style={{fontSize:11,color:T.t3}}>{LL[t]} {segC[t]}</span></div>)}</div>}
        </div>}

        {tab==="specs"&&<div style={{flex:1,overflow:"auto",padding:"0 16px 16px"}}>
          <div style={{fontWeight:800,fontSize:20,color:T.ac,marginBottom:2}}>{bt?.n}</div>
          <div style={{fontSize:13,color:T.t2,marginBottom:16}}>{bt?.s} — {bt?.d}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            {[["L",`${L}mm`],["W",`${W}mm`],["H",`${H}mm`],["Vol",`${((L*W*H)/1e6).toFixed(2)}L`],["Mat",mat?.n],["T",`${mt}mm`]].map(([l,v])=>
              <div key={l} style={{padding:14,borderRadius:14,background:T.c1,border:`1px solid ${T.bd}`}}>
                <div style={{fontSize:11,color:T.t3,fontWeight:600}}>{l}</div><div style={{fontSize:17,fontWeight:800,fontFamily:"monospace",marginTop:3}}>{v}</div></div>)}</div>
          {result&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            {[["Sheet",`${result.width.toFixed(0)}×${result.height.toFixed(0)}`],["Segments",result.segments.length],
              ["Weight",`${(result.width*result.height/1e6*mat?.gsm).toFixed(0)}g`],["BCT",bct?`${bct.s}N`:"—"]].map(([l,v])=>
              <div key={l} style={{padding:14,borderRadius:14,background:T.c1,border:`1px solid ${T.bd}`}}>
                <div style={{fontSize:11,color:T.t3,fontWeight:600}}>{l}</div><div style={{fontSize:17,fontWeight:800,fontFamily:"monospace",color:T.gn,marginTop:3}}>{v}</div></div>)}</div>}
          {result&&<div style={{borderRadius:14,overflow:"hidden",border:`1px solid ${T.bd}`}}>
            {Object.entries(segC).map(([t,c],i)=><div key={t} style={{display:"flex",justifyContent:"space-between",padding:"12px 16px",background:i%2?T.c1:T.c2,borderBottom:`1px solid ${T.bd}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:16,height:4,borderRadius:2,background:LC[t]}}/><span style={{fontSize:13,color:T.t2}}>{LL[t]}</span></div>
              <span style={{fontSize:13,fontWeight:700,fontFamily:"monospace"}}>{c}</span></div>)}</div>}
        </div>}

        {tab==="more"&&<div style={{flex:1,overflow:"auto",padding:"0 16px 16px"}}>
          {/* AI Section */}
          <div style={{fontWeight:800,fontSize:13,color:T.pu,marginBottom:8,letterSpacing:1}}>🤖 AI TOOLS</div>
          <input ref={aiFileRef} type="file" accept=".pdf,.png,.jpg,.jpeg" onChange={e=>handleAI(e,"pdf")} style={{display:"none"}}/>
          <input ref={aiImgRef} type="file" accept="image/*" capture="environment" onChange={e=>handleAI(e,"img")} style={{display:"none"}}/>
          <button onClick={()=>aiFileRef.current?.click()} disabled={aiLoading}
            style={{width:"100%",padding:16,borderRadius:14,background:T.pu+"15",border:`2px solid ${T.pu}44`,marginBottom:8,textAlign:"left"}}>
            <div style={{fontWeight:700,fontSize:15,color:T.pu}}>{aiLoading?"⏳ Analyzing...":"📄 Upload Spec Sheet"}</div>
            <div style={{fontSize:12,color:T.t3,marginTop:2}}>PDF or image — AI extracts dimensions</div></button>
          <button onClick={()=>aiImgRef.current?.click()} disabled={aiLoading}
            style={{width:"100%",padding:16,borderRadius:14,background:T.pk+"15",border:`2px solid ${T.pk}44`,marginBottom:8,textAlign:"left"}}>
            <div style={{fontWeight:700,fontSize:15,color:T.pk}}>{aiLoading?"⏳ Classifying...":"📷 Photo a Box"}</div>
            <div style={{fontSize:12,color:T.t3,marginTop:2}}>Camera identifies type + estimates size</div></button>

          {aiResult&&!aiResult.error&&<div style={{padding:14,borderRadius:14,background:T.gn+"15",border:`2px solid ${T.gn}33`,marginBottom:12}}>
            <div style={{fontWeight:700,color:T.gn,marginBottom:6}}>✓ AI Result</div>
            {aiResult.box_type&&<div style={{fontSize:13,color:T.t2}}>Type: <b style={{color:T.ac}}>{aiResult.box_type}</b></div>}
            <div style={{fontSize:13,color:T.t2}}>Size: <b>{aiResult.length_mm}×{aiResult.width_mm}×{aiResult.height_mm}mm</b></div>
            {aiResult.confidence&&<div style={{fontSize:13,color:T.t2}}>Confidence: <b style={{color:aiResult.confidence==="high"?T.gn:T.ac}}>{aiResult.confidence}</b></div>}
            {aiResult.notes&&<div style={{fontSize:12,color:T.t3,marginTop:4}}>{aiResult.notes}</div>}
            <button onClick={()=>{if(aiResult.length_mm>0)setDims({L:Math.round(aiResult.length_mm),W:Math.round(aiResult.width_mm),H:Math.round(aiResult.height_mm)});setTab("design")}}
              style={{width:"100%",marginTop:8,padding:10,borderRadius:10,background:T.gn,border:"none",color:"#fff",fontWeight:700,fontSize:13}}>Apply & Go to Design</button>
          </div>}
          {aiResult?.error&&<div style={{padding:12,borderRadius:12,background:T.rd+"15",border:`1px solid ${T.rd}33`,marginBottom:12,color:T.rd,fontSize:13}}>Error: {aiResult.error}</div>}

          <div style={{fontWeight:800,fontSize:13,color:T.t3,marginBottom:8,marginTop:8,letterSpacing:1}}>SETTINGS</div>
          {[{i:"🎨",l:"Theme",d:dk?"Dark":"Light",f:()=>setDk(!dk)},
            {i:"💰",l:"Quote Details",d:unitCost?`$${unitCost}/unit`:"—",f:()=>setSheet("quote")},
            {i:"📐",l:"All Materials",d:`${MATS.length} options`,f:()=>setSheet("material")},
            {i:"📊",l:"Structural Data",d:bct?`BCT: ${bct.v}N`:"—",f:()=>setSheet("struct")},
          ].map(x=><button key={x.l} onClick={x.f} style={{display:"flex",alignItems:"center",gap:14,padding:16,borderRadius:16,background:T.c1,border:`1px solid ${T.bd}`,width:"100%",marginBottom:8,textAlign:"left"}}>
            <span style={{fontSize:22}}>{x.i}</span>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{x.l}</div><div style={{fontSize:12,color:T.t3}}>{x.d}</div></div>
            <span style={{color:T.t3,fontSize:20}}>›</span></button>)}
        </div>}
      </div>

      {/* Bottom Tab Bar */}
      <div style={{display:"flex",background:T.bar,borderTop:`1px solid ${T.bd}`,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",flexShrink:0,
        paddingBottom:`max(4px,env(safe-area-inset-bottom))`}}>
        {[{id:"design",i:"✏️",l:"Design"},{id:"preview",i:"👁",l:"Preview"},{id:"specs",i:"📋",l:"Specs"},{id:"more",i:"⚙️",l:"More"}].map(t=>
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"10px 0 6px",background:"none",border:"none",color:tab===t.id?T.ac:T.t3}}>

      </Sheet>}

      {sheet==="material"&&<Sheet title="Materials" onClose={()=>setSheet(null)}>
        {MATS.map(m=><button key={m.id} onClick={()=>{setMatId(m.id);setSheet(null)}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:16,borderRadius:14,background:matId===m.id?T.ac+"15":T.c2,border:`2px solid ${matId===m.id?T.ac:T.bd}`,width:"100%",marginBottom:8,textAlign:"left"}}>
          <div><div style={{fontWeight:700,fontSize:15,color:matId===m.id?T.ac:T.tx}}>{m.n}</div>
            <div style={{fontSize:12,color:T.t3}}>{m.d} · {m.t}mm · {m.gsm}gsm</div></div>
          {matId===m.id&&<span style={{color:T.ac,fontSize:20,fontWeight:900}}>✓</span>}
        </button>)}
      </Sheet>}

      {sheet==="quote"&&<Sheet title="Quick Quote" onClose={()=>setSheet(null)}>
        {result?<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[["Unit Cost",`$${unitCost}`],["Per 1,000",`$${(parseFloat(unitCost)*1000).toFixed(0)}`],
            ["Weight",`${(result.width*result.height/1e6*mat?.gsm).toFixed(0)}g`],["Sheet",`${(result.width*result.height/100).toFixed(0)}cm²`],
            ["Die Saved","$750/iter"],["Material",mat?.n]].map(([l,v])=>
            <div key={l} style={{padding:16,borderRadius:14,background:T.c2,textAlign:"center"}}>
              <div style={{fontSize:11,color:T.t3}}>{l}</div><div style={{fontSize:20,fontWeight:800,color:T.gn,fontFamily:"monospace",marginTop:4}}>{v}</div></div>)}
        </div>:<div style={{textAlign:"center",color:T.t3,padding:20}}>Generate a design first</div>}
      </Sheet>}

      {sheet==="struct"&&bct&&<Sheet title="Structural Analysis" onClose={()=>setSheet(null)}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          {[["BCT",`${bct.v}N`],["Safe Load",`${bct.s}N`],["ECT",`${mat?.ect}kN/m`],["Perimeter",`${(2*(L+W))}mm`]].map(([l,v])=>
            <div key={l} style={{padding:18,borderRadius:16,background:T.c2,textAlign:"center"}}>
              <div style={{fontSize:11,color:T.t3}}>{l}</div><div style={{fontSize:24,fontWeight:900,color:T.gn,fontFamily:"monospace",marginTop:4}}>{v}</div></div>)}
        </div>
        <div style={{padding:16,borderRadius:14,background:T.c2,fontSize:13,color:T.t2,lineHeight:1.8}}>
          <b>McKee Formula:</b> BCT = 5.87 × ECT × √(Z × P)<br/>
          ECT = {mat?.ect} kN/m · Z = {mt}mm · P = {2*(L+W)}mm</div>
      </Sheet>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
