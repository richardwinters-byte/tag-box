  $(a,0,y0,x0,y0,"cut");$(a,0,y1,x0,y1,"cut");$(a,0,y0,0,y1,"cut");$(a,x3,y0,tW,y0,"cut");$(a,x3,y1,tW,y1,"cut");$(a,tW,y0,tW,y1,"cut");

  const cx=(x1+x2)/2,lt=Math.min(L*.12,30),lh=Math.min(H*.3,15);

  $(a,x0,y1,x0,tH,"cut");$(a,x0,tH,x3,tH,"cut");$(a,x3,tH,x3,y1,"cut");$(a,x1,y1,x1,tH,"fold");$(a,x2,y1,x2,tH,"fold");$(a,x0,y1,x3,y1,"fold");
  $(a,cx-20,y1+(tH-y1)*.5,cx+20,y1+(tH-y1)*.5,"perf");return{segments:a,width:tW,height:tH+lh}}

function genBookWrap(L,W,H){const a=[];
  // Book wrap = cruciform. Wraps fold up the side (H) + across top (W/2) + overlap (15mm)
  const wrapD=H+Math.ceil(W/2)+15; // wrap panel depth each side
  const endD=H+15; // end flap depth
  const tW=wrapD+L+wrapD, tH=endD+W+endD;
  const x0=wrapD, x1=wrapD+L, y0=endD, y1=endD+W;
  // Main horizontal strip outer boundary
  $(a,0,y0,0,y1,"cut");$(a,0,y0,x0,y0,"cut");$(a,0,y1,x0,y1,"cut"); // left wrap
  $(a,x1,y0,tW,y0,"cut");$(a,x1,y1,tW,y1,"cut");$(a,tW,y0,tW,y1,"cut"); // right wrap
  // Base edge folds
  $(a,x0,y0,x0,y1,"fold");$(a,x1,y0,x1,y1,"fold");
  // Bottom end flap
  $(a,x0,y0,x0,0,"cut");$(a,x0,0,x1,0,"cut");$(a,x1,0,x1,y0,"cut");
  $(a,x0,y0,x1,y0,"fold"); // fold line at base edge
  // Top end flap
  $(a,x0,y1,x0,tH,"cut");$(a,x0,tH,x1,tH,"cut");$(a,x1,tH,x1,y1,"cut");
  $(a,x0,y1,x1,y1,"fold"); // fold line at base edge
  // Primary side fold-up lines (where wraps fold up to form box sides at height H)
  $(a,x0-H,y0,x0-H,y1,"fold"); // left side fold
  $(a,x1+H,y0,x1+H,y1,"fold"); // right side fold
  // Height-adjustment crease lines on wrap panels (every 5mm)
  for(let d=5;d<wrapD-3;d+=5){if(Math.abs(d-H)>2){$(a,x0-d,y0,x0-d,y1,"crease");$(a,x1+d,y0,x1+d,y1,"crease")}}
  // Height-adjustment creases on end flaps
  for(let d=5;d<endD-3;d+=5){$(a,x0,y0-d,x1,y0-d,"crease");$(a,x0,y1+d,x1,y1+d,"crease")}
  // Key fold at H on end flaps
  $(a,x0,y0-H,x1,y0-H,"fold");$(a,x0,y1+H,x1,y1+H,"fold");
  return{segments:a,width:tW,height:tH}}

function genRigidMail(L,W,H){const a=[];
  // Stay-flat rigid mailer: base + 4 flaps + adhesive strip
  const flapD=Math.max(25,Math.min(W/3,50));
  const tW=flapD+L+flapD, tH=flapD+W+flapD;

  $(a,0,y0+5,0,y1-5,"cut");$(a,0,y0+5,x0,y0,"cut");$(a,0,y1-5,x0,y1,"cut");$(a,x0,y0,x0,y1,"fold");
  // Right flap (tapered)
  $(a,tW,y0+5,tW,y1-5,"cut");$(a,x1,y0,tW,y0+5,"cut");$(a,x1,y1,tW,y1-5,"cut");$(a,x1,y0,x1,y1,"fold");
  // Bottom flap
  $(a,x0,y0,x0,0,"cut");$(a,x0,0,x1,0,"cut");$(a,x1,0,x1,y0,"cut");$(a,x0,y0,x1,y0,"fold");
  // Top flap (sealing flap with adhesive)
  $(a,x0,y1,x0,tH,"cut");$(a,x0,tH,x1,tH,"cut");$(a,x1,tH,x1,y1,"cut");$(a,x0,y1,x1,y1,"fold");
  $(a,x0+8,y1+flapD*.65,x1-8,y1+flapD*.65,"glue"); // adhesive strip
  $(a,x0+8,y1+flapD*.7,x1-8,y1+flapD*.7,"perf"); // peel strip perf

// Cake/Bakery Box — RSC-style with window cutout on one major panel
function genCakeBox(L,W,H,T){const a=[];
  const fD=W/2,yB=fD,yT=fD+H;
  const px=[0,GW,GW+W,GW+W+L,GW+W+L+W,GW+W+L+W+L];
  glueTab(a,yB,yT,H);
  for(let i=2;i<px.length;i++)$(a,px[i],yB,px[i],yT,i<px.length-1?"fold":"cut");
  // Standard RSC flaps
  [{x1:px[1],x2:px[2],mj:0},{x1:px[2],x2:px[3],mj:1},{x1:px[3],x2:px[4],mj:0},{x1:px[4],x2:px[5],mj:1}].forEach(p=>{
    const fd=fD,pw=p.x2-p.x1,e=!p.mj?Math.max(1,Math.min(4,pw*.015)):0;
    $(a,p.x1,yT,p.x2,yT,"fold");
    $(a,p.x1+e,yT,p.x1+e,yT+fd,"cut");if(e>0)$(a,p.x1,yT,p.x1+e,yT+e*.3,"cut");
    $(a,p.x1+e,yT+fd,p.x2-e,yT+fd,"cut");$(a,p.x2-e,yT+fd,p.x2-e,yT,"cut");
    if(e>0)$(a,p.x2-e,yT+e*.3,p.x2,yT,"cut");
    $(a,p.x1,yB,p.x2,yB,"fold");
    $(a,p.x1+e,yB,p.x1+e,yB-fd,"cut");if(e>0)$(a,p.x1,yB,p.x1+e,yB-e*.3,"cut");
    $(a,p.x1+e,yB-fd,p.x2-e,yB-fd,"cut");$(a,p.x2-e,yB-fd,p.x2-e,yB,"cut");
    if(e>0)$(a,p.x2-e,yB-e*.3,p.x2,yB,"cut");
  });
  // Window cutout on first L-panel (panel index 1, between px[2] and px[3])
  const winM=15; // margin from panel edges
  const wx1=px[2]+winM, wx2=px[3]-winM, wy1=yB+winM, wy2=yT-winM;
  if(wx2>wx1+20&&wy2>wy1+20){ // only if panel large enough
    // Rounded-corner rectangle cutout (perf lines so it can be punched out)
    const cr=Math.min(10,(wx2-wx1)*.08);
    $(a,wx1+cr,wy1,wx2-cr,wy1,"perf");$(a,wx2-cr,wy1,wx2,wy1+cr,"perf");
    $(a,wx2,wy1+cr,wx2,wy2-cr,"perf");$(a,wx2,wy2-cr,wx2-cr,wy2,"perf");
    $(a,wx2-cr,wy2,wx1+cr,wy2,"perf");$(a,wx1+cr,wy2,wx1,wy2-cr,"perf");
    $(a,wx1,wy2-cr,wx1,wy1+cr,"perf");$(a,wx1,wy1+cr,wx1+cr,wy1,"perf");
  }
  return{segments:a,width:px[5],height:fD+H+fD};}

function offsetSegs(segs,kerf){if(kerf<=0)return segs;const hk=kerf/2;
  return segs.map(s=>{if(s.type!=="cut")return s;const dx=s.x2-s.x1,dy=s.y2-s.y1,l=Math.sqrt(dx*dx+dy*dy);
    if(l===0)return s;const nx=-dy/l*hk,ny=dx/l*hk;return{...s,x1:s.x1+nx,y1:s.y1+ny,x2:s.x2+nx,y2:s.y2+ny,kerfOffset:hk}})}

function generate(id,L,W,H,T,blade){

    "0301":()=>genTelescope(L,W,H,T,.5),"0310":()=>genTelescope(L,W,H,T,.25),"0320":()=>genTelescope(L,W,H,T,.85),
    "0401":()=>genFolder(L,W,H),"0421":()=>genFourCorner(L,W,H),"0427":()=>genMailer(L,W,H),
    "0711":()=>genCrashLock(L,W,H,T,false),"0713":()=>genCrashLock(L,W,H,T,true),

    "TG_RSC":()=>genTGRSC(L,W,H,T),"TG_LOCK":()=>genTGLock(L,W,H,T),"TG_TRAY":()=>genTGTray(L,W,H,T),
    "TG_TELESCOPE":()=>genTGTelescope(L,W,H,T),"TG_SLEEVE":()=>genTGSleeve(L,W,H,T),
    "DISPLAY":()=>genDisplay(L,W,H),"PILLOW":()=>genPillow(L,W,H),"HEXAGON":()=>genHex(L,W,H),
    "PIZZA":()=>genPizza(L,W,H),"CAKEBOX":()=>genCakeBox(L,W,H,T)};
  let r=(m[id]||m["0201"])();

// Material-box compatibility
const MAT_COMPAT={PILLOW:["F","E","SBS","CCNB","CRB","KRAFT","WKRAFT"],HEXAGON:["F","E","B","SBS","CCNB","KRAFT","WKRAFT"],
  PIZZA:["B","C","E"],CAKEBOX:["E","B","SBS","CCNB","CRB"]};

function validate(id,L,W,H,T,matId){const e=[],w=[];const b=BOXES.find(x=>x.id===id);
  if(L<=0||W<=0||H<=0)e.push("Dims must be > 0");if(T<=0||T>12)e.push("T: 0.1–12mm");
  if(b){if(L<b.mL)e.push(`Min L: ${b.mL}mm`);if(W<b.mW)e.push(`Min W: ${b.mW}mm`);if(H<b.mH)e.push(`Min H: ${b.mH}mm`)}
  if(L>2500||W>2500)w.push("Very large — check sheet capacity");
  if(L>1800||W>1800)w.push("May exceed standard die-cutter (1800mm)");
  if(L/W>8||W/L>8)w.push("Extreme aspect ratio");
  if(H/Math.min(L,W)>5)w.push("Very tall box — consider reinforcement");
  // Material compatibility
  const compat=MAT_COMPAT[id];
  if(compat&&matId&&!compat.includes(matId)){const m=MATS.find(x=>x.id===matId);w.push(`${m?.name||matId} may not suit ${b?.name||id}`)}
  // Thick material on small box
  if(T>4&&Math.min(L,W)<100)w.push("Thick material on small box — check foldability");
  return{errors:e,warnings:w,valid:e.length===0}}

// BCT (McKee formula) & ECT
function calcBCT(L,W,H,mat){if(!mat)return null;
  const perimeter=2*(L+W);const ect=mat.ect;const Z=mat.t;
  const bct=5.87*ect*Math.sqrt(Z*perimeter);
  const safeLoad=bct*0.65; // 65% safety factor
  return{bct:bct.toFixed(0),safeLoad:safeLoad.toFixed(0),ect:ect.toFixed(1),stackHeight:Math.floor(safeLoad/50)}}

function calcQuote(result,mat,selFins,qty=1000){if(!result||!mat)return null;
  const area=(result.width*result.height)/1e6;
  const matCost=area*mat.cost;
  const finCost=selFins.reduce((s,fid)=>{const f=FINS.find(x=>x.id===fid);return s+(f?f.cpm*area*1000:0)},0);
  const dieCost=0; // eliminated by this tool!
  const unitCost=matCost+finCost/qty+0.02; // labor
  return{unitCost:unitCost.toFixed(3),per1k:(unitCost*qty).toFixed(0),matCost:matCost.toFixed(3),finCost:(finCost/qty).toFixed(3),
    weight:(area*mat.gsm).toFixed(0),sheetArea:(area*1e4).toFixed(0),qty}}

// CFF2 Export
function makeCFF2(r,blade,boxId,dims){let o="";const w=s=>{o+=s+"\n"};
  w("# CFF2 - Common File Format Version 2");w(`# Generated by TAG Box Converter V7`);
  w(`# Box: ${boxId} ${dims.L}x${dims.W}x${dims.H}mm`);w(`# Blade: ${blade.type} Kerf:${blade.kerf}mm Angle:${blade.angle}deg`);
  w("UNITS=MM");w(`DESIGN=${boxId}_${dims.L}x${dims.W}x${dims.H}`);w("");
  // Group by type, then chain connected segments into polylines
  const byType={};r.segments.forEach(s=>{if(!byType[s.type])byType[s.type]=[];byType[s.type].push(s)});
  Object.entries(byType).forEach(([type,segs])=>{
    w(`SECTION=${CFF2_LT[type]||1}`);w(`# ${LL[type]||type} (${segs.length} lines)`);
    // Chain connected segments: if seg[n].x2,y2 ≈ seg[n+1].x1,y1, they're one polyline
    const used=new Set();const eps=0.1;
    const chains=[];
    for(let i=0;i<segs.length;i++){
      if(used.has(i))continue;
      const chain=[segs[i]];used.add(i);
      let changed=true;
      while(changed){changed=false;
        const last=chain[chain.length-1];
        for(let j=0;j<segs.length;j++){
          if(used.has(j))continue;
          if(Math.abs(last.x2-segs[j].x1)<eps&&Math.abs(last.y2-segs[j].y1)<eps){
            chain.push(segs[j]);used.add(j);changed=true;break}}}
      chains.push(chain)}
    chains.forEach((ch,ci)=>{
      w(`POLYLINE=${ci+1}`);
      w(`${ch[0].x1.toFixed(3)},${ch[0].y1.toFixed(3)}`);
      ch.forEach(s=>w(`${s.x2.toFixed(3)},${s.y2.toFixed(3)}`));
      w("ENDPOLYLINE")});
    w("")});
  w("END");return o}

// PDF with crop marks, registration marks, bleed
function makePrintSVG(r){const{segments:sg,width:ww,height:hh}=r;const bl=5,mk=15,pad=mk+bl+10;
  const tW=ww+pad*2,tH=hh+pad*2;
  const dm={cut:"",fold:"6,4",crease:"8,3,2,3",glue:"3,3",perf:"2,4",tongue:"4,2",groove:"2,2,6,2"};
  let o=`<?xml version="1.0"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${tW}mm" height="${tH}mm" viewBox="0 0 ${tW} ${tH}">\n`;
  o+=`<rect width="100%" height="100%" fill="white"/>\n`;
  // Crop marks (corners)
  const cx=[pad-bl,pad+ww+bl],cy=[pad-bl,pad+hh+bl];
  cx.forEach(x=>cy.forEach(y=>{
    o+=`<line x1="${x-mk}" y1="${y}" x2="${x-3}" y2="${y}" stroke="black" stroke-width="0.3"/>\n`;
    o+=`<line x1="${x+3}" y1="${y}" x2="${x+mk}" y2="${y}" stroke="black" stroke-width="0.3"/>\n`;
    o+=`<line x1="${x}" y1="${y-mk}" x2="${x}" y2="${y-3}" stroke="black" stroke-width="0.3"/>\n`;
    o+=`<line x1="${x}" y1="${y+3}" x2="${x}" y2="${y+mk}" stroke="black" stroke-width="0.3"/>\n`}));
  // Registration marks (center of each edge)
  [[(cx[0]+cx[1])/2,cy[0]-mk-2],[(cx[0]+cx[1])/2,cy[1]+mk+2],[cx[0]-mk-2,(cy[0]+cy[1])/2],[cx[1]+mk+2,(cy[0]+cy[1])/2]].forEach(([rx,ry])=>{
    o+=`<circle cx="${rx}" cy="${ry}" r="4" fill="none" stroke="black" stroke-width="0.3"/>\n`;
    o+=`<line x1="${rx-5}" y1="${ry}" x2="${rx+5}" y2="${ry}" stroke="black" stroke-width="0.2"/>\n`;
    o+=`<line x1="${rx}" y1="${ry-5}" x2="${rx}" y2="${ry+5}" stroke="black" stroke-width="0.2"/>\n`});
  // Bleed box
  o+=`<rect x="${pad-bl}" y="${pad-bl}" width="${ww+bl*2}" height="${hh+bl*2}" fill="none" stroke="#ccc" stroke-width="0.2" stroke-dasharray="2,2"/>\n`;
  // Dieline
  sg.forEach(s=>{const ds=dm[s.type]?` stroke-dasharray="${dm[s.type]}"`:"";
    o+=`<line x1="${(s.x1+pad).toFixed(2)}" y1="${(hh+pad-s.y1).toFixed(2)}" x2="${(s.x2+pad).toFixed(2)}" y2="${(hh+pad-s.y2).toFixed(2)}" stroke="${LC[s.type]}" stroke-width="0.5"${ds}/>\n`});
  // Info block
  o+=`<text x="${pad}" y="${tH-3}" fill="#999" font-size="3" font-family="monospace">TAG Box Converter V7 | ${ww.toFixed(1)}x${hh.toFixed(1)}mm | Crop: 5mm bleed</text>\n`;
  return o+"</svg>"}

  const w=210,h=297,m=15;let y=m+5;const lines=[];
  const t=(x,yy,txt,sz=3,col="#1e293b",fw="normal",anc="start")=>{lines.push(`<text x="${x}" y="${yy}" font-size="${sz}" fill="${col}" font-weight="${fw}" font-family="Helvetica,sans-serif" text-anchor="${anc}">${txt}</text>`);};
  const hr=(yy)=>{lines.push(`<line x1="${m}" y1="${yy}" x2="${w-m}" y2="${yy}" stroke="#e2e8f0" stroke-width="0.3"/>`);};
  // Header
  t(m,y,"TAG BOX CONVERTER — SPECIFICATION SHEET",5,"#f59e0b","bold");y+=4;
  t(m,y,`Generated: ${new Date().toLocaleDateString()} · v7`,2.5,"#94a3b8");t(w-m,y,"CONFIDENTIAL",2.5,"#ef4444","bold","end");y+=5;hr(y);y+=5;
  // Box Info
  t(m,y,`${bt?.name||"Box"} — ${bt?.sub||""}`,4,"#0f172a","bold");y+=5;
  t(m,y,bt?.desc||"",2.8,"#475569");y+=6;
  // Dimensions
  t(m,y,"EXTERNAL DIMENSIONS",3,"#64748b","bold");y+=5;
  t(m,y,`Length: ${L.toFixed(1)}mm    Width: ${W.toFixed(1)}mm    Height: ${H.toFixed(1)}mm`,3,"#0f172a","bold");y+=4;
  t(m,y,`Internal: ${(L-T*2).toFixed(1)} × ${(W-T*2).toFixed(1)} × ${(H-T).toFixed(1)}mm (after ${T}mm material)`,2.5,"#475569");y+=4;
  t(m,y,`Volume: ${((L*W*H)/1e6).toFixed(3)}L    Surface Area: ${(2*(L*W+L*H+W*H)/100).toFixed(0)}cm²`,2.8,"#0f172a");y+=6;hr(y);y+=5;
  // Material
  t(m,y,"MATERIAL",3,"#64748b","bold");y+=5;
  t(m,y,`${mat?.name||"—"} · ${T}mm · ${mat?.gsm||0}gsm · ECT: ${mat?.ect||0} kN/m`,3,"#0f172a");y+=6;hr(y);y+=5;
  // Production
  if(result&&quote){t(m,y,"PRODUCTION METRICS",3,"#64748b","bold");y+=5;
    t(m,y,`Sheet: ${result.width.toFixed(0)}×${result.height.toFixed(0)}mm (${quote.sheetArea}cm²)    Weight: ${quote.weight}g    Segments: ${result.segments.length}`,2.8,"#0f172a");y+=4;
    t(m,y,`Unit Cost: $${quote.unitCost}    Per ${quote.qty?.toLocaleString()||"1,000"}: $${quote.per1k}`,2.8,"#16a34a","bold");y+=6;hr(y);y+=5;}
  // Structural
  if(bctData){t(m,y,"STRUCTURAL ANALYSIS (McKee)",3,"#64748b","bold");y+=5;
    t(m,y,`BCT: ${bctData.bct}N    Safe Load (65%): ${bctData.safeLoad}N    Stack Height: ~${bctData.stackHeight} boxes`,2.8,"#0f172a");y+=4;
    t(m,y,`Formula: BCT = 5.87 × ${bctData.ect} × √(${T} × ${(2*(L+W)).toFixed(0)})`,2.5,"#475569");y+=6;hr(y);y+=5;}
  // Segments
  if(segC){t(m,y,"SEGMENT BREAKDOWN",3,"#64748b","bold");y+=5;
    Object.entries(segC).forEach(([tp,cnt])=>{const len=segLens?.[tp]||0;
      t(m,y,`${(LL[tp]||tp).padEnd(12)} Count: ${cnt}    Length: ${(len/10).toFixed(0)}cm`,2.5,"#0f172a");y+=3.5;});y+=3;hr(y);y+=5;}
  // Blade
  t(m,y,"BLADE CONFIG",3,"#64748b","bold");y+=5;
  t(m,y,`Type: ${blade.type}    Kerf: ${blade.kerf}mm    Angle: ${blade.angle}°`,2.8,"#0f172a");y+=4;
  // Finishes
  if(selFins?.length>0){y+=2;t(m,y,"FINISHES",3,"#64748b","bold");y+=5;
    t(m,y,selFins.map(fid=>FINS.find(f=>f.id===fid)?.name||fid).join(", "),2.5,"#0f172a");y+=5;}
  return `<?xml version="1.0"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}">\n<rect width="100%" height="100%" fill="white"/>\n${lines.join("\n")}\n</svg>`;}

// Structural Report PDF
function makeStructPDF(bt,L,W,H,T,mat,bctData){
  const w=210,h=297,m=15;let y=m+5;const lines=[];
  const t=(x,yy,txt,sz=3,col="#1e293b",fw="normal")=>{lines.push(`<text x="${x}" y="${yy}" font-size="${sz}" fill="${col}" font-weight="${fw}" font-family="Helvetica,sans-serif">${txt}</text>`);};
  const hr=(yy)=>{lines.push(`<line x1="${m}" y1="${yy}" x2="${w-m}" y2="${yy}" stroke="#e2e8f0" stroke-width="0.3"/>`);};
  t(m,y,"TAG BOX CONVERTER — STRUCTURAL ANALYSIS REPORT",5,"#f59e0b","bold");y+=4;
  t(m,y,`${new Date().toLocaleDateString()} · v7`,2.5,"#94a3b8");y+=6;hr(y);y+=6;
  t(m,y,`${bt?.name||"Box"} — ${L.toFixed(0)}×${W.toFixed(0)}×${H.toFixed(0)}mm`,4,"#0f172a","bold");y+=5;
  t(m,y,`Material: ${mat?.name||"—"} · ${T}mm · ${mat?.gsm||0}gsm`,3,"#475569");y+=8;
  // BCT Analysis
  t(m,y,"BOX COMPRESSION TEST (BCT) — McKee Formula",3.5,"#0f172a","bold");y+=6;
  t(m,y,"BCT = 5.87 × ECT × √(Z × P)",3,"#2563eb","bold");y+=5;
  t(m,y,"Where:",2.8,"#475569");y+=4;
  t(m+5,y,`ECT = ${mat?.ect||0} kN/m (Edge Crush Test for ${mat?.name||"material"})`,2.8,"#0f172a");y+=4;
  t(m+5,y,`Z = ${T}mm (combined board caliper / thickness)`,2.8,"#0f172a");y+=4;
  t(m+5,y,`P = ${(2*(L+W)).toFixed(0)}mm (box perimeter = 2L + 2W = 2×${L.toFixed(0)} + 2×${W.toFixed(0)})`,2.8,"#0f172a");y+=6;
  if(bctData){
    t(m,y,`RESULT: BCT = ${bctData.bct} N`,4,"#16a34a","bold");y+=5;
    t(m,y,`Safe Working Load (65% safety factor): ${bctData.safeLoad} N`,3.5,"#16a34a","bold");y+=5;
    t(m,y,`Estimated Max Stack Height: ~${bctData.stackHeight} boxes (at 50N/box avg)`,3,"#0f172a");y+=8;hr(y);y+=6;
    // Derating factors
    t(m,y,"DERATING FACTORS",3.5,"#0f172a","bold");y+=5;
    const dr=[[">90% RH humidity","×0.50","Severe — use moisture barrier"],[">80% RH humidity","×0.65","Significant — PE or wax coating recommended"],
      ["60-80% RH humidity","×0.80","Moderate — standard storage"],["Pallet overhang >25mm","×0.70","Misaligned stacking"],
      ["Storage >30 days","×0.75","Long-term creep deformation"],["Dynamic load (transit)","×0.60","Vibration + shock"],
      ["Printing coverage >40%","×0.90","Ink weakens board fibers"]];
    dr.forEach(([cond,factor,note])=>{t(m,y,cond,2.5,"#0f172a","bold");t(m+55,y,factor,2.5,"#ef4444","bold");t(m+70,y,note,2.3,"#475569");y+=3.8;});
    y+=4;hr(y);y+=6;
    // Applied derating example
    const worstCase=parseFloat(bctData.safeLoad)*0.65*0.80;
    t(m,y,"WORST-CASE SCENARIO (humid storage + transit)",3,"#0f172a","bold");y+=5;
    t(m,y,`${bctData.safeLoad}N × 0.80 (humidity) × 0.65 (transit+time) = ${worstCase.toFixed(0)}N`,3,"#ef4444","bold");y+=5;
    t(m,y,`Stack height at worst case: ~${Math.floor(worstCase/50)} boxes`,3,"#0f172a");y+=8;hr(y);y+=6;
    // Additional metrics
    t(m,y,"ADDITIONAL STRUCTURAL METRICS",3.5,"#0f172a","bold");y+=5;
    const burst=(mat?.ect||0)*1.6*T;const flatCrush=(mat?.ect||0)*0.7;
    t(m,y,`Estimated Burst Strength: ~${burst.toFixed(0)} kPa`,2.8,"#0f172a");y+=4;
    t(m,y,`Flat Crush Resistance: ~${flatCrush.toFixed(1)} kN/m`,2.8,"#0f172a");y+=4;
    t(m,y,`Flute Direction: Parallel to Height (vertical) for maximum stacking strength`,2.8,"#0f172a");y+=4;
    t(m,y,`Board Perimeter: ${(2*(L+W)).toFixed(0)}mm · Board Area: ${(2*(L*W+L*H+W*H)/1e4).toFixed(2)}m²`,2.8,"#0f172a");
  }
  return `<?xml version="1.0"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}">\n<rect width="100%" height="100%" fill="white"/>\n${lines.join("\n")}\n</svg>`;}

async function saveDesign(name,data){try{localStorage.setItem("design:"+Date.now(),JSON.stringify({name,...data,ts:Date.now()}))}catch(e){console.error(e)}}
async function loadDesigns(){try{const d=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("design:")){try{d.push({key:k,...JSON.parse(localStorage.getItem(k))})}catch(e){}}}return d.sort((a,b)=>b.ts-a.ts)}catch(e){return[]}}
async function deleteDesign(key){try{localStorage.removeItem(key)}catch(e){}}

// ═══════════════════════════════════════════════════════════════
// 3D INTERACTIVE
// ═══════════════════════════════════════════════════════════════
function Interactive3D({L,W,H,T,boxId}){
  const ref=useRef(null);const[rot,setRot]=useState({x:-25,y:35});const[zm,setZm]=useState(1);
  const drag=useRef(null);const pinch=useRef(null);
  const rotRef=useRef(rot);rotRef.current=rot;
  const zmRef=useRef(zm);zmRef.current=zm;
  const onD=useCallback(e=>{e.preventDefault();drag.current={x:e.clientX,y:e.clientY,rx:rotRef.current.x,ry:rotRef.current.y}},[]);
  const onM=useCallback(e=>{if(!drag.current)return;setRot({x:drag.current.rx+(e.clientY-drag.current.y)*.4,y:drag.current.ry+(e.clientX-drag.current.x)*.4})},[]);
  const onU=useCallback(()=>{drag.current=null;pinch.current=null},[]);
  useEffect(()=>{const el=ref.current;if(!el)return;
    const onW=e=>{e.preventDefault();setZm(z=>Math.max(.3,Math.min(4,z-e.deltaY*.002)))};
    const onTS=e=>{if(e.touches.length===1){const t=e.touches[0];drag.current={x:t.clientX,y:t.clientY,rx:rotRef.current.x,ry:rotRef.current.y}}
      if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinch.current={d,z:zmRef.current}}};
    const onTM=e=>{e.preventDefault();
      if(e.touches.length===1&&drag.current){const t=e.touches[0];setRot({x:drag.current.rx+(t.clientY-drag.current.y)*.4,y:drag.current.ry+(t.clientX-drag.current.x)*.4})}
      if(e.touches.length===2&&pinch.current){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);setZm(Math.max(.3,Math.min(4,pinch.current.z*(d/pinch.current.d))))}};
    const onTE=()=>{drag.current=null;pinch.current=null};
    el.addEventListener("wheel",onW,{passive:false});el.addEventListener("touchstart",onTS,{passive:false});
    el.addEventListener("touchmove",onTM,{passive:false});el.addEventListener("touchend",onTE,{passive:true});
    return()=>{el.removeEventListener("wheel",onW);el.removeEventListener("touchstart",onTS);el.removeEventListener("touchmove",onTM);el.removeEventListener("touchend",onTE)}},[]);

  const sc=Math.min(110/Math.max(L,W,H),.45)*zm,sl=L*sc,sw=W*sc,sh=H*sc,cx=200,cy=175;
  const cX=Math.cos(rot.x*Math.PI/180),sX=Math.sin(rot.x*Math.PI/180),cY=Math.cos(rot.y*Math.PI/180),sY=Math.sin(rot.y*Math.PI/180);
  const proj=(x,y,z)=>{const x1=x*cY-z*sY,z1=x*sY+z*cY,y1=y*cX-z1*sX,z2=y*sX+z1*cX;return{px:cx+x1*400/(400+z2),py:cy-y1*400/(400+z2),z:z2}};

  // ── Box-type-specific 3D mesh generation ──
  const cat=BOXES.find(b=>b.id===boxId)?.cat||"slotted";
  const meshes=useMemo(()=>{
    const hl=sl/2,hw=sw/2,hh=sh/2;const parts=[];
    const P="rgba(245,158,11,",P2="rgba(217,119,6,",P3="rgba(180,100,6,";
    const box=(ox,oy,oz,bx,by,bz,col)=>({v:[[ox,oy,oz],[ox+bx,oy,oz],[ox+bx,oy+by,oz],[ox,oy+by,oz],[ox,oy,oz+bz],[ox+bx,oy,oz+bz],[ox+bx,oy+by,oz+bz],[ox,oy+by,oz+bz]],f:[[0,1,2,3],[5,4,7,6],[4,0,3,7],[1,5,6,2],[3,2,6,7],[4,5,1,0]],col});
    const openBox=(ox,oy,oz,bx,by,bz,col)=>({v:[[ox,oy,oz],[ox+bx,oy,oz],[ox+bx,oy+by,oz],[ox,oy+by,oz],[ox,oy,oz+bz],[ox+bx,oy,oz+bz],[ox+bx,oy+by,oz+bz],[ox,oy+by,oz+bz]],f:[[0,1,2,3],[5,4,7,6],[4,0,3,7],[1,5,6,2],[4,5,1,0]],col});
    const quad=(v,col)=>({v,f:[[0,1,2,3]],col});
    const id=boxId;
    // Closed RSC types (assembled = closed box)
    if(["0201","0202","0203","0204","0215","0216","0711"].includes(id)){parts.push(box(-hl,-hh,-hw,sl,sh,sw,P))}
    // Cake box: closed + window outline
    else if(id==="CAKEBOX"){parts.push(box(-hl,-hh,-hw,sl,sh,sw,P));const wm=hl*.3;parts.push(quad([[-hl+wm,-hh+hh*.3,-hw-.1],[hl-wm,-hh+hh*.3,-hw-.1],[hl-wm,hh-hh*.3,-hw-.1],[-hl+wm,hh-hh*.3,-hw-.1]],"rgba(100,100,100,"))}
    // HSC: open top
    else if(id==="0210"){parts.push(openBox(-hl,-hh,-hw,sl,sh,sw,P))}
    // Crash+Tuck: closed with small tuck hint
    else if(id==="0713"){parts.push(box(-hl,-hh,-hw,sl,sh,sw,P));parts.push(quad([[-hl*.5,hh,-hw],[hl*.5,hh,-hw],[hl*.5,hh+sh*.08,-hw-sh*.06],[-hl*.5,hh+sh*.08,-hw-sh*.06]],P2))}
    // Telescope: separate lid + base
    else if(cat==="telescope"||id==="TG_TELESCOPE"){const bH=sh*.55,lH=sh*.4,gap=sh*.15,ex=sl*.025;parts.push(openBox(-hl,-hh,-hw,sl,bH,sw,P));parts.push(box(-hl-ex,-hh+bH+gap,-hw-ex,sl+ex*2,lH,sw+ex*2,P2))}
    // Open trays
    else if(id==="0401"||id==="0421"||id==="TG_TRAY"){parts.push(openBox(-hl,-hh,-hw,sl,sh,sw,P))}
    // Hinged lid (0427): lid hinges from BACK edge upward
    else if(id==="0427"){parts.push(openBox(-hl,-hh,-hw,sl,sh,sw,P));const la=55*Math.PI/180,ll=sw*.8;parts.push(quad([[-hl,hh,hw],[hl,hh,hw],[hl,hh+ll*Math.cos(la),hw+ll*Math.sin(la)],[-hl,hh+ll*Math.cos(la),hw+ll*Math.sin(la)]],P2))}
    // Mailer: front panel swings FORWARD (hinged at bottom-front)
    else if(id==="MAILER"){parts.push(openBox(-hl,-hh,-hw,sl,sh,sw,P));const fa=65*Math.PI/180,fp=sh*.85;parts.push(quad([[-hl,-hh,-hw],[hl,-hh,-hw],[hl,-hh-fp*Math.sin(fa),-hw-fp*Math.cos(fa)],[-hl,-hh-fp*Math.sin(fa),-hw-fp*Math.cos(fa)]],P2));const la=40*Math.PI/180,ll=sw*.6;parts.push(quad([[-hl,hh,hw],[hl,hh,hw],[hl,hh+ll*Math.cos(la),hw+ll*Math.sin(la)],[-hl,hh+ll*Math.cos(la),hw+ll*Math.sin(la)]],P3))}
    // Pizza: hinged from BACK, lid swings UP
    else if(id==="PIZZA"){parts.push(openBox(-hl,-hh,-hw,sl,sh,sw,P));const la=50*Math.PI/180,ll=sw*.9;parts.push(quad([[-hl,hh,hw],[hl,hh,hw],[hl,hh+ll*Math.cos(la),hw+ll*Math.sin(la)],[-hl,hh+ll*Math.cos(la),hw+ll*Math.sin(la)]],P2))}
    // Display: low tray + tall back riser
    else if(id==="DISPLAY"){parts.push(openBox(-hl,-hh,-hw,sl,sh*.35,sw,P));parts.push(quad([[-hl,-hh+sh*.35,hw],[hl,-hh+sh*.35,hw],[hl,hh*1.3,hw],[-hl,hh*1.3,hw]],P2))}
    // Book wrap: flat base + wings rising from LEFT/RIGHT
    else if(id==="BOOKWRAP"){const bt=sh*.15;parts.push(box(-hl,-hh,-hw,sl,bt,sw,P));const wa=55*Math.PI/180,wl=hw*1.2;parts.push(quad([[-hl,-hh+bt,-hw],[-hl,-hh+bt,hw],[-hl-wl*Math.sin(wa),-hh+bt+wl*Math.cos(wa),hw],[-hl-wl*Math.sin(wa),-hh+bt+wl*Math.cos(wa),-hw]],P2));parts.push(quad([[hl,-hh+bt,-hw],[hl,-hh+bt,hw],[hl+wl*Math.sin(wa),-hh+bt+wl*Math.cos(wa),hw],[hl+wl*Math.sin(wa),-hh+bt+wl*Math.cos(wa),-hw]],P3))}
    // Rigid mailer: flat envelope
    else if(id==="RIGIDMAIL"){parts.push(box(-hl,-hh*.2,-hw,sl,sh*.4,sw,P));parts.push(quad([[-hl,hh*.2,hw],[hl,hh*.2,hw],[hl,hh*.2+hw*.3,hw+hw*.2],[-hl,hh*.2+hw*.3,hw+hw*.2]],P2))}
    // Pillow: curved tube
    else if(id==="PILLOW"){const n=12,pts=[];for(let i=0;i<=n;i++){const t=i/n;pts.push({x:-hl+sl*t,c:Math.sin(t*Math.PI)*hh*.6})}for(let i=0;i<n;i++){parts.push(quad([[pts[i].x,-hh-pts[i].c,-hw],[pts[i+1].x,-hh-pts[i+1].c,-hw],[pts[i+1].x,hh+pts[i+1].c,-hw],[pts[i].x,hh+pts[i].c,-hw]],P));parts.push(quad([[pts[i].x,-hh-pts[i].c,hw],[pts[i+1].x,-hh-pts[i+1].c,hw],[pts[i+1].x,hh+pts[i+1].c,hw],[pts[i].x,hh+pts[i].c,hw]],P2));parts.push(quad([[pts[i].x,hh+pts[i].c,-hw],[pts[i+1].x,hh+pts[i+1].c,-hw],[pts[i+1].x,hh+pts[i+1].c,hw],[pts[i].x,hh+pts[i].c,hw]],P3))}}
    // Hexagonal: 6-sided closed tube
    else if(id==="HEXAGON"){const r=hw*.9,n=6;const tops=[],bots=[];for(let i=0;i<n;i++){const a=i/n*Math.PI*2-Math.PI/2;tops.push([Math.cos(a)*r,hh,Math.sin(a)*r]);bots.push([Math.cos(a)*r,-hh,Math.sin(a)*r])}for(let i=0;i<n;i++){const j=(i+1)%n;parts.push(quad([bots[i],bots[j],tops[j],tops[i]],[P,P2,P3,P,P2,P3][i]))}}
    // T&G Sleeve: drawer partially open
    else if(id==="TG_SLEEVE"){parts.push(box(-hl,-hh,-hw,sl,sh,sw,P));parts.push(box(-hl-sl*.25,-hh*0.9,-hw*0.85,sl*0.9,sh*0.8,sw*0.85,P2))}
    // T&G closed types
    else if(cat==="tg"){parts.push(box(-hl,-hh,-hw,sl,sh,sw,P))}
    // Default: closed box
    else{parts.push(box(-hl,-hh,-hw,sl,sh,sw,P))}
    return parts;
  },[sl,sw,sh,cat,boxId]);


  // ── Render all mesh parts ──
  const allFaces=[];const allEdges=[];
  meshes.forEach((mesh,mi)=>{
    const pv=mesh.v.map(v=>proj(v[0],v[1],v[2]));
    mesh.f.forEach((f,fi)=>{
      const pts=f.map(i=>pv[i]);
      const v1={x:pts[1].px-pts[0].px,y:pts[1].py-pts[0].py};
      const v2={x:pts[f.length-1].px-pts[0].px,y:pts[f.length-1].py-pts[0].py};
      const cr=v1.x*v2.y-v1.y*v2.x;
      const alpha=Math.min(.55,Math.abs(cr)/(80*Math.max(sl,sw,sh)+1)*.6+.04);
      allFaces.push({pts,avgZ:pts.reduce((s,p)=>s+p.z,0)/pts.length,alpha,cross:cr,col:mesh.col||"rgba(245,158,11,"});
    });
    // Edges for this part
    if(mesh.v.length===8){[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]].forEach(([a,b])=>allEdges.push([pv[a],pv[b]]))}
    else if(mesh.v.length===4){[[0,1],[1,2],[2,3],[3,0]].forEach(([a,b])=>allEdges.push([pv[a],pv[b]]))}
  });
  allFaces.sort((a,b)=>a.avgZ-b.avgZ);

  const mB=proj(0,-sh/2-18,0),mS=proj(sl/2+18,0,0),mL=proj(-sl/2-18,0,0);
  const typeLabel=BOXES.find(b=>b.id===boxId)?.n||"Box";

  return <div ref={ref} className="w-full h-full select-none" onMouseDown={onD} onMouseMove={onM} onMouseUp={onU} onMouseLeave={onU}
    style={{background:"#0d1117",touchAction:"none",cursor:"grab"}}>
    <svg viewBox="0 0 400 360" className="w-full h-full" style={{pointerEvents:"none"}}>
      <defs><radialGradient id="bg3d" cx="50%" cy="40%"><stop offset="0%" stopColor="#111827"/><stop offset="100%" stopColor="#030712"/></radialGradient></defs>
      <rect width="400" height="360" fill="url(#bg3d)"/>
      <ellipse cx={cx} cy={cy+sh/2*zm+22} rx={sl*.6} ry={sw*.15} fill="#f59e0b" fillOpacity=".06"/>
      {allFaces.filter(f=>f.cross>0).map((f,i)=><polygon key={i} points={f.pts.map(p=>`${p.px},${p.py}`).join(" ")} fill={`${f.col}${f.alpha.toFixed(2)})`} stroke="#f59e0b" strokeWidth=".6" strokeOpacity=".4"/>)}
      {allEdges.map(([p1,p2],i)=><line key={`e${i}`} x1={p1.px} y1={p1.py} x2={p2.px} y2={p2.py} stroke="#f59e0b" strokeWidth="1" strokeOpacity=".55"/>)}
      <text x={mB.px} y={mB.py+14} textAnchor="middle" fill="#94a3b8" fontSize="11" fontFamily="monospace" fontWeight="700">{L.toFixed(0)}mm</text>
      <text x={mS.px+10} y={mS.py} fill="#94a3b8" fontSize="11" fontFamily="monospace" fontWeight="700">{H.toFixed(0)}mm</text>
      <text x={mL.px-10} y={mL.py} textAnchor="end" fill="#94a3b8" fontSize="11" fontFamily="monospace" fontWeight="700">{W.toFixed(0)}mm</text>
      <text x={200} y={20} textAnchor="middle" fill="#f59e0b" fontSize="12" fontFamily="sans-serif" fontWeight="700">{typeLabel}</text>
      <text x={200} y={348} textAnchor="middle" fill="#64748b" fontSize="10" fontFamily="monospace">Drag: orbit · Scroll/Pinch: zoom · {rot.x.toFixed(0)}°/{rot.y.toFixed(0)}° · {(zm*100).toFixed(0)}%</text>
    </svg></div>}

// ═══════════════════════════════════════════════════════════════
// 2D PREVIEW with flute direction
// ═══════════════════════════════════════════════════════════════
function Preview2D({result,zoom,setZoom,T}){if(!result)return null;
  const{segments:sg,width:ww,height:hh}=result;const p=15;
  const dm={cut:"none",fold:"6,3",crease:"8,3,2,3",glue:"3,3",perf:"2,4",tongue:"4,2",groove:"2,2,6,2"};
  const sw={cut:1.2,fold:.7,crease:.5,glue:.5,perf:.6,tongue:1,groove:.8};
  const ref=useRef(null);const[hover,setHover]=useState(null);
  useEffect(()=>{const el=ref.current;const w=e=>{e.preventDefault();setZoom(z=>Math.max(.1,Math.min(8,z-e.deltaY*.003)))};
    if(el)el.addEventListener("wheel",w,{passive:false});return()=>{if(el)el.removeEventListener("wheel",w)}},[setZoom]);
  // Flute direction arrows
  const fluteArrows=[];const step=Math.max(40,Math.min(80,ww/8));
  for(let x=step;x<ww-step/2;x+=step)for(let y=step;y<hh-step/2;y+=step)fluteArrows.push({x,y});

  return <div ref={ref} className="w-full h-full" style={{cursor:"crosshair"}}>
    <svg viewBox={`${-p} ${-p} ${(ww+p*2)/zoom} ${(hh+p*2)/zoom}`} className="w-full h-full" style={{background:"#0d1117"}}>
      <defs><pattern id="g1" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="#151e2d" strokeWidth=".15"/></pattern>
        <pattern id="g2" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1a2d42" strokeWidth=".25"/></pattern></defs>
      <rect x={-p*4} y={-p*4} width={(ww+p*2)*4} height={(hh+p*2)*4} fill="url(#g1)"/>
      <rect x={-p*4} y={-p*4} width={(ww+p*2)*4} height={(hh+p*2)*4} fill="url(#g2)"/>
      {/* Flute direction indicators */}
      {fluteArrows.map((a,i)=><g key={`fa${i}`} opacity=".15">
        <line x1={a.x} y1={hh-a.y-8} x2={a.x} y2={hh-a.y+8} stroke="#60a5fa" strokeWidth=".5"/>
        <line x1={a.x-2} y1={hh-a.y-5} x2={a.x} y2={hh-a.y-8} stroke="#60a5fa" strokeWidth=".5"/>
        <line x1={a.x+2} y1={hh-a.y-5} x2={a.x} y2={hh-a.y-8} stroke="#60a5fa" strokeWidth=".5"/>
      </g>)}
      {/* Dimension annotations */}
      <line x1={0} y1={hh+12} x2={ww} y2={hh+12} stroke="#f59e0b" strokeWidth=".3"/>
      <text x={ww/2} y={hh+18} textAnchor="middle" fill="#f59e0b" fontSize={4/Math.max(zoom,.5)} fontFamily="monospace">{ww.toFixed(1)}mm</text>
      <line x1={ww+8} y1={hh} x2={ww+8} y2={0} stroke="#f59e0b" strokeWidth=".3"/>
      <text x={ww+12} y={hh/2} fill="#f59e0b" fontSize={4/Math.max(zoom,.5)} fontFamily="monospace" transform={`rotate(-90,${ww+12},${hh/2})`} textAnchor="middle">{hh.toFixed(1)}mm</text>
      {/* Grain direction label */}
      <text x={ww-5} y={hh-5} textAnchor="end" fill="#60a5fa" fontSize={3/Math.max(zoom,.5)} fontFamily="monospace" opacity=".4">↑ FLUTE DIR / GRAIN</text>
      {/* Segments */}
      {sg.map((s,i)=><line key={i} x1={s.x1} y1={hh-s.y1} x2={s.x2} y2={hh-s.y2}
        stroke={hover===i?"#fff":LC[s.type]} strokeWidth={(hover===i?2:1)*(sw[s.type]||.6)} strokeDasharray={dm[s.type]}
        strokeLinecap="round" onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)} style={{cursor:"pointer",pointerEvents:"all"}}/>)}
    </svg>
    {hover!==null&&sg[hover]&&<div className="absolute top-2 right-2 px-3 py-2 rounded text-xs" style={{background:"#0f172aee",border:"1px solid #1e293b"}}>
      <div className="font-bold" style={{color:LC[sg[hover].type]}}>{LL[sg[hover].type]}</div>
      <div className="font-mono mt-1" style={{color:"#94a3b8"}}>({sg[hover].x1.toFixed(1)},{sg[hover].y1.toFixed(1)})→({sg[hover].x2.toFixed(1)},{sg[hover].y2.toFixed(1)})</div>
      <div className="font-mono" style={{color:"#64748b"}}>Len: {Math.sqrt((sg[hover].x2-sg[hover].x1)**2+(sg[hover].y2-sg[hover].y1)**2).toFixed(2)}mm</div>
    </div>}
  </div>}

const Dots=({v,mx=5,c="#f59e0b",bg="#1e293b"})=><div className="flex gap-0.5">{Array.from({length:mx},(_,i)=><div key={i} className="w-1.5 h-1.5 rounded-full" style={{background:i<v?c:bg}}/>)}</div>;

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const[theme,setTheme]=useState("dark");
  const[mode,setMode]=useState("engineer"); // engineer | customer
  const[boxType,setBoxType]=useState("0201");
  const[dims,setDims]=useState({L:300,W:200,H:150});
  const[matId,setMatId]=useState("B");
  const[selFins,setSelFins]=useState([]);
  const[unit,setUnit]=useState("mm");
  const[zoom,setZoom]=useState(1);
  const[mTab,setMTab]=useState("dieline");
  const[sTab,setSTab]=useState("box");
  const[catF,setCatF]=useState(null);
  const[finCatF,setFinCatF]=useState(null);
  const[sq,setSq]=useState("");
  const[bk,setBK]=useState(0.3);
  const[ba,setBA]=useState(90);
  const[bt2,setBT]=useState("rotary");
  const[savedDesigns,setSaved]=useState([]);
  const[showQuote,setShowQuote]=useState(false);
  const[batchCSV,setBatchCSV]=useState("");
  const[showBatch,setShowBatch]=useState(false);
  const[batchErrors,setBatchErrors]=useState([]);
  const[qty,setQty]=useState(1000);
  const[compareId,setCompareId]=useState(null);
  const[aiLoading,setAiLoading]=useState(false);
  const[aiResult,setAiResult]=useState(null);
  const[aiError,setAiError]=useState(null);
  const fileRef=useRef(null);
  const imgRef=useRef(null);

  const T_=DARK,TL=LIGHT,TH=theme==="dark"?T_:TL;

  // Keyboard shortcuts
  useEffect(()=>{const h=e=>{if((e.ctrlKey||e.metaKey)&&e.key==="e"){e.preventDefault();if(r)exp("dxf")}
    if((e.ctrlKey||e.metaKey)&&e.key==="s"){e.preventDefault();handleSave()}
    if((e.ctrlKey||e.metaKey)&&e.key==="r"){e.preventDefault();resetDims()}};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h)});

  // Load saved designs
  useEffect(()=>{loadDesigns().then(d=>setSaved(d))},[]); 

  const mat=MATS.find(m=>m.id===matId);const T=mat?.t||3;
  const cv=unit==="in"?25.4:1;const L=dims.L*cv,W=dims.W*cv,H=dims.H*cv;
  const blade={kerf:bk,angle:ba,type:bt2};
  const v=useMemo(()=>validate(boxType,L,W,H,T,matId),[boxType,L,W,H,T,matId]);
  const r=useMemo(()=>v.valid?generate(boxType,L,W,H,T,blade):null,[boxType,L,W,H,T,bk,ba,v.valid]);
  const bt=BOXES.find(b=>b.id===boxType);
  const sc=useMemo(()=>{if(!r)return{};const c={};r.segments.forEach(s=>{c[s.type]=(c[s.type]||0)+1});return c},[r]);
  // Segment length totals (total mm of cut, fold, etc. — useful for machine time estimates)
  const segLens=useMemo(()=>{if(!r)return{};const l={};r.segments.forEach(s=>{const len=Math.sqrt((s.x2-s.x1)**2+(s.y2-s.y1)**2);l[s.type]=(l[s.type]||0)+len});return l},[r]);
  const totalCutLen=useMemo(()=>Object.values(segLens).reduce((s,v)=>s+v,0),[segLens]);
  // Sheet utilization (box surface area vs sheet area)
  const utilization=useMemo(()=>{if(!r)return null;const sheet=r.width*r.height;const box=2*(L*W+L*H+W*H);return Math.min(99,Math.round(box/sheet*100))},[r,L,W,H]);
  const bctData=useMemo(()=>calcBCT(L,W,H,mat),[L,W,H,mat]);
  const quote=useMemo(()=>calcQuote(r,mat,selFins,qty),[r,mat,selFins,qty]);
  // Comparison mode
  const compareBox=BOXES.find(b=>b.id===compareId);
  const compareResult=useMemo(()=>{if(!compareId)return null;const cb=BOXES.find(b=>b.id===compareId);
    if(!cb)return null;return generate(compareId,cb.dL,cb.dW,cb.dH,T,blade)},[compareId,T,bk,ba]);

  // Reset dims when box type changes
  const changeBox=useCallback(id=>{setBoxType(id);const b=BOXES.find(x=>x.id===id);
    if(b)setDims({L:b.dL,W:b.dW,H:b.dH})},[]);

  const fBoxes=useMemo(()=>{let l=BOXES;if(catF)l=l.filter(b=>b.cat===catF);
    if(sq){const q=sq.toLowerCase();l=l.filter(b=>b.name.toLowerCase().includes(q)||b.sub.toLowerCase().includes(q)||b.desc.toLowerCase().includes(q))}return l},[catF,sq]);
  const fFins=useMemo(()=>finCatF?FINS.filter(f=>f.cat===finCatF):FINS,[finCatF]);

  const exp=useCallback(fmt=>{const n=`${bt?.id||"box"}_${Math.round(L)}x${Math.round(W)}x${Math.round(H)}`;
    if(!r&&fmt!=="spec-pdf"&&fmt!=="struct-pdf")return;
    if(fmt==="dxf")dl(makeDXF(r,blade),n+".dxf","application/dxf");
    if(fmt==="svg")dl(makeSVG(r),n+".svg","image/svg+xml");
    if(fmt==="cff2")dl(makeCFF2(r,blade,boxType,{L:Math.round(L),W:Math.round(W),H:Math.round(H)}),n+".cf2","application/octet-stream");
    if(fmt==="pdf")dl(makePrintSVG(r),n+"_print.svg","image/svg+xml");
    if(fmt==="spec-pdf")dl(makeSpecPDF(bt,L,W,H,T,mat,r,quote,bctData,sc,segLens,selFins,FINS,blade),n+"_spec.svg","image/svg+xml");
    if(fmt==="struct-pdf")dl(makeStructPDF(bt,L,W,H,T,mat,bctData),n+"_structural.svg","image/svg+xml");
  },[r,bt,L,W,H,T,blade,boxType,mat,quote,bctData,sc,segLens,selFins]);

  const handleSave=useCallback(async()=>{
    const name=`${bt?.name} ${Math.round(L)}×${Math.round(W)}×${Math.round(H)}`;
    await saveDesign(name,{boxType,dims,matId,selFins,bk,ba,bt2});
    setSaved(await loadDesigns())},[bt,L,W,H,boxType,dims,matId,selFins,bk,ba,bt2]);

  const handleLoadDesign=useCallback(d=>{
    setBoxType(d.boxType||"0201");setDims(d.dims||{L:300,W:200,H:150});
    setMatId(d.matId||"B");setSelFins(d.selFins||[]);setBK(d.bk||.3);setBA(d.ba||90);setBT(d.bt2||"rotary")},[]);

  // Batch CSV processing with validation
  const processBatch=useCallback(()=>{if(!batchCSV.trim())return;
    const lines=batchCSV.trim().split("\n").filter(l=>l.trim()&&!l.startsWith("#"));
    const errors=[];let allDxf="";let ok=0;
    lines.forEach((line,i)=>{
      const parts=line.split(",").map(s=>s.trim());
      if(parts.length<4){errors.push(`Line ${i+1}: Need 4 values (BoxType,L,W,H), got ${parts.length}`);return}
      const[id,l,w,h]=parts;const bL=parseFloat(l),bW=parseFloat(w),bH=parseFloat(h);
      if(isNaN(bL)||isNaN(bW)||isNaN(bH)){errors.push(`Line ${i+1}: Invalid numbers "${l},${w},${h}"`);return}
      if(bL<=0||bW<=0||bH<=0){errors.push(`Line ${i+1}: Dimensions must be > 0`);return}
      const boxDef=BOXES.find(b=>b.id===id);
      if(!boxDef){errors.push(`Line ${i+1}: Unknown box type "${id}" — using 0201`)}
      try{const br=generate(id||"0201",bL,bW,bH,T,blade);
        allDxf+=`\n999\n--- SKU ${i+1}: ${id||"0201"} ${bL}x${bW}x${bH} ---\n`;
        allDxf+=makeDXF(br,blade);ok++}
      catch(e){errors.push(`Line ${i+1}: Generation failed — ${e.message}`)}});
    setBatchErrors(errors);
    if(allDxf)dl(allDxf,`batch_${ok}_boxes.dxf`,"application/dxf")},[batchCSV,T,blade]);

  // Reset dimensions to box type defaults
  const resetDims=useCallback(()=>{const b=BOXES.find(x=>x.id===boxType);
    if(b)setDims({L:b.dL,W:b.dW,H:b.dH})},[boxType]);

  // AI: Parse PDF spec sheet for dimensions
  const handlePDFUpload=useCallback(async(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    setAiLoading(true);setAiError(null);setAiResult(null);
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Read failed"));r.readAsDataURL(file)});
      const isPDF=file.type==="application/pdf";
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          messages:[{role:"user",content:[
            {type:isPDF?"document":"image",source:{type:"base64",media_type:file.type,data:b64}},
            {type:"text",text:`Analyze this ${isPDF?"PDF specification sheet":"technical drawing"} for a shipping/packaging box. Extract the following and respond ONLY with JSON, no markdown backticks or other text:
{"length_mm": number, "width_mm": number, "height_mm": number, "box_type": "FEFCO code or type name", "confidence": "high/medium/low", "notes": "any relevant observations about material, flute type, or special features"}
If dimensions are in inches, convert to mm. If you can identify the FEFCO code, use the 4-digit code (e.g. "0201"). If not sure, use the closest match. If you cannot extract dimensions, set them to 0.`}]}]})});
      const data=await resp.json();
      const txt=data.content?.find(c=>c.type==="text")?.text||"";
      const clean=txt.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setAiResult({...parsed,source:"pdf",fileName:file.name});
      // Auto-apply if we got valid dimensions
      if(parsed.length_mm>0&&parsed.width_mm>0&&parsed.height_mm>0){
        setDims({L:Math.round(parsed.length_mm),W:Math.round(parsed.width_mm),H:Math.round(parsed.height_mm)});
        // Try to match box type
        const matchedBox=BOXES.find(b=>b.id===parsed.box_type||b.name.includes(parsed.box_type));
        if(matchedBox)setBoxType(matchedBox.id);
      }
    }catch(err){setAiError(err.message||"Failed to parse")}finally{setAiLoading(false);if(e.target)e.target.value=""}
  },[]);

  // AI: Classify box from photo
  const handleImageUpload=useCallback(async(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    setAiLoading(true);setAiError(null);setAiResult(null);
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Read failed"));r.readAsDataURL(file)});
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:file.type,data:b64}},
            {type:"text",text:`Analyze this photo of a physical box/package. Identify:
1. The box type (match to FEFCO code if possible: 0201=RSC, 0202=Overlap, 0203=Full Overlap, 0204=Center Special, 0210=Half Slotted, 0215=Snap Lock, 0301=Telescope, 0401=Folder Tray, 0421=Four Corner, 0427=Hinged Lid, 0711=Crash Lock, 0713=Crash+Tuck, MAILER=Mailer, PIZZA=Pizza Box, etc.)
2. Estimate dimensions in mm from visual cues (if a reference object is visible, use it for scale; otherwise estimate based on proportions and common box sizes)
3. Estimate material type

Respond ONLY with JSON, no markdown or other text:
{"box_type": "FEFCO code", "box_name": "human readable name", "length_mm": number, "width_mm": number, "height_mm": number, "material_guess": "e.g. B-Flute corrugated", "confidence": "high/medium/low", "notes": "observations"}`}]}]})});
      const data=await resp.json();
      const txt=data.content?.find(c=>c.type==="text")?.text||"";
      const clean=txt.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setAiResult({...parsed,source:"image",fileName:file.name});
      if(parsed.length_mm>0&&parsed.width_mm>0&&parsed.height_mm>0){
        setDims({L:Math.round(parsed.length_mm),W:Math.round(parsed.width_mm),H:Math.round(parsed.height_mm)});
        const matchedBox=BOXES.find(b=>b.id===parsed.box_type||b.name.includes(parsed.box_type));
        if(matchedBox)setBoxType(matchedBox.id);
        // Try to match material
        const matGuess=parsed.material_guess?.toLowerCase()||"";
        const matchedMat=MATS.find(m=>matGuess.includes(m.name.toLowerCase().split(" ")[0]));
        if(matchedMat)setMatId(matchedMat.id);
      }
    }catch(err){setAiError(err.message||"Failed to classify")}finally{setAiLoading(false);if(e.target)e.target.value=""}
  },[]);

  const di=(label,key)=>{
    const step=unit==="in"?0.25:5;
    return <div className="flex flex-col gap-1">
      <label className="text-xs font-medium tracking-wider" style={{color:TH.tm}}>{label}</label>
      <div className="flex items-center gap-0.5 rounded-lg" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
        <button onClick={()=>setDims(d=>({...d,[key]:Math.max(0,d[key]-step)}))} className="px-2 py-2 text-sm font-bold rounded-l-lg"
          style={{color:TH.ac,background:"transparent",border:"none",minWidth:28}}>−</button>
        <div className="flex items-center gap-1 flex-1 px-1">
          <span style={{color:TH.tf}} className="text-xs font-mono font-bold">{key}</span>
          <input type="number" value={dims[key]} onChange={e=>setDims(d=>({...d,[key]:Math.max(0,parseFloat(e.target.value)||0)}))}
            className="flex-1 bg-transparent text-right font-mono text-base outline-none" style={{color:TH.tx}} step={step}/>
          <span className="text-xs font-mono" style={{color:TH.tm}}>{unit}</span>
        </div>
        <button onClick={()=>setDims(d=>({...d,[key]:d[key]+step}))} className="px-2 py-2 text-sm font-bold rounded-r-lg"
          style={{color:TH.ac,background:"transparent",border:"none",minWidth:28}}>+</button>
      </div></div>};

  const isEng=mode==="engineer";

  return(
    <div className="h-screen flex flex-col overflow-hidden" style={{background:TH.bg0,color:TH.tx,fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      {/* HEADER */}
      <header className="flex items-center justify-between px-4 py-2 flex-shrink-0" style={{background:TH.bg1,borderBottom:`1px solid ${TH.bd}`}}>
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center font-black text-xs" style={{background:`linear-gradient(135deg,${TH.ac},${TH.ac2})`,color:theme==="dark"?TH.bg0:"#fff"}}>BX</div>
          <div><h1 className="text-sm font-bold tracking-wide" style={{color:TH.tx}}>TAG BOX CONVERTER <span style={{color:TH.ac}}>v7</span></h1>
            <p className="text-xs" style={{color:TH.tf}}>{mode==="customer"?"Customer Portal":"Full Engineering Mode"}</p></div></div>
        <div className="flex items-center gap-2">
          {/* Mode toggle */}
          <button onClick={()=>setMode(m=>m==="engineer"?"customer":"engineer")} className="px-2 py-1 rounded text-xs font-bold"
            style={{background:TH.bg3,color:TH.td}}>{mode==="customer"?"⚙ Engineer":"👤 Customer"}</button>
          {/* Theme toggle */}
          <button onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} className="px-2 py-1 rounded text-xs"
            style={{background:TH.bg3,color:TH.td}}>{theme==="dark"?"☀":"🌙"}</button>
          {/* Units */}
          <div className="flex rounded overflow-hidden text-xs" style={{border:`1px solid ${TH.bd}`}}>
            {["mm","in"].map(u=><button key={u} onClick={()=>setUnit(u)} className="px-2 py-1 font-mono font-bold"
              style={{background:unit===u?TH.bg3:"transparent",color:unit===u?TH.ac:TH.tm}}>{u}</button>)}</div>
          {/* Exports */}
          {v.valid&&<div className="flex gap-1">
            <button onClick={()=>exp("dxf")} className="px-2 py-1 rounded text-xs font-bold" style={{background:`linear-gradient(135deg,${TH.ac},${TH.ac2})`,color:"#000"}}>DXF</button>
            {isEng&&<button onClick={()=>exp("cff2")} className="px-2 py-1 rounded text-xs font-bold" style={{background:TH.bl,color:"#fff"}}>CFF2</button>}
            <button onClick={()=>exp("svg")} className="px-2 py-1 rounded text-xs font-bold" style={{background:TH.bg3,color:TH.tx}}>SVG</button>

                  <div className="text-xs" style={{color:TH.tf}}>{l}</div><div className="font-mono font-bold mt-1 text-lg">{vv}</div></div>)}</div>

              {/* Internal Dimensions */}
              <h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>INTERNAL DIMENSIONS (after material thickness)</h3>
              <div className="grid grid-cols-4 gap-2 mb-4">{[
                ["Int. Length",`${(L-T*2).toFixed(1)}mm`],["Int. Width",`${(W-T*2).toFixed(1)}mm`],["Int. Height",`${(H-T).toFixed(1)}mm`],
                ["Int. Volume",`${(((L-T*2)*(W-T*2)*(H-T))/1e6).toFixed(3)}L`]].map(([l,vv])=>
                <div key={l} className="rounded-lg p-2.5" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
                  <div className="text-xs" style={{color:TH.tf}}>{l}</div><div className="font-mono font-bold mt-0.5 text-sm">{vv}</div></div>)}</div>

              {/* Material & Construction */}
              <h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>MATERIAL & CONSTRUCTION</h3>
              <div className="grid grid-cols-3 gap-2 mb-4">{[
                ["Material",mat?.name||"—"],["Thickness",`${T}mm`],["GSM",`${mat?.gsm||0}`],
                ["ECT",`${mat?.ect||0} kN/m`],["Strength",`${"★".repeat(mat?.str||0)}${"☆".repeat(5-(mat?.str||0))}`],["Printability",`${"★".repeat(mat?.prt||0)}${"☆".repeat(5-(mat?.prt||0))}`]].map(([l,vv])=>
                <div key={l} className="rounded-lg p-2.5" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
                  <div className="text-xs" style={{color:TH.tf}}>{l}</div><div className="font-mono font-bold mt-0.5 text-sm">{vv}</div></div>)}</div>

              {/* Surface Area & Volume */}
              <h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>SURFACE AREA & VOLUME</h3>
              {(()=>{const sa=2*(L*W+L*H+W*H);const vol=L*W*H;const isa=2*((L-T*2)*(W-T*2)+(L-T*2)*(H-T)+(W-T*2)*(H-T));
                return <div className="grid grid-cols-4 gap-2 mb-4">{[
                  ["Ext. Surface",`${(sa/100).toFixed(0)}cm²`],["Int. Surface",`${(isa/100).toFixed(0)}cm²`],
                  ["Ext. Volume",`${(vol/1e6).toFixed(3)}L`],["Print Area",`${((sa*.85)/100).toFixed(0)}cm²`]].map(([l,vv])=>
                  <div key={l} className="rounded-lg p-2.5" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
                    <div className="text-xs" style={{color:TH.tf}}>{l}</div><div className="font-mono font-bold mt-0.5 text-sm">{vv}</div></div>)}</div>})()}

              {/* Production Metrics */}
              {quote&&<><h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>PRODUCTION METRICS</h3>
              <div className="grid grid-cols-4 gap-2 mb-4">{[
                ["Sheet Size",r?`${r.width.toFixed(0)}×${r.height.toFixed(0)}mm`:"—"],
                ["Sheet Area",`${quote.sheetArea}cm²`],
                ["Weight",`${quote.weight}g`],
                ["Utilization",utilization?`${utilization}%`:"—"],
                ["Total Cut",totalCutLen?`${(totalCutLen/1000).toFixed(1)}m`:"—"],
                ["Segments",r?`${r.segments.length}`:"—"],
                ["Unit Cost",`$${quote.unitCost}`],
                ["Per ${qty.toLocaleString()}",`$${quote.per1k}`]].map(([l,vv])=>
                <div key={l} className="rounded-lg p-2.5" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
                  <div className="text-xs" style={{color:TH.tf}}>{l}</div><div className="font-mono font-bold mt-0.5 text-sm" style={{color:TH.gn}}>{vv}</div></div>)}</div></>}

              {/* Panel Analysis */}
              {r&&<><h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>PANEL ANALYSIS</h3>
              <div className="rounded-lg overflow-hidden mb-4" style={{border:`1px solid ${TH.bd}`}}>
                <div className="grid grid-cols-4 px-3 py-1.5" style={{background:TH.bg3}}>
                  <span className="text-xs font-bold" style={{color:TH.tm}}>Panel</span>
                  <span className="text-xs font-bold text-right" style={{color:TH.tm}}>Width</span>
                  <span className="text-xs font-bold text-right" style={{color:TH.tm}}>Height</span>
                  <span className="text-xs font-bold text-right" style={{color:TH.tm}}>Area</span></div>
                {[["Front Panel",W,H],["Back Panel",W,H],["Left Panel",L,H],["Right Panel",L,H],
                  ["Top Flap (major)",L,W/2],["Top Flap (minor)",W,W/2],
                  ["Bottom Flap (major)",L,W/2],["Bottom Flap (minor)",W,W/2],
                  ["Glue Tab",GW,H]].map(([n,pw,ph],i)=>
                  <div key={n} className="grid grid-cols-4 px-3 py-1.5" style={{background:i%2?TH.bg2:TH.bg1,borderTop:`1px solid ${TH.bd}`}}>
                    <span className="text-xs" style={{color:TH.td}}>{n}</span>
                    <span className="text-xs font-mono text-right">{pw.toFixed(0)}mm</span>
                    <span className="text-xs font-mono text-right">{ph.toFixed(0)}mm</span>
                    <span className="text-xs font-mono text-right" style={{color:TH.gn}}>{(pw*ph/100).toFixed(0)}cm²</span></div>)}
              </div></>}

              {/* Segment Breakdown */}
              {r&&<><h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>SEGMENT BREAKDOWN</h3>
              <div className="rounded-lg overflow-hidden mb-4" style={{border:`1px solid ${TH.bd}`}}>
                <div className="grid grid-cols-4 px-3 py-1.5" style={{background:TH.bg3}}>
                  <span className="text-xs font-bold" style={{color:TH.tm}}>Type</span>
                  <span className="text-xs font-bold text-right" style={{color:TH.tm}}>Count</span>
                  <span className="text-xs font-bold text-right" style={{color:TH.tm}}>Length</span>
                  <span className="text-xs font-bold text-right" style={{color:TH.tm}}>% of Total</span></div>
                {Object.entries(sc).map(([t,cnt],i)=>{const len=segLens[t]||0;
                  return <div key={t} className="grid grid-cols-4 px-3 py-1.5 items-center" style={{background:i%2?TH.bg2:TH.bg1,borderTop:`1px solid ${TH.bd}`}}>
                    <div className="flex items-center gap-2"><div className="w-3 h-1 rounded" style={{background:LC[t]}}/><span className="text-xs" style={{color:TH.td}}>{LL[t]}</span></div>
                    <span className="text-xs font-mono text-right font-bold">{cnt}</span>
                    <span className="text-xs font-mono text-right">{(len/10).toFixed(0)}cm</span>
                    <span className="text-xs font-mono text-right" style={{color:TH.tf}}>{totalCutLen?(len/totalCutLen*100).toFixed(0):0}%</span></div>})}
              </div></>}

              {/* Shipping & Logistics */}
              <h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>SHIPPING & LOGISTICS</h3>
              {(()=>{const palletL=1200,palletW=1000,palletH=1800;
                const perLayer=Math.floor(palletL/L)*Math.floor(palletW/W);
                const layers=Math.floor(palletH/H);const perPallet=perLayer*layers;
                const flatPerLayer=r?Math.floor(palletL/r.width)*Math.floor(palletW/r.height):0;
                return <div className="grid grid-cols-3 gap-2 mb-4">{[
                  ["Assembled/Pallet",`~${perPallet}`],["Per Layer",`${perLayer}`],["Layers High",`${layers}`],
                  ["Flat Sheets/Pallet",r?`~${flatPerLayer*500}`:"—"],["Flat Stack Height",r?`${T}mm each`:"—"],
                  ["Pallet Base",`1200×1000mm`]].map(([l,vv])=>
                  <div key={l} className="rounded-lg p-2.5" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
                    <div className="text-xs" style={{color:TH.tf}}>{l}</div><div className="font-mono font-bold mt-0.5 text-sm">{vv}</div></div>)}</div>})()}

              {/* Selected Finishes */}
              {selFins.length>0&&<><h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>APPLIED FINISHES ({selFins.length})</h3>
                <div className="flex flex-wrap gap-1.5 mb-4">{selFins.map(fid=>{const f=FINS.find(x=>x.id===fid);
                  return f?<span key={fid} className="text-xs px-2.5 py-1 rounded-lg" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>{f.name} {f.pr?"⭐":""}</span>:null})}</div></>}

              {/* Blade Config */}
              {isEng&&<><h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>BLADE CONFIGURATION</h3>
              <div className="grid grid-cols-3 gap-2 mb-4">{[["Blade Type",bt2],["Kerf",`${bk}mm`],["Cut Angle",`${ba}°`]].map(([l,vv])=>
                <div key={l} className="rounded-lg p-2.5" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
                  <div className="text-xs" style={{color:TH.tf}}>{l}</div><div className="font-mono font-bold mt-0.5 text-sm" style={{color:TH.or}}>{vv}</div></div>)}</div></>}

              {/* DXF Layer Map */}
              {isEng&&<><h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>DXF/CFF2 LAYER MAP</h3>
              <div className="rounded-lg p-3 mb-4 text-xs font-mono leading-relaxed" style={{background:TH.bg2,border:`1px solid ${TH.bd}`,color:TH.td}}>
                {Object.entries(DXF_COL).map(([t,c])=><div key={t}><span style={{color:LC[t]}}>■ {t.toUpperCase()}</span> → DXF Color {c} · CFF2 Type {CFF2_LT[t]||1}</div>)}</div></>}
            </div></div>}
            {mTab==="struct"&&isEng&&<div className="p-5 overflow-y-auto h-full"><div className="max-w-2xl mx-auto">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-bold" style={{color:TH.ac}}>Structural Analysis</h2>
                {bctData&&<button onClick={()=>exp("struct-pdf")} className="px-3 py-1.5 rounded-lg text-xs font-bold"
                  style={{background:TH.rd+"22",color:TH.rd,border:`1px solid ${TH.rd}33`}}>📄 Export Report PDF</button>}
              </div>
              {bctData?<>
                <div className="grid grid-cols-2 gap-3 mb-4">
                  {[["BCT (McKee)",`${bctData.bct} N`],["Safe Load (65%)",`${bctData.safeLoad} N`],
                    ["ECT",`${bctData.ect} kN/m`],["Est. Stack Height",`${bctData.stackHeight} boxes`]].map(([l,vv])=>
                    <div key={l} className="rounded-lg p-4" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
                      <div className="text-xs" style={{color:TH.tf}}>{l}</div>
                      <div className="text-2xl font-mono font-bold mt-1" style={{color:TH.gn}}>{vv}</div></div>)}
                </div>
                <div className="rounded-lg p-4 mb-4" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
                  <h3 className="text-xs font-bold mb-2" style={{color:TH.tm}}>McKee Formula</h3>
                  <div className="text-sm font-mono mb-2" style={{color:TH.ac}}>BCT = 5.87 × ECT × √(Z × P)</div>
                  <div className="text-xs" style={{color:TH.tf}}>
                    ECT = {bctData.ect} kN/m ({mat?.name})<br/>
                    Z = {T}mm (combined board caliper)<br/>
                    P = {(2*(L+W)).toFixed(0)}mm (perimeter = 2×{L.toFixed(0)} + 2×{W.toFixed(0)})</div>
                </div>
                {/* Additional Metrics */}
                <h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>ADDITIONAL METRICS</h3>
                <div className="grid grid-cols-3 gap-2 mb-4">{[
                  ["Burst Strength",`~${((mat?.ect||0)*1.6*T).toFixed(0)} kPa`],
                  ["Flat Crush",`~${((mat?.ect||0)*0.7).toFixed(1)} kN/m`],
                  ["Board Area",`${(2*(L*W+L*H+W*H)/1e4).toFixed(2)}m²`]].map(([l,vv])=>
                  <div key={l} className="rounded-lg p-3" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
                    <div className="text-xs" style={{color:TH.tf}}>{l}</div>
                    <div className="font-mono font-bold mt-1 text-sm">{vv}</div></div>)}</div>
                {/* Derating Factors */}
                <h3 className="text-xs font-bold tracking-widest mb-2" style={{color:TH.tm}}>ENVIRONMENTAL DERATING FACTORS</h3>
                <div className="rounded-lg overflow-hidden mb-4" style={{border:`1px solid ${TH.bd}`}}>
                  <div className="grid grid-cols-3 px-3 py-1.5" style={{background:TH.bg3}}>
                    <span className="text-xs font-bold" style={{color:TH.tm}}>Condition</span>
                    <span className="text-xs font-bold text-center" style={{color:TH.tm}}>Factor</span>
                    <span className="text-xs font-bold text-right" style={{color:TH.tm}}>Adj. Load</span></div>
                  {[["High humidity (>80% RH)","×0.65"],["Long storage (>30 days)","×0.75"],["Transit/vibration","×0.60"],
                    ["Pallet overhang","×0.70"],["High print coverage","×0.90"],["Temperature >40°C","×0.85"]].map(([cond,factor],i)=>{
                    const adj=(parseFloat(bctData.safeLoad)*parseFloat(factor.slice(1))).toFixed(0);
                    return <div key={cond} className="grid grid-cols-3 px-3 py-1.5" style={{background:i%2?TH.bg2:TH.bg1,borderTop:`1px solid ${TH.bd}`}}>
                      <span className="text-xs" style={{color:TH.td}}>{cond}</span>
                      <span className="text-xs font-mono font-bold text-center" style={{color:TH.rd}}>{factor}</span>
                      <span className="text-xs font-mono text-right" style={{color:TH.or}}>{adj}N</span></div>})}
                  <div className="grid grid-cols-3 px-3 py-2" style={{background:TH.bg3,borderTop:`1px solid ${TH.bd}`}}>
                    <span className="text-xs font-bold" style={{color:TH.rd}}>Worst case (all)</span>
                    <span className="text-xs font-mono font-bold text-center" style={{color:TH.rd}}>×0.20</span>
                    <span className="text-xs font-mono font-bold text-right" style={{color:TH.rd}}>{(parseFloat(bctData.safeLoad)*0.20).toFixed(0)}N</span></div>
                </div>
                {/* Flute Direction */}
                <div className="rounded-lg p-4 mb-4" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
                  <h3 className="text-xs font-bold mb-2" style={{color:TH.tm}}>FLUTE DIRECTION & GRAIN</h3>
                  <div className="text-xs" style={{color:TH.td}}>Flute direction runs <strong>parallel to the height</strong> (vertical on the dieline). This orientation maximizes stacking/compression strength because the flute columns resist top-to-bottom load. Shown as blue arrows on 2D dieline view.</div>
                </div>
                {/* Recommendations */}
                <div className="rounded-lg p-4" style={{background:TH.gn+"11",border:`1px solid ${TH.gn}33`}}>
                  <h3 className="text-xs font-bold mb-2" style={{color:TH.gn}}>RECOMMENDATIONS</h3>
                  <div className="text-xs" style={{color:TH.td}}>
                    {parseFloat(bctData.safeLoad)>500?"✓ Good compression strength for general shipping.":"⚠ Low compression — consider upgrading material."}<br/>
                    {H/Math.min(L,W)>3?"⚠ Tall/narrow ratio — add internal partition or upgrade to double wall.":"✓ Proportions are structurally sound."}<br/>
                    {T>=3?"✓ Material thickness adequate for stacking.":"⚠ Thin material — limit stack height or add edge protectors."}<br/>
                    ✓ Always store on pallets, not directly on floor. Keep RH below 70% when possible.</div>
                </div>
              </>:<p className="text-sm" style={{color:TH.tf}}>Select a material to see structural data.</p>}
            </div></div>}
            {mTab==="compare"&&isEng&&<div className="p-5 overflow-y-auto h-full"><div className="max-w-4xl mx-auto">
              <h2 className="text-lg font-bold mb-4" style={{color:TH.ac}}>Compare Box Types</h2>
              <div className="mb-4">
                <label className="text-xs font-bold tracking-widest mb-2 block" style={{color:TH.tm}}>COMPARE {bt?.name} WITH:</label>
                <div className="flex flex-wrap gap-1.5">
                  {BOXES.filter(b=>b.id!==boxType).map(b=><button key={b.id} onClick={()=>setCompareId(b.id)}
                    className="px-2.5 py-1.5 rounded-lg text-xs" style={{background:compareId===b.id?TH.ac+"22":TH.bg2,
                      border:`1px solid ${compareId===b.id?TH.ac:TH.bd}`,color:compareId===b.id?TH.ac:TH.td}}>{b.name}</button>)}</div>
              </div>
              {compareId&&compareResult&&compareBox&&<div className="grid grid-cols-2 gap-4">
                {/* Current */}
                <div className="rounded-lg overflow-hidden" style={{border:`1px solid ${TH.ac}55`}}>
                  <div className="px-3 py-2" style={{background:TH.ac+"15"}}><span className="text-xs font-bold" style={{color:TH.ac}}>{bt?.name} (Current)</span></div>
                  <div className="p-3" style={{background:TH.bg2}}>
                    {[["Dims",`${L.toFixed(0)}×${W.toFixed(0)}×${H.toFixed(0)}mm`],
                      ["Sheet",r?`${r.width.toFixed(0)}×${r.height.toFixed(0)}mm`:"—"],
                      ["Segments",r?.segments.length||0],
                      ["Cut Length",segLens.cut?`${(segLens.cut/10).toFixed(0)}cm`:"—"],
                      ["Weight",quote?`${quote.weight}g`:"—"],
                      ["Unit Cost",quote?`$${quote.unitCost}`:"—"],
                      ["BCT",bctData?`${bctData.bct}N`:"—"]
                    ].map(([l,v])=><div key={l} className="flex justify-between py-1 border-b" style={{borderColor:TH.bd}}>
                      <span className="text-xs" style={{color:TH.tf}}>{l}</span>
                      <span className="text-xs font-mono font-bold">{v}</span></div>)}
                  </div>
                  {r&&<svg viewBox={`-5 -5 ${r.width+10} ${r.height+10}`} className="w-full" style={{background:TH.canvas,maxHeight:180}}>
                    {r.segments.map((s,i)=><line key={i} x1={s.x1} y1={r.height-s.y1} x2={s.x2} y2={r.height-s.y2} stroke={LC[s.type]} strokeWidth={s.type==="cut"?1:.5} strokeLinecap="round"/>)}</svg>}
                </div>
                {/* Comparison */}
                <div className="rounded-lg overflow-hidden" style={{border:`1px solid ${TH.bl}55`}}>
                  <div className="px-3 py-2" style={{background:TH.bl+"15"}}><span className="text-xs font-bold" style={{color:TH.bl}}>{compareBox.name}</span></div>
                  <div className="p-3" style={{background:TH.bg2}}>
                    {(()=>{const cr=compareResult,cb=compareBox,cq=calcQuote(cr,mat,selFins,qty),cbct=calcBCT(cb.dL,cb.dW,cb.dH,mat);
                      return[["Dims",`${cb.dL}×${cb.dW}×${cb.dH}mm`],
                        ["Sheet",`${cr.width.toFixed(0)}×${cr.height.toFixed(0)}mm`],
                        ["Segments",cr.segments.length],
                        ["Cut Length",(()=>{let t=0;cr.segments.forEach(s=>{if(s.type==="cut")t+=Math.sqrt((s.x2-s.x1)**2+(s.y2-s.y1)**2)});return`${(t/10).toFixed(0)}cm`})()],
                        ["Weight",cq?`${cq.weight}g`:"—"],
                        ["Unit Cost",cq?`$${cq.unitCost}`:"—"],
                        ["BCT",cbct?`${cbct.bct}N`:"—"]
                      ].map(([l,v])=><div key={l} className="flex justify-between py-1 border-b" style={{borderColor:TH.bd}}>
                        <span className="text-xs" style={{color:TH.tf}}>{l}</span>
                        <span className="text-xs font-mono font-bold">{v}</span></div>)})()}
                  </div>
                  <svg viewBox={`-5 -5 ${compareResult.width+10} ${compareResult.height+10}`} className="w-full" style={{background:TH.canvas,maxHeight:180}}>
                    {compareResult.segments.map((s,i)=><line key={i} x1={s.x1} y1={compareResult.height-s.y1} x2={s.x2} y2={compareResult.height-s.y2} stroke={LC[s.type]} strokeWidth={s.type==="cut"?1:.5} strokeLinecap="round"/>)}</svg>
                </div>
              </div>}
              {!compareId&&<div className="rounded-lg p-8 text-center" style={{background:TH.bg2,border:`1px solid ${TH.bd}`}}>
                <div className="text-2xl mb-2">⚖️</div>
                <div className="text-sm" style={{color:TH.tf}}>Select a box type above to compare side-by-side</div>
              </div>}
            </div></div>}
          </div>

          <div className="flex items-center gap-3 px-4 py-1.5 flex-shrink-0" style={{background:TH.bg1,borderTop:`1px solid ${TH.bd}`}}>
            {Object.entries(LC).filter(([t])=>sc[t]).map(([t,c])=><div key={t} className="flex items-center gap-1">
              <div className="w-4 h-0.5" style={{background:c}}/><span className="text-xs" style={{color:TH.tm}}>{LL[t]} ({sc[t]})</span></div>)}
            <div className="ml-auto flex items-center gap-3">
              {r&&<span className="text-xs font-mono" style={{color:TH.tf}}>{r.width.toFixed(0)}×{r.height.toFixed(0)}mm · {r.segments.length} seg</span>}
              <span className="text-xs" style={{color:TH.tf,opacity:.5}}>⌘E export · ⌘S save · ⌘R reset</span>
            </div>
          </div>
        </div>
      </div>
    </div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
