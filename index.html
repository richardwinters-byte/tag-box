  const px=[0,GW,GW+W,GW+W+L,GW+W+L+W,GW+W+L+W+L];
  glueTab(a,yB,yT,H);for(let i=2;i<px.length;i++)$(a,px[i],yB,px[i],yT,i<px.length-1?"fold":"cut");
  [{x1:px[1],x2:px[2],mj:0},{x1:px[2],x2:px[3],mj:1},{x1:px[3],x2:px[4],mj:0},{x1:px[4],x2:px[5],mj:1}].forEach(p=>{
    const fd=fD,pw=p.x2-p.x1,e=!p.mj?Math.max(1,Math.min(4,pw*.015)):0;
    $(a,p.x1,yT,p.x2,yT,"fold");$(a,p.x1+e,yT,p.x1+e,yT+fd,"cut");if(e>0)$(a,p.x1,yT,p.x1+e,yT+e*.3,"cut");
    $(a,p.x1+e,yT+fd,p.x2-e,yT+fd,"cut");$(a,p.x2-e,yT+fd,p.x2-e,yT,"cut");if(e>0)$(a,p.x2-e,yT+e*.3,p.x2,yT,"cut");
    $(a,p.x1,yB,p.x2,yB,"fold");$(a,p.x1+e,yB,p.x1+e,yB-fd,"cut");if(e>0)$(a,p.x1,yB,p.x1+e,yB-e*.3,"cut");
    $(a,p.x1+e,yB-fd,p.x2-e,yB-fd,"cut");$(a,p.x2-e,yB-fd,p.x2-e,yB,"cut");if(e>0)$(a,p.x2-e,yB-e*.3,p.x2,yB,"cut")});
  const wM=15,wx1=px[2]+wM,wx2=px[3]-wM,wy1=yB+wM,wy2=yT-wM;
  if(wx2>wx1+20&&wy2>wy1+20){const cr=Math.min(10,(wx2-wx1)*.08);
    $(a,wx1+cr,wy1,wx2-cr,wy1,"perf");$(a,wx2-cr,wy1,wx2,wy1+cr,"perf");$(a,wx2,wy1+cr,wx2,wy2-cr,"perf");$(a,wx2,wy2-cr,wx2-cr,wy2,"perf");
    $(a,wx2-cr,wy2,wx1+cr,wy2,"perf");$(a,wx1+cr,wy2,wx1,wy2-cr,"perf");$(a,wx1,wy2-cr,wx1,wy1+cr,"perf");$(a,wx1,wy1+cr,wx1+cr,wy1,"perf")}
  return{segments:a,width:px[5],height:fD+H+fD}}

// ── Kerf offset ──
function offsetSegs(segs,kerf){if(kerf<=0)return segs;const hk=kerf/2;
  return segs.map(s=>{if(s.type!=="cut")return s;const dx=s.x2-s.x1,dy=s.y2-s.y1,l=Math.sqrt(dx*dx+dy*dy);
    if(l===0)return s;const nx=-dy/l*hk,ny=dx/l*hk;return{...s,x1:s.x1+nx,y1:s.y1+ny,x2:s.x2+nx,y2:s.y2+ny}})}

// ── Master dispatcher — ALL 37 box types ──
function generate(id,L,W,H,T,blade){
  const m={"0201":()=>genSlotted(L,W,H,T,"half"),"0202":()=>genSlotted(L,W,H,T,"partial"),"0203":()=>genSlotted(L,W,H,T,"full"),
    "0204":()=>genSlotted(L,W,H,T,"center"),"0210":()=>genHSC(L,W,H),"0215":()=>genSnapLock(L,W,H,T),"0216":()=>genSlotted(L,W,H,T,"tear"),
    "0301":()=>genTelescope(L,W,H,T,.5),"0310":()=>genTelescope(L,W,H,T,.25),"0320":()=>genTelescope(L,W,H,T,.85),
    "0401":()=>genFolder(L,W,H),"0421":()=>genFourCorner(L,W,H),"0427":()=>genMailer(L,W,H),
    "0711":()=>genCrashLock(L,W,H,T,false),"0713":()=>genCrashLock(L,W,H,T,true),
    "MAILER":()=>genMailer(L,W,H),"BOOKWRAP":()=>genBookWrap(L,W,H),"RIGIDMAIL":()=>genRigidMail(L,W,H),
    "TG_RSC":()=>genTGRSC(L,W,H,T),"TG_LOCK":()=>genTGLock(L,W,H,T),"TG_TRAY":()=>genTGTray(L,W,H,T),
    "TG_TELESCOPE":()=>genTGTelescope(L,W,H,T),"TG_SLEEVE":()=>genTGSleeve(L,W,H,T),
    "RIGID_TRAY":()=>genRigidTray(L,W,H),"MAGNETIC":()=>genMagnetic(L,W,H),"DRAWER":()=>genDrawer(L,W,H),
    "SHOULDER":()=>genTelescope(L,W,H,T,.35),"COLLAPSIBLE":()=>genMagnetic(L,W,H),
    "GABLE":()=>genGable(L,W,H),"WINDOW":()=>genWindow(L,W,H),"CARRIER":()=>genSlotted(L,W,H,T,"half"),
    "TUBE":()=>genTube(L,W,H),"TRAP":()=>genTrapezoid(L,W,H),
    "DISPLAY":()=>genDisplay(L,W,H),"PILLOW":()=>genPillow(L,W,H),"HEXAGON":()=>genHex(L,W,H),
    "PIZZA":()=>genPizza(L,W,H),"CAKEBOX":()=>genCakeBox(L,W,H,T),"FOODPAIL":()=>genTrapezoid(L,W,H)};

function validate(id,L,W,H,T,matId){const e=[],w=[];const b=BOXES.find(x=>x.id===id);
  if(L<=0||W<=0||H<=0)e.push("Dims must be > 0");
  if(b){if(L<b.mL)e.push(`Min L: ${b.mL}mm`);if(W<b.mW)e.push(`Min W: ${b.mW}mm`);if(H<b.mH)e.push(`Min H: ${b.mH}mm`)}
  if(L>2500||W>2500)w.push("Very large — check sheet capacity");
  if(H/Math.min(L,W)>5)w.push("Very tall box — consider reinforcement");
  const compat=MAT_COMPAT[id];
  if(compat&&matId&&!compat.includes(matId)){const m=MATS.find(x=>x.id===matId);w.push(`${m?.name||matId} may not suit ${b?.name||id}`)}
  if(T>4&&Math.min(L,W)<100)w.push("Thick material on small box — check foldability");
  return{errors:e,warnings:w,valid:e.length===0}}

function calcBCT(L,W,H,mat){if(!mat)return null;
  const bct=5.87*mat.ect*Math.sqrt(mat.t*2*(L+W)),sl=bct*.65;
  return{bct:bct.toFixed(0),safeLoad:sl.toFixed(0),ect:mat.ect.toFixed(1),stackHeight:Math.floor(sl/50),perim:(2*(L+W)).toFixed(0)}}

function calcQuote(result,mat,selFins,qty=1000){if(!result||!mat)return null;
  const area=(result.width*result.height)/1e6,mc=area*mat.cost;
  const fc=selFins.reduce((s,fid)=>{const f=FINS.find(x=>x.id===fid);return s+(f?f.cpm*area*1000:0)},0);
  const uc=mc+fc/qty+0.02;
  return{unitCost:uc.toFixed(3),per1k:(uc*qty).toFixed(0),weight:(area*mat.gsm).toFixed(0),sheetArea:(area*1e4).toFixed(0),qty}}

function calcSustain(mat,areaM2,qty){if(!mat)return null;
  const w=areaM2*mat.gsm/1000,co2=w*(mat.co2||0.6);
  return{co2:co2.toFixed(3),total:(co2*qty).toFixed(1),trees:(co2*qty/21).toFixed(1),rec:mat.rec||0,
    score:Math.round(Math.min(100,(mat.rec||0)*.4+((mat.co2||0.6)<1?30:10)+15))}}

function nestBoxes(dw,dh,sw,sh){const p=[];let x=5,y=5,rh=0;
  for(let i=0;i<500;i++){if(x+dw+5>sw){x=5;y+=rh+5;rh=0}if(y+dh+5>sh)break;p.push({x,y,w:dw,h:dh});rh=Math.max(rh,dh);x+=dw+5}
  return{placements:p,count:p.length,util:Math.round(p.length*dw*dh/(sw*sh)*100)}}

function genPartition(L,W,H,rows,cols,T){const s=[];const slotH=H*.6;
  for(let c=0;c<cols-1;c++){const bx=c*(W+10);$(s,bx,0,bx+W,0,"cut");$(s,bx+W,0,bx+W,H,"cut");$(s,bx+W,H,bx,H,"cut");$(s,bx,H,bx,0,"cut");
    for(let r=0;r<rows-1;r++){const sx=bx+W/rows*(r+1)-T/2;$(s,sx,0,sx,slotH,"cut");$(s,sx,slotH,sx+T,slotH,"cut");$(s,sx+T,slotH,sx+T,0,"cut")}}
  const oY=H+20;
  for(let r=0;r<rows-1;r++){const bx=r*(L+10);$(s,bx,oY,bx+L,oY,"cut");$(s,bx+L,oY,bx+L,oY+H,"cut");$(s,bx+L,oY+H,bx,oY+H,"cut");$(s,bx,oY+H,bx,oY,"cut");
    for(let c=0;c<cols-1;c++){const sx=bx+L/cols*(c+1)-T/2;$(s,sx,oY+H,sx,oY+H-slotH,"cut");$(s,sx,oY+H-slotH,sx+T,oY+H-slotH,"cut");$(s,sx+T,oY+H-slotH,sx+T,oY+H,"cut")}}
  return{segments:s,width:Math.max((cols-1)*(W+10),(rows-1)*(L+10))||100,height:oY+H+10}}

// Panel detection for artwork placement on 2D dieline
function getPanels(boxId,L,W,H){
  const fD=W/2,b=BOXES.find(x=>x.id===boxId),cat=b?.cat||"slotted";
  let yB,yT;
  if(["slotted","crash","tg","retail"].includes(cat)||["WINDOW","GABLE","CARRIER","TRAP","FOODPAIL"].includes(boxId)){
    yB=fD;yT=fD+H;
    if(boxId==="0215"){yB=fD+15;yT=yB+H}
    if(boxId==="0711"||boxId==="0713"){yB=fD+20;yT=yB+H}
    if(cat==="tg"){yB=fD+(3*3+4);yT=yB+H}
    return[{name:"left",x:GW,y:yB,w:W,h:H},{name:"front",x:GW+W,y:yB,w:L,h:H},{name:"right",x:GW+W+L,y:yB,w:W,h:H},{name:"back",x:GW+W+L+W,y:yB,w:L,h:H}]}
  if(cat==="mailer"||boxId==="MAGNETIC"||boxId==="COLLAPSIBLE")return[{name:"front",x:GW,y:H,w:W,h:L},{name:"back",x:GW,y:H+L+H,w:W,h:L}];
  if(cat==="folder")return[{name:"front",x:H+W,y:H,w:L,h:W},{name:"left",x:H,y:H,w:W,h:L}];
  if(cat==="telescope")return[{name:"front",x:GW+W,y:W/2,w:L,h:H*.5},{name:"left",x:GW,y:W/2,w:W,h:H*.5}];
  if(cat==="luxury"){if(boxId==="RIGID_TRAY"||boxId==="DRAWER")return[{name:"front",x:H,y:H,w:L,h:W}];return[{name:"front",x:GW,y:H,w:W,h:L}]}
  return[{name:"front",x:GW,y:fD,w:L,h:H}]}

function makeCFF2(r,blade,boxId,dims){let o="";const w=s=>{o+=s+"\n"};
  w("# CFF2 - Common File Format Version 2");w(`# TAG Box v8 | ${boxId} ${dims.L}x${dims.W}x${dims.H}mm`);
  w("UNITS=MM");w(`DESIGN=${boxId}_${dims.L}x${dims.W}x${dims.H}`);w("");
  const byType={};r.segments.forEach(s=>{if(!byType[s.type])byType[s.type]=[];byType[s.type].push(s)});
  Object.entries(byType).forEach(([type,segs])=>{
    w(`SECTION=${CFF2_LT[type]||1}`);w(`# ${LL[type]||type} (${segs.length} lines)`);
    const used=new Set(),eps=0.1,chains=[];
    for(let i=0;i<segs.length;i++){if(used.has(i))continue;const chain=[segs[i]];used.add(i);let changed=true;
      while(changed){changed=false;const last=chain[chain.length-1];
        for(let j=0;j<segs.length;j++){if(used.has(j))continue;
          if(Math.abs(last.x2-segs[j].x1)<eps&&Math.abs(last.y2-segs[j].y1)<eps){chain.push(segs[j]);used.add(j);changed=true;break}}}
      chains.push(chain)}
    chains.forEach((ch,ci)=>{w(`POLYLINE=${ci+1}`);w(`${ch[0].x1.toFixed(3)},${ch[0].y1.toFixed(3)}`);ch.forEach(s=>w(`${s.x2.toFixed(3)},${s.y2.toFixed(3)}`));w("ENDPOLYLINE")});w("")});
  w("END");return o}

function makeSVG(r){const{segments:sg,width:ww,height:hh}=r;const p=20;
  const dm={cut:"",fold:"6,4",crease:"8,3,2,3",glue:"3,3",perf:"2,4",tongue:"4,2",groove:"2,2,6,2"};
  let o=`<?xml version="1.0"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${ww+p*2}mm" height="${hh+p*2}mm" viewBox="0 0 ${ww+p*2} ${hh+p*2}">\n<rect width="100%" height="100%" fill="white"/>\n`;

  if(r&&quote){t(m,y,"PRODUCTION",3,"#64748b","bold");y+=5;t(m,y,`Sheet: ${r.width.toFixed(0)}×${r.height.toFixed(0)}mm Weight: ${quote.weight}g Segments: ${r.segments.length}`,2.8,"#0f172a");y+=4;

  if(bctData){t(m,y,"STRUCTURAL (McKee)",3,"#64748b","bold");y+=5;t(m,y,`BCT: ${bctData.bct}N Safe: ${bctData.safeLoad}N Stack: ~${bctData.stackHeight}`,2.8,"#0f172a");y+=6;hr(y);y+=5}

  t(m,y,"BCT = 5.87 × ECT × √(Z × P)",3,"#2563eb","bold");y+=5;
  t(m,y,`ECT=${mat?.ect||0} Z=${T}mm P=${(2*(L+W)).toFixed(0)}mm`,2.8,"#0f172a");y+=6;
  if(bctData){t(m,y,`RESULT: BCT = ${bctData.bct} N`,4,"#16a34a","bold");y+=5;
    t(m,y,`Safe Load (65%): ${bctData.safeLoad} N`,3.5,"#16a34a","bold");y+=5;
    t(m,y,`Stack: ~${bctData.stackHeight} boxes`,3,"#0f172a");y+=8;hr(y);y+=6;
    t(m,y,"DERATING FACTORS",3.5,"#0f172a","bold");y+=5;
    [[">80% RH","×0.65"],[">30 days","×0.75"],["Transit","×0.60"],["Overhang","×0.70"],["Print >40%","×0.90"]].forEach(dr=>{
      t(m,y,dr[0],2.5,"#0f172a");t(m+55,y,dr[1],2.5,"#ef4444","bold");y+=3.8});y+=4;hr(y);y+=6;
    const wc=parseFloat(bctData.safeLoad)*.65*.80;
    t(m,y,`WORST CASE: ${wc.toFixed(0)}N (${Math.floor(wc/50)} boxes)`,3,"#ef4444","bold")}
  return `<?xml version="1.0"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}">\n<rect width="100%" height="100%" fill="white"/>\n${lines.join("\n")}\n</svg>`}

function dl(c,f,m){const b=new Blob([c],{type:m}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=f;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}

  // 3D touch
  const rotRef=useRef(rot);rotRef.current=rot;const zmRef=useRef(zm);zmRef.current=zm;const dragRef=useRef(null);
  useEffect(()=>{const el=canvasRef.current;if(!el)return;
    const isBtn=e=>e.target&&(e.target.tagName==="BUTTON"||e.target.closest("button"));
    const onTS=e=>{if(isBtn(e)||pm!=="3d")return;e.preventDefault();if(e.touches.length===1){const t=e.touches[0];touchRef.current={x:t.clientX,y:t.clientY,rx:rotRef.current.x,ry:rotRef.current.y}}
      if(e.touches.length===2){pinchRef.current={d:Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY),z:zmRef.current}}};
    const onTM=e=>{if(pm!=="3d")return;e.preventDefault();if(e.touches.length===1&&touchRef.current){const t=e.touches[0];setRot({x:touchRef.current.rx+(t.clientY-touchRef.current.y)*.4,y:touchRef.current.ry+(t.clientX-touchRef.current.x)*.4})}
      if(e.touches.length===2&&pinchRef.current){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);setZm(Math.max(.3,Math.min(4,pinchRef.current.z*(d/pinchRef.current.d))))}};
    const onTE=()=>{touchRef.current=null;pinchRef.current=null};
    const onMD=e=>{if(isBtn(e)||pm!=="3d")return;e.preventDefault();dragRef.current={x:e.clientX,y:e.clientY,rx:rotRef.current.x,ry:rotRef.current.y}};
    const onMM=e=>{if(!dragRef.current)return;setRot({x:dragRef.current.rx+(e.clientY-dragRef.current.y)*.4,y:dragRef.current.ry+(e.clientX-dragRef.current.x)*.4})};
    const onMU=()=>{dragRef.current=null};
    const onWh=e=>{if(pm!=="3d")return;e.preventDefault();setZm(z=>Math.max(.3,Math.min(4,z-e.deltaY*.002)))};
    el.addEventListener("touchstart",onTS,{passive:false});el.addEventListener("touchmove",onTM,{passive:false});el.addEventListener("touchend",onTE);
    el.addEventListener("mousedown",onMD);el.addEventListener("mousemove",onMM);el.addEventListener("mouseup",onMU);el.addEventListener("mouseleave",onMU);el.addEventListener("wheel",onWh,{passive:false});
    return()=>{el.removeEventListener("touchstart",onTS);el.removeEventListener("touchmove",onTM);el.removeEventListener("touchend",onTE);
      el.removeEventListener("mousedown",onMD);el.removeEventListener("mousemove",onMM);el.removeEventListener("mouseup",onMU);el.removeEventListener("mouseleave",onMU);el.removeEventListener("wheel",onWh)}},[tab,pm]);

  // AI
  const handleAI=useCallback(async(e,type)=>{
    const file=e.target.files?.[0];if(!file)return;setAiLoading(true);setAiResult(null);
    try{const b64=await new Promise((r,j)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(",")[1]);rd.onerror=()=>j("fail");rd.readAsDataURL(file)});
      const isPDF=file.type==="application/pdf";

        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[{type:isPDF?"document":"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:prompt}]}]})});
      const data=await resp.json();const txt=data.content?.find(c=>c.type==="text")?.text||"";
      const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());setAiResult(parsed);
      if(parsed.length_mm>0)setDims({L:Math.round(parsed.length_mm),W:Math.round(parsed.width_mm),H:Math.round(parsed.height_mm)});

    }catch(err){setAiResult({error:err.toString()})}finally{setAiLoading(false);if(e.target)e.target.value=""}
  },[]);

  // Dim input component
  const Dim=({label,k})=>(
    <div style={{background:S.bg2,borderRadius:14,border:"1px solid "+S.bd,padding:"12px 14px",marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <span style={{fontSize:12,fontWeight:700,color:S.tm,letterSpacing:1}}>{label}</span><span style={{fontSize:11,color:S.tm}}>mm</span></div>

          style={{flex:1,minWidth:0,background:"none",border:"none",color:S.tx,fontSize:26,fontWeight:800,textAlign:"center",outline:"none"}}/>
        <button onClick={()=>setDims(d=>({...d,[k]:d[k]+5}))} style={{width:44,height:44,borderRadius:12,background:S.bg3,border:"1px solid "+S.bd,color:S.ac,fontSize:22,fontWeight:700,flexShrink:0}}>+</button>
      </div></div>);

  // Artwork helpers
  const curArt=artworks[selArt]||null;
  const addArtwork=(data,name)=>setArtworks(a=>{const n=[...a,{id:Date.now(),data,name:name||"Art "+(a.length+1),panel:"front",posX:50,posY:50,scale:60,rot:0}];setSelArt(n.length-1);return n});
  const removeArtwork=idx=>setArtworks(a=>{const n=a.filter((_,i)=>i!==idx);if(selArt>=n.length)setSelArt(Math.max(0,n.length-1));return n});
  const updateArt=(key,val)=>setArtworks(a=>a.map((x,i)=>i===selArt?{...x,[key]:val}:x));
  const resetBranding=()=>{setPrintType("CMYK");setPrintCoverage(40);setBrandColors(["#f59e0b","#000000","#ffffff"]);setArtworks([]);setSelArt(0)};

  // 2D artwork drag helpers
  const svgHit=(e,svg,rr)=>{
    if(!svg||!rr)return null;
    const rect=svg.getBoundingClientRect();
    const ww=rr.width,hh=rr.height,p=10;
    const vbW=ww+p*2,vbH=hh+p*2;
    const scaleX=vbW/rect.width,scaleY=vbH/rect.height,scale=Math.max(scaleX,scaleY);
    const offX=(rect.width*scale-vbW)/2,offY=(rect.height*scale-vbH)/2;
    const cx=(e.clientX||e.touches?.[0]?.clientX||0)-rect.left;
    const cy=(e.clientY||e.touches?.[0]?.clientY||0)-rect.top;
    const svgX=cx*scale-offX-p,svgY=cy*scale-offY-p;
    // Hit test panels (in flipped Y)
    const panels=getPanels(boxId,L,W,H);
    let hit=null;
    panels.forEach(pl=>{const py=hh-pl.y-pl.h;if(svgX>=pl.x&&svgX<=pl.x+pl.w&&svgY>=py&&svgY<=py+pl.h)hit={...pl,pyFlip:py}});
    return{svgX,svgY,hit,scale,offX,offY,rect,panels};
  };
  const onArtDown=(e)=>{
    if(!artworks.length||!svgRef.current||!r)return;
    const info=svgHit(e.nativeEvent||e,svgRef.current,r);
    if(!info)return;
    if(info.hit)updateArt("panel",info.hit.name);

  };
  const onArtMove=(e)=>{
    if(!artDragRef.current)return;
    const d=artDragRef.current,pl=d.panel;if(!pl)return;

    const cy2=(e.clientY||e.touches?.[0]?.clientY||0)-d.rect.top;
    const svgX2=cx2*d.scale-d.offX-10,svgY2=cy2*d.scale-d.offY-10;
    const relX=Math.max(0,Math.min(100,((svgX2-pl.x)/pl.w)*100));

  const onArtUp=()=>{artDragRef.current=null};

  // ── 3D render ──
  const render3D=()=>{
    const sc=Math.min(110/Math.max(L,W,H),.45)*zm,sl=L*sc,sw=W*sc,sh=H*sc,cx=200,cy=170;
    const cX=Math.cos(rot.x*Math.PI/180),sX=Math.sin(rot.x*Math.PI/180),cY=Math.cos(rot.y*Math.PI/180),sY=Math.sin(rot.y*Math.PI/180);
    const proj=(x,y,z)=>{const x1=x*cY-z*sY,z1=x*sY+z*cY,y1=y*cX-z1*sX,z2=y*sX+z1*cX;return{px:cx+x1*400/(400+z2),py:cy-y1*400/(400+z2),z:z2}};
    const hl=sl/2,hw=sw/2,hh=sh/2;const parts=[];const cat=bt?.cat||"slotted";
    const P="rgba(245,158,11,",P2="rgba(217,119,6,",P3="rgba(180,100,6,";
    const box=(ox,oy,oz,bx,by,bz)=>({v:[[ox,oy,oz],[ox+bx,oy,oz],[ox+bx,oy+by,oz],[ox,oy+by,oz],[ox,oy,oz+bz],[ox+bx,oy,oz+bz],[ox+bx,oy+by,oz+bz],[ox,oy+by,oz+bz]],f:[[0,1,2,3],[5,4,7,6],[4,0,3,7],[1,5,6,2],[3,2,6,7],[4,5,1,0]]});
    const openBox=(ox,oy,oz,bx,by,bz)=>({v:[[ox,oy,oz],[ox+bx,oy,oz],[ox+bx,oy+by,oz],[ox,oy+by,oz],[ox,oy,oz+bz],[ox+bx,oy,oz+bz],[ox+bx,oy+by,oz+bz],[ox,oy+by,oz+bz]],f:[[0,1,2,3],[5,4,7,6],[4,0,3,7],[1,5,6,2],[4,5,1,0]]});
    const quad=(v)=>({v,f:[[0,1,2,3]]});
    const id=boxId;

    if(cat==="telescope"||id==="TG_TELESCOPE"||id==="SHOULDER"){
      const bH2=sh*(id==="SHOULDER"?.4:.55),lH2=sh*(id==="SHOULDER"?.3:.4),gap2=sh*(id==="SHOULDER"?.3:.15),ex2=sl*.03;
      parts.push({...openBox(-hl,-hh,-hw,sl,bH2,sw),col:P});
      parts.push({...box(-hl-ex2,-hh+bH2+gap2,-hw-ex2,sl+ex2*2,lH2,sw+ex2*2),col:P2});
      if(id==="SHOULDER"){const ry2=-hh+bH2+gap2*.4,rh=sh*.06;parts.push({...box(-hl-ex2*.5,ry2,-hw-ex2*.5,sl+ex2,rh,sw+ex2),col:P3})}
    } else if(id==="0210"||id==="0401"||id==="0421"||id==="TG_TRAY"){
      parts.push({...openBox(-hl,-hh,-hw,sl,sh,sw),col:P});
    } else if(id==="RIGID_TRAY"){
      const tH2=sh*.3,gap3=sh*.65,slH=sh*.55,ex3=sl*.04;
      parts.push({...openBox(-hl,-hh,-hw,sl,tH2,sw),col:P});
      parts.push({...box(-hl-ex3,-hh+tH2+gap3,-hw-ex3,sl+ex3*2,slH,sw+ex3*2),col:P2});
    } else if(id==="MAGNETIC"||id==="COLLAPSIBLE"){
      const bH3=sh*.5;parts.push({...openBox(-hl,-hh,-hw,sl,bH3,sw),col:P});
      const la2=70*Math.PI/180,ll2=sl*.9,hy=-hh+bH3;
      parts.push({...quad([[-hl,hy,hw],[hl,hy,hw],[hl,hy+ll2*Math.cos(la2),hw+ll2*Math.sin(la2)],[-hl,hy+ll2*Math.cos(la2),hw+ll2*Math.sin(la2)]]),col:P2});
    } else if(id==="DRAWER"||id==="TG_SLEEVE"){
      const pd=sl*.45,wt=sl*.04;parts.push({...box(-hl,-hh,-hw,sl,sh,sw),col:P});
      parts.push({...openBox(-hl+wt-pd,-hh+wt-sh*.15,-hw+wt,sl-wt*2,sh*.7,sw-wt*2),col:P2});
    } else if(id==="MAILER"){
      parts.push({...openBox(-hl,-hh,-hw,sl,sh,sw),col:P});
      const fa=65*Math.PI/180,fp=sh*.85;
      parts.push({...quad([[-hl,-hh,-hw],[hl,-hh,-hw],[hl,-hh-fp*Math.sin(fa),-hw-fp*Math.cos(fa)],[-hl,-hh-fp*Math.sin(fa),-hw-fp*Math.cos(fa)]]),col:P2});
    } else if(id==="PIZZA"){
      parts.push({...openBox(-hl,-hh,-hw,sl,sh,sw),col:P});
      const la3=50*Math.PI/180,ll3=sw*.9;
      parts.push({...quad([[-hl,hh,hw],[hl,hh,hw],[hl,hh+ll3*Math.cos(la3),hw+ll3*Math.sin(la3)],[-hl,hh+ll3*Math.cos(la3),hw+ll3*Math.sin(la3)]]),col:P2});
    } else if(id==="0427"){
      parts.push({...openBox(-hl,-hh,-hw,sl,sh,sw),col:P});
      const la4=55*Math.PI/180,ll4=sw*.8;
      parts.push({...quad([[-hl,hh,hw],[hl,hh,hw],[hl,hh+ll4*Math.cos(la4),hw+ll4*Math.sin(la4)],[-hl,hh+ll4*Math.cos(la4),hw+ll4*Math.sin(la4)]]),col:P2});
    } else if(id==="DISPLAY"){
      const tH3=sh*.35;parts.push({...openBox(-hl,-hh,-hw,sl,tH3,sw),col:P});
      parts.push({...quad([[-hl,-hh+tH3,hw],[hl,-hh+tH3,hw],[hl,hh*1.3,hw],[-hl,hh*1.3,hw]]),col:P2});
    } else if(id==="GABLE"||id==="FOODPAIL"){
      const gH2=sh*.3;parts.push({...box(-hl,-hh,-hw,sl,sh,sw),col:P});
      parts.push({...quad([[0,hh+gH2,-hw],[0,hh+gH2,hw],[-hl,hh,-hw],[-hl,hh,hw]]),col:P2});
    } else if(id==="PILLOW"){
      const n=10,pts=[];for(let i=0;i<=n;i++)pts.push({x:-hl+sl*i/n,c:Math.sin(i/n*Math.PI)*hh*.6});
      for(let i=0;i<n;i++){parts.push({...quad([[pts[i].x,-hh-pts[i].c,-hw],[pts[i+1].x,-hh-pts[i+1].c,-hw],[pts[i+1].x,hh+pts[i+1].c,-hw],[pts[i].x,hh+pts[i].c,-hw]]),col:P});
        parts.push({...quad([[pts[i].x,-hh-pts[i].c,hw],[pts[i+1].x,-hh-pts[i+1].c,hw],[pts[i+1].x,hh+pts[i+1].c,hw],[pts[i].x,hh+pts[i].c,hw]]),col:P2})}
    } else if(id==="HEXAGON"){
      const rad=hw*.9,ns=6,tops=[],bots=[];
      for(let i=0;i<ns;i++){const a=i/ns*Math.PI*2-Math.PI/2;tops.push([Math.cos(a)*rad,hh,Math.sin(a)*rad]);bots.push([Math.cos(a)*rad,-hh,Math.sin(a)*rad])}
      for(let i=0;i<ns;i++){const j=(i+1)%ns;parts.push({...quad([bots[i],bots[j],tops[j],tops[i]]),col:[P,P2,P3][i%3]})}
    } else if(id==="TUBE"){
      const ns2=16,rad2=Math.min(hw,hl)*.9;const tv=[],bv2=[];
      for(let i=0;i<ns2;i++){const a=i/ns2*Math.PI*2;tv.push([Math.cos(a)*rad2,hh,Math.sin(a)*rad2]);bv2.push([Math.cos(a)*rad2,-hh,Math.sin(a)*rad2])}
      for(let i=0;i<ns2;i++){const j=(i+1)%ns2;parts.push({...quad([bv2[i],bv2[j],tv[j],tv[i]]),col:P})}
    } else if(id==="TRAP"){
      const tp2=sw*.12;
      parts.push({v:[[-hl+tp2,-hh,-hw+tp2],[hl-tp2,-hh,-hw+tp2],[hl,hh,-hw],[-hl,hh,-hw],[-hl+tp2,-hh,hw-tp2],[hl-tp2,-hh,hw-tp2],[hl,hh,hw],[-hl,hh,hw]],
        f:[[0,1,2,3],[5,4,7,6],[4,0,3,7],[1,5,6,2],[3,2,6,7],[4,5,1,0]],col:P});
    } else if(id==="BOOKWRAP"){
      const bt3=sh*.15;parts.push({...box(-hl,-hh,-hw,sl,bt3,sw),col:P});
      const wa=55*Math.PI/180,wl=hw*1.2;
      parts.push({...quad([[-hl,-hh+bt3,-hw],[-hl,-hh+bt3,hw],[-hl-wl*Math.sin(wa),-hh+bt3+wl*Math.cos(wa),hw],[-hl-wl*Math.sin(wa),-hh+bt3+wl*Math.cos(wa),-hw]]),col:P2});
      parts.push({...quad([[hl,-hh+bt3,-hw],[hl,-hh+bt3,hw],[hl+wl*Math.sin(wa),-hh+bt3+wl*Math.cos(wa),hw],[hl+wl*Math.sin(wa),-hh+bt3+wl*Math.cos(wa),-hw]]),col:P3});
    } else if(id==="RIGIDMAIL"){
      parts.push({...box(-hl,-hh*.2,-hw,sl,sh*.4,sw),col:P});
    } else if(id==="0713"){
      parts.push({...box(-hl,-hh,-hw,sl,sh,sw),col:P});
      parts.push({...quad([[-hl*.5,hh,-hw],[hl*.5,hh,-hw],[hl*.5,hh+sh*.08,-hw-sh*.06],[-hl*.5,hh+sh*.08,-hw-sh*.06]]),col:P2});
    } else if(id==="CAKEBOX"||id==="WINDOW"){
      parts.push({...box(-hl,-hh,-hw,sl,sh,sw),col:P});
      parts.push({...quad([[-hl*.6,-hh+sh*.25,-hw-.1],[hl*.6,-hh+sh*.25,-hw-.1],[hl*.6,hh-sh*.25,-hw-.1],[-hl*.6,hh-sh*.25,-hw-.1]]),col:"rgba(100,100,100,"});
    } else {
      parts.push({...box(-hl,-hh,-hw,sl,sh,sw),col:P});
    }

    const allFaces=[],allEdges=[];
    parts.forEach(mesh=>{const pv=mesh.v.map(v=>proj(v[0],v[1],v[2]));
      mesh.f.forEach(f=>{const pts=f.map(i=>pv[i]);const v1={x:pts[1].px-pts[0].px,y:pts[1].py-pts[0].py};const v2={x:pts[f.length-1].px-pts[0].px,y:pts[f.length-1].py-pts[0].py};
        const cr=v1.x*v2.y-v1.y*v2.x;const alpha=Math.min(.55,Math.abs(cr)/(80*Math.max(sl,sw,sh)+1)*.6+.04);
        // Compute 3D normal for panel detection
        let panel=null;
        if(f.length>=3){const a=f[0],b=f[1],c=f[f.length-1];
          const e1=[mesh.v[b][0]-mesh.v[a][0],mesh.v[b][1]-mesh.v[a][1],mesh.v[b][2]-mesh.v[a][2]];
          const e2=[mesh.v[c][0]-mesh.v[a][0],mesh.v[c][1]-mesh.v[a][1],mesh.v[c][2]-mesh.v[a][2]];
          const nx=e1[1]*e2[2]-e1[2]*e2[1],ny=e1[2]*e2[0]-e1[0]*e2[2],nz=e1[0]*e2[1]-e1[1]*e2[0];
          const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
          const anx=Math.abs(nx/nl),any=Math.abs(ny/nl),anz=Math.abs(nz/nl);
          if(anz>anx&&anz>any)panel=nz>0?"front":"back";
          else if(anx>any)panel=nx>0?"right":"left";
          else panel=ny>0?"top":"bottom"}
        allFaces.push({pts,avgZ:pts.reduce((s,p)=>s+p.z,0)/pts.length,alpha,cross:cr,col:mesh.col||P,panel})});
      if(mesh.v.length===8)[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]].forEach(([a,b])=>allEdges.push([pv[a],pv[b]]));
      else if(mesh.v.length===4)[[0,1],[1,2],[2,3],[3,0]].forEach(([a,b])=>allEdges.push([pv[a],pv[b]]));
    });
    allFaces.sort((a,b)=>a.avgZ-b.avgZ);
    const mB=proj(0,-sh/2-18,0),mSi=proj(sl/2+18,0,0),mL=proj(-sl/2-18,0,0);
    return <svg viewBox="0 0 400 350" style={{width:"100%",height:"100%",background:S.canvas,pointerEvents:"none"}}>
      <rect width="400" height="350" fill={S.canvas}/>
      <ellipse cx={cx} cy={cy+sh/2*zm+22} rx={sl*.6} ry={sw*.15} fill="#f59e0b" fillOpacity=".06"/>
      {allFaces.filter(f=>f.cross>0).map((f,i)=>{
        // Find artwork for this face
        const faceArts=[];
        if(f.panel&&artworks.length>0){artworks.forEach((art,ai)=>{
          const tp=art.panel==="all"?["front","back","left","right"]:[art.panel];
          if(tp.indexOf(f.panel)>=0)faceArts.push({art,ai})})}
        // Face bounding box for artwork placement
        let x1=f.pts[0].px,y1=f.pts[0].py,x2=x1,y2=y1;
        for(let k=1;k<f.pts.length;k++){if(f.pts[k].px<x1)x1=f.pts[k].px;if(f.pts[k].px>x2)x2=f.pts[k].px;if(f.pts[k].py<y1)y1=f.pts[k].py;if(f.pts[k].py>y2)y2=f.pts[k].py}
        const fw=x2-x1,fh=y2-y1;
        return <g key={"fz"+i}>
          <polygon points={f.pts.map(p=>p.px+","+p.py).join(" ")} fill={f.col+f.alpha.toFixed(2)+")"} stroke="#f59e0b" strokeWidth=".6" strokeOpacity=".4"/>
          {faceArts.length>0&&fw>12&&fh>12&&faceArts.map(fa=>{
            const sc2=fa.art.scale/100,iw2=fw*sc2,ih2=fh*sc2;
            const ix2=x1+(fw-iw2)*(fa.art.posX/100),iy2=y1+(fh-ih2)*(fa.art.posY/100);
            return <image key={"ai3d"+fa.ai} href={fa.art.data} x={ix2} y={iy2} width={iw2} height={ih2} preserveAspectRatio="xMidYMid meet" opacity=".85"/>})}
        </g>})}
      {allEdges.map(([p1,p2],i)=><line key={"e"+i} x1={p1.px} y1={p1.py} x2={p2.px} y2={p2.py} stroke="#f59e0b" strokeWidth="1" strokeOpacity=".5"/>)}
      <text x={mB.px} y={mB.py+14} textAnchor="middle" fill="#94a3b8" fontSize="12" fontFamily="monospace" fontWeight="700">{L}mm</text>
      <text x={mSi.px+10} y={mSi.py} fill="#94a3b8" fontSize="12" fontFamily="monospace" fontWeight="700">{H}mm</text>
      <text x={mL.px-10} y={mL.py} textAnchor="end" fill="#94a3b8" fontSize="12" fontFamily="monospace" fontWeight="700">{W}mm</text>
      <text x={200} y={18} textAnchor="middle" fill="#f59e0b" fontSize="12" fontWeight="700">{bt?.name||"Box"}</text>
      <text x={200} y={340} textAnchor="middle" fill="#64748b" fontSize="10" fontFamily="monospace">Drag: orbit · Pinch: zoom · {(zm*100).toFixed(0)}%</text>
    </svg>};


  // ═══ RENDER ═══
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:S.bg0,overflow:"hidden"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 6px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${S.ac},${S.ac2})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#000"}}>BX</div>
          <div><div style={{fontWeight:800,fontSize:16,color:S.tx}}>{bt?.name||"TAG Box"}</div>
            <div style={{fontSize:11,color:S.tm}}>{mat?.name} · {L}×{W}×{H}mm</div></div></div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setDk(!dk)} style={{width:36,height:36,borderRadius:18,background:S.bg3,border:"none",fontSize:17}}>{dk?"☀️":"🌙"}</button>
          <button onClick={()=>setSheet("export")} style={{height:36,padding:"0 16px",borderRadius:18,background:`linear-gradient(135deg,${S.ac},${S.ac2})`,border:"none",fontWeight:800,fontSize:13,color:"#000"}}>Export</button>
        </div></div>
      {unitCost&&<div style={{display:"flex",gap:12,padding:"4px 16px 6px"}}>
        <span style={{fontSize:11,color:S.tm}}>$<b style={{color:S.gn}}>{unitCost}</b>/unit</span>
        {bctData&&<span style={{fontSize:11,color:S.tm}}>BCT: <b style={{color:S.gn}}>{bctData.safeLoad}N</b></span>}
        <button onClick={()=>setSheet("quote")} style={{fontSize:11,color:S.ac,background:"none",border:"none",fontWeight:700,marginLeft:"auto"}}>Quote →</button>
      </div>}

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>

        {/* ═══ DESIGN TAB ═══ */}
        {tab==="design"&&<div style={{flex:1,overflow:"auto",padding:"0 16px 16px",WebkitOverflowScrolling:"touch"}}>
          <Dim label="LENGTH" k="L"/><Dim label="WIDTH" k="W"/><Dim label="HEIGHT" k="H"/>
          <button onClick={resetDims} style={{width:"100%",padding:12,borderRadius:12,background:S.bg3,border:"1px solid "+S.bd,color:S.td,fontSize:13,fontWeight:600,marginBottom:16}}>↺ Reset Dimensions</button>
          {!v.valid&&<div style={{padding:14,borderRadius:14,background:S.rd+"15",border:"1px solid "+S.rd+"33",marginBottom:12}}>
            {v.errors.map((e,i)=><div key={i} style={{color:S.rd,fontSize:13,fontWeight:600}}>✗ {e}</div>)}</div>}
          {v.warnings.length>0&&<div style={{padding:10,borderRadius:12,background:S.ac+"15",marginBottom:12}}>
            {v.warnings.map((w,i)=><div key={i} style={{color:S.ac,fontSize:12}}>⚠ {w}</div>)}</div>}
          <div style={{fontWeight:800,fontSize:13,color:S.tm,marginBottom:6,letterSpacing:1}}>MATERIAL</div>
          <div style={{overflowX:"scroll",WebkitOverflowScrolling:"touch",paddingBottom:8,marginBottom:12,marginLeft:-16,marginRight:-16,paddingLeft:16,paddingRight:16}}>
            <div style={{display:"flex",gap:6,width:"max-content"}}>
            {MATS.map(m=><button key={m.id} onClick={()=>setMatId(m.id)} style={{padding:"10px 16px",borderRadius:12,background:matId===m.id?S.ac+"20":S.bg2,border:"2px solid "+(matId===m.id?S.ac:S.bd),minWidth:90}}>
              <div style={{fontWeight:700,fontSize:13,color:matId===m.id?S.ac:S.tx,whiteSpace:"nowrap"}}>{m.name}</div>
              <div style={{fontSize:11,color:S.tm,marginTop:2}}>{m.t}mm</div></button>)}
            </div></div>
          {mat?.desc&&<div style={{padding:10,borderRadius:10,background:S.bg2,border:"1px solid "+S.bd,marginBottom:12,fontSize:11,color:S.td,lineHeight:1.4}}>{mat.desc}</div>}
          <div style={{fontWeight:800,fontSize:13,color:S.tm,marginBottom:6,letterSpacing:1}}>BOX TYPE</div>
          <div style={{overflowX:"scroll",WebkitOverflowScrolling:"touch",paddingBottom:8,marginBottom:8,marginLeft:-16,marginRight:-16,paddingLeft:16,paddingRight:16}}>
            <div style={{display:"flex",gap:6,width:"max-content"}}>
            <button onClick={()=>setCatF(null)} style={{padding:"7px 14px",borderRadius:20,background:!catF?S.ac:"transparent",border:"1px solid "+(!catF?S.ac:S.bd),color:!catF?"#000":S.td,fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>All ({BOXES.length})</button>
            {CATS.map(c=>{const cnt=BOXES.filter(b=>b.cat===c.id).length;return <button key={c.id} onClick={()=>setCatF(catF===c.id?null:c.id)} style={{padding:"7px 14px",borderRadius:20,background:catF===c.id?S.ac:"transparent",border:"1px solid "+(catF===c.id?S.ac:S.bd),color:catF===c.id?"#000":S.td,fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{c.icon} {c.name} ({cnt})</button>})}
            </div></div>
          {fBoxes.map(b=>{const sel=boxId===b.id;return <button key={b.id} onClick={()=>changeBox(b.id)}
            style={{display:"flex",alignItems:"center",gap:14,padding:16,borderRadius:16,background:sel?S.ac+"12":S.bg2,border:"2px solid "+(sel?S.ac:S.bd),width:"100%",marginBottom:8,textAlign:"left"}}>
            <div style={{width:40,height:40,borderRadius:12,background:sel?S.ac+"22":S.bg3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{CATS.find(x=>x.id===b.cat)?.icon||"📦"}</div>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15,color:sel?S.ac:S.tx}}>{b.name}</div>
              <div style={{fontSize:12,color:S.tm}}>{b.sub} — {b.desc}</div></div>
            {sel&&<div style={{width:28,height:28,borderRadius:14,background:S.ac,display:"flex",alignItems:"center",justifyContent:"center",color:"#000",fontWeight:900,fontSize:14}}>✓</div>}
          </button>})}
        </div>}

        {/* ═══ PREVIEW TAB ═══ */}
        {tab==="preview"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{display:"flex",gap:6,padding:"6px 16px",flexShrink:0}}>
            {[["2d","2D Dieline"],["3d","3D Interactive"]].map(([k,l])=><button key={k} onClick={()=>setPm(k)}
              style={{flex:1,padding:12,borderRadius:12,background:pm===k?S.ac:S.bg3,border:"none",color:pm===k?"#000":S.td,fontSize:15,fontWeight:700}}>{l}</button>)}</div>
          <div ref={canvasRef} style={{flex:1,overflow:"hidden",margin:"6px 12px 8px",borderRadius:16,border:"1px solid "+S.bd,touchAction:"none",cursor:pm==="3d"?"grab":"default",userSelect:"none",WebkitUserSelect:"none",position:"relative"}}>
            {!r?<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:S.tm}}>Fix dimensions to preview</div>
            :pm==="2d"?(()=>{const{segments:ss,width:ww,height:hh}=r;const p=10;
              const dm={cut:"none",fold:"6,3",crease:"8,3,2,3",glue:"3,3",perf:"2,4",tongue:"4,2",groove:"2,2,6,2"};
              const sw2={cut:1.2,fold:.7,crease:.5,glue:.5,perf:.6,tongue:1,groove:.8};
              return <svg ref={svgRef} viewBox={-p+" "+(-p)+" "+(ww+p*2)+" "+(hh+p*2)} style={{width:"100%",height:"100%",background:S.canvas,cursor:artworks.length?"move":"crosshair"}}
                onMouseDown={onArtDown} onMouseMove={onArtMove} onMouseUp={onArtUp} onMouseLeave={onArtUp}
                onTouchStart={e=>{if(artworks.length){onArtDown(e)}}} onTouchMove={e=>{if(artDragRef.current){e.preventDefault();onArtMove(e.nativeEvent||e)}}} onTouchEnd={onArtUp}>
                <defs><pattern id="gr" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke={S.bd} strokeWidth=".15"/></pattern></defs>
                <rect x={-p*4} y={-p*4} width={(ww+p*2)*4} height={(hh+p*2)*4} fill="url(#gr)"/>
                {ss.map((s,i)=><line key={i} x1={s.x1} y1={hh-s.y1} x2={s.x2} y2={hh-s.y2} stroke={LC[s.type]} strokeWidth={sw2[s.type]||.6} strokeDasharray={dm[s.type]} strokeLinecap="round"/>)}
                {/* Panel highlights */}
                {(()=>{const panels=getPanels(boxId,L,W,H);return panels.map((pl,pi)=>{
                  const py=hh-pl.y-pl.h;const isSel=curArt&&(curArt.panel===pl.name||curArt.panel==="all");
                  return <g key={"ph"+pi}><rect x={pl.x} y={py} width={pl.w} height={pl.h} fill={S.ac} fillOpacity={isSel?.04:.01} stroke={S.ac} strokeWidth={isSel?1:.4} strokeDasharray="4,2" strokeOpacity={isSel?.35:.15}/>
                    <text x={pl.x+3} y={py+6} fill={S.ac} fontSize={Math.max(3,Math.min(5,pl.w*.02))} fontFamily="monospace" fillOpacity=".35">{pl.name.toUpperCase()}</text></g>})})()}
                {/* Artwork on panels */}
                {artworks.length>0&&(()=>{const panels=getPanels(boxId,L,W,H);return artworks.map((art,ai)=>{
                  const targetPanels=art.panel==="all"?panels:panels.filter(p=>p.name===art.panel);
                  return targetPanels.map((pl,pi)=>{
                    const py=hh-pl.y-pl.h,sc2=art.scale/100;
                    const iw=Math.min(pl.w*sc2,pl.w*.95),ih=Math.min(pl.h*sc2,pl.h*.95);
                    const ix=pl.x+(pl.w-iw)*(art.posX/100),iy=py+(pl.h-ih)*(art.posY/100);
                    const cx2=ix+iw/2,cy2=iy+ih/2,isSel=ai===selArt;
                    return <g key={"a"+ai+"p"+pi}>
                      <image href={art.data} x={ix} y={iy} width={iw} height={ih} preserveAspectRatio="xMidYMid meet" opacity={isSel?.9:.65}
                        transform={art.rot!==0?`rotate(${art.rot},${cx2},${cy2})`:undefined}/>
                      {isSel&&<rect x={ix} y={iy} width={iw} height={ih} fill="none" stroke={S.ac} strokeWidth=".6" strokeDasharray="2,2" strokeOpacity=".6"/>}
                    </g>})})})()}
                <text x={ww/2} y={hh+p-1} textAnchor="middle" fill={S.ac} fontSize="5" fontFamily="monospace">{ww.toFixed(0)}×{hh.toFixed(0)}mm</text>
                {artworks.length>0&&<text x={ww/2} y={-3} textAnchor="middle" fill={S.ac} fontSize="3.5" fontFamily="monospace" fillOpacity=".5">Drag on panel to reposition artwork</text>}
                </svg>})()
            :render3D()}
            {pm==="3d"&&r&&<button onClick={()=>{setRot({x:-25,y:35});setZm(1)}} style={{position:"absolute",top:8,right:8,padding:"6px 12px",borderRadius:10,background:"rgba(10,15,26,.85)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",border:"1px solid "+S.bd,color:S.td,fontSize:11,fontWeight:700,fontFamily:"monospace",pointerEvents:"auto",zIndex:2}}>↺ Reset View</button>}
          </div>
          {r&&<div style={{overflowX:"scroll",WebkitOverflowScrolling:"touch",padding:"0 16px 6px",flexShrink:0}}>
            <div style={{display:"flex",gap:8,width:"max-content"}}>
            {Object.entries(LC).filter(([t])=>segC[t]).map(([t,c])=><div key={t} style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:14,height:3,borderRadius:2,background:c}}/><span style={{fontSize:11,color:S.tm,whiteSpace:"nowrap"}}>{LL[t]} {segC[t]}</span></div>)}
            </div></div>}
        </div>}


        {/* ═══ SPECS TAB ═══ */}
        {tab==="specs"&&<div style={{flex:1,overflow:"auto",padding:"0 16px 16px",WebkitOverflowScrolling:"touch"}}>
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            {[["specs","📋 Specs"],["struct","📊 Structural"]].map(([k,l])=>
              <button key={k} onClick={()=>setSpecView(k)} style={{flex:1,padding:12,borderRadius:12,background:specView===k?S.ac:S.bg3,border:"none",color:specView===k?"#000":S.td,fontSize:14,fontWeight:700}}>{l}</button>)}</div>

          {specView==="specs"&&<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div><div style={{fontWeight:800,fontSize:20,color:S.ac}}>{bt?.name}</div><div style={{fontSize:13,color:S.td}}>{bt?.sub} — {bt?.desc}</div></div>
              <button onClick={()=>doExport("spec-pdf")} style={{padding:"8px 12px",borderRadius:10,background:S.rd+"22",color:S.rd,border:"none",fontSize:12,fontWeight:700,flexShrink:0}}>📄 PDF</button></div>
            <div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>EXTERNAL DIMENSIONS</div>

      {sheet==="finishes"&&<Sheet title={`Finishes & Branding (${selFins.length})`} onClose={()=>setSheet(null)} t={S}>
        {/* ── ARTWORK & BRANDING ── */}
        <input ref={logoRef} type="file" accept="image/*" onChange={e=>{const f=e.target.files?.[0];if(!f)return;const rd=new FileReader();rd.onload=()=>addArtwork(rd.result,f.name);rd.readAsDataURL(f);e.target.value=""}} style={{display:"none"}}/>
        <div style={{fontWeight:800,fontSize:11,color:S.tm,letterSpacing:2,marginBottom:8}}>🎨 ARTWORK & BRANDING</div>
        <div style={{padding:16,borderRadius:14,background:S.bg3,border:"1px solid "+S.bd,marginBottom:16}}>
          {/* Artwork thumbnails */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
            {artworks.map((art,ai)=>{const isSel=ai===selArt;return <div key={art.id} onClick={()=>setSelArt(ai)} style={{width:60,cursor:"pointer",textAlign:"center"}}>
              <div style={{width:60,height:60,borderRadius:10,border:"2px solid "+(isSel?S.ac:S.bd),overflow:"hidden",background:S.bg2,position:"relative"}}>
                <img src={art.data} style={{width:"100%",height:"100%",objectFit:"contain"}}/>
                <button onClick={ev=>{ev.stopPropagation();removeArtwork(ai)}} style={{position:"absolute",top:2,right:2,width:18,height:18,borderRadius:9,background:"rgba(0,0,0,.6)",border:"none",color:"#fff",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                {isSel&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:S.ac}}/>}</div>
              <div style={{fontSize:9,color:isSel?S.ac:S.tm,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{art.panel}</div></div>})}
            <div onClick={()=>logoRef.current?.click()} style={{width:60,height:60,borderRadius:10,border:"2px dashed "+S.ac+"66",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:S.bg2}}>
              <span style={{fontSize:22,color:S.ac}}>+</span><span style={{fontSize:8,color:S.tm}}>Add Art</span></div>
          </div>
          <div style={{fontSize:10,color:S.tm,marginBottom:8}}>Upload PNG, JPG, or SVG. Each artwork can target a different panel.</div>

          {/* Selected artwork controls */}
          {curArt&&<>
            <div style={{fontWeight:700,fontSize:12,color:S.ac,marginBottom:8}}>{curArt.name}</div>
            <div style={{fontSize:10,color:S.tm,marginBottom:4}}>Panel</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
              {["front","back","left","right","all"].map(pn=><button key={pn} onClick={()=>updateArt("panel",pn)}
                style={{padding:"5px 12px",borderRadius:8,fontSize:10,fontWeight:curArt.panel===pn?700:500,background:curArt.panel===pn?S.ac+"20":"transparent",border:"1px solid "+(curArt.panel===pn?S.ac:S.bd),color:curArt.panel===pn?S.ac:S.td,textTransform:"capitalize"}}>{pn}</button>)}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:S.tm}}><span>X Pos</span><span>{curArt.posX}%</span></div><input type="range" min={0} max={100} value={curArt.posX} onChange={e=>updateArt("posX",+e.target.value)}/></div>
              <div><div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:S.tm}}><span>Y Pos</span><span>{curArt.posY}%</span></div><input type="range" min={0} max={100} value={curArt.posY} onChange={e=>updateArt("posY",+e.target.value)}/></div>
              <div><div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:S.tm}}><span>Scale</span><span>{curArt.scale}%</span></div><input type="range" min={10} max={100} value={curArt.scale} onChange={e=>updateArt("scale",+e.target.value)}/></div>
              <div><div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:S.tm}}><span>Rotate</span><span>{curArt.rot}°</span></div><input type="range" min={-180} max={180} step={5} value={curArt.rot} onChange={e=>updateArt("rot",+e.target.value)}/></div>
            </div>
            <div style={{display:"flex",gap:4,marginBottom:8}}>{[["Center",50,50,60,0],["Top",50,10,40,0],["Bottom",50,90,35,0],["Full",50,50,95,0]].map(pr=>
              <button key={pr[0]} onClick={()=>setArtworks(a=>a.map((x,i)=>i===selArt?{...x,posX:pr[1],posY:pr[2],scale:pr[3],rot:pr[4]}:x))}
                style={{flex:1,fontSize:9,padding:6,borderRadius:6,background:S.bg2,border:"1px solid "+S.bd,color:S.td,fontFamily:"monospace"}}>{pr[0]}</button>)}</div>
          </>}

          {/* Brand Colors */}
          <div style={{paddingTop:12,borderTop:"1px solid "+S.bd,marginTop:8}}>
            <div style={{fontSize:11,fontWeight:600,color:S.tx,marginBottom:6}}>Brand Colors</div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              {brandColors.map((c,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:4}}>
                <input type="color" value={c} onChange={e=>{const nc=[...brandColors];nc[i]=e.target.value;setBrandColors(nc)}} style={{width:32,height:32,borderRadius:8,border:"1px solid "+S.bd,padding:0,cursor:"pointer"}}/>
                {brandColors.length>1&&<button onClick={()=>setBrandColors(brandColors.filter((_,j)=>j!==i))} style={{width:16,height:16,borderRadius:4,background:"transparent",border:"1px solid "+S.bd,color:S.tm,cursor:"pointer",fontSize:10}}>×</button>}</div>)}
              {brandColors.length<6&&<button onClick={()=>setBrandColors([...brandColors,"#888888"])} style={{width:32,height:32,borderRadius:8,border:"2px dashed "+S.bd,background:"transparent",color:S.tm,fontSize:16,cursor:"pointer"}}>+</button>}
            </div>
          </div>

          {/* Print Method */}
          <div style={{paddingTop:12,borderTop:"1px solid "+S.bd,marginTop:12}}>
            <div style={{fontSize:11,fontWeight:600,color:S.tx,marginBottom:6}}>Print Method</div>
            <div style={{display:"flex",gap:4}}>
              {["CMYK","Pantone","Digital","Flexo"].map(pt=><button key={pt} onClick={()=>setPrintType(pt)}
                style={{flex:1,padding:8,borderRadius:8,fontSize:11,fontWeight:printType===pt?700:500,background:printType===pt?S.ac+"20":"transparent",border:"1px solid "+(printType===pt?S.ac:S.bd),color:printType===pt?S.ac:S.td}}>{pt}</button>)}</div>
          </div>

          {/* Ink Coverage */}
          <div style={{paddingTop:12,borderTop:"1px solid "+S.bd,marginTop:12}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}><span style={{fontWeight:600,color:S.tx}}>Ink Coverage</span><span style={{fontWeight:800,color:S.ac,fontFamily:"monospace"}}>{printCoverage}%</span></div>
            <input type="range" min={5} max={100} step={5} value={printCoverage} onChange={e=>setPrintCoverage(+e.target.value)}/>
            <div style={{fontSize:10,color:S.tm}}>{printCoverage>60?"High — may reduce BCT ~10%":printCoverage>30?"Standard — good balance":"Light — preserves board strength"}</div>
          </div>

          {/* Reset branding */}
          <button onClick={resetBranding} style={{width:"100%",marginTop:12,padding:10,borderRadius:10,background:S.bg2,border:"1px solid "+S.bd,color:S.tm,fontSize:12,fontWeight:600}}>↺ Reset All Branding</button>
        </div>

        {/* ── SURFACE FINISHES ── */}
        <div style={{fontWeight:800,fontSize:11,color:S.tm,letterSpacing:2,marginBottom:8}}>SURFACE FINISHES</div>
        {selFins.length>0&&<button onClick={()=>setSelFins([])} style={{width:"100%",padding:10,borderRadius:10,background:S.rd+"22",border:"none",color:S.rd,fontWeight:700,fontSize:13,marginBottom:12}}>Clear All ({selFins.length})</button>}
        {FIN_CATS.map(fc=>{const fins=FINS.filter(f=>f.cat===fc.id);if(!fins.length)return null;
          return <div key={fc.id}><div style={{fontWeight:800,fontSize:11,color:S.tm,letterSpacing:2,margin:"12px 0 6px"}}>{fc.icon} {fc.name.toUpperCase()}</div>
            {fins.map(f=>{const sel=selFins.includes(f.id);return <button key={f.id} onClick={()=>setSelFins(p=>sel?p.filter(x=>x!==f.id):[...p,f.id])}
              style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:14,borderRadius:12,background:sel?S.ac+"15":S.bg3,border:"2px solid "+(sel?S.ac:S.bd),width:"100%",marginBottom:6,textAlign:"left"}}>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:sel?S.ac:S.tx}}>{f.name}</div><div style={{fontSize:11,color:S.tm,marginTop:2}}>{f.desc}</div></div>
              <div style={{fontSize:11,fontFamily:"monospace",color:sel?S.ac:S.tm,flexShrink:0,marginLeft:8}}>{sel?"✓":"$"+(f.cpm*1000).toFixed(0)+"/m²"}</div></button>})}</div>})}
      </Sheet>}

      {sheet==="blade"&&<Sheet title="Blade Config" onClose={()=>setSheet(null)} t={S}>
        <button onClick={()=>{setBK(0.3);setBA(90);setBT("rotary")}} style={{width:"100%",padding:10,borderRadius:10,background:S.bg3,border:"1px solid "+S.bd,color:S.td,fontWeight:700,fontSize:13,marginBottom:12}}>↺ Reset to Default</button>
        <div style={{fontWeight:800,fontSize:11,color:S.tm,letterSpacing:2,marginBottom:8}}>BLADE TYPE</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:20}}>
          {["rotary","flatbed","laser","digital"].map(tp=>
            <button key={tp} onClick={()=>{setBT(tp);if(tp==="laser")setBK(0)}} style={{padding:14,borderRadius:12,fontSize:14,fontWeight:bt2===tp?700:500,background:bt2===tp?S.ac+"20":S.bg3,border:"2px solid "+(bt2===tp?S.ac:S.bd),color:bt2===tp?S.ac:S.td,textTransform:"capitalize"}}>{tp}</button>)}</div>
        <div style={{fontWeight:800,fontSize:11,color:S.tm,letterSpacing:2,marginBottom:8}}>KERF: {bk}mm</div>
        <input type="range" min="0" max="2" step="0.05" value={bk} onChange={e=>setBK(+e.target.value)}/>
        <div style={{fontWeight:800,fontSize:11,color:S.tm,letterSpacing:2,marginBottom:8,marginTop:16}}>ANGLE: {ba}°</div>
        <input type="range" min="15" max="90" step="1" value={ba} onChange={e=>setBA(+e.target.value)}/>
        <div style={{fontWeight:800,fontSize:11,color:S.tm,letterSpacing:2,marginBottom:8,marginTop:16}}>PRESETS</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {[["Standard",0.3,90,"rotary"],["Precision",0.5,90,"flatbed"],["Laser",0,90,"laser"],["V-Cut 45°",0.4,45,"flatbed"]].map(p=>
            <button key={p[0]} onClick={()=>{setBK(p[1]);setBA(p[2]);setBT(p[3])}} style={{padding:10,borderRadius:10,background:S.bg3,border:"1px solid "+S.bd,textAlign:"left"}}>
              <div style={{fontWeight:600,color:S.tx}}>{p[0]}</div><div style={{fontSize:10,color:S.tm,fontFamily:"monospace"}}>K:{p[1]} A:{p[2]}° {p[3]}</div></button>)}</div>
      </Sheet>}

      {sheet==="nesting"&&<Sheet title="Sheet Nesting" onClose={()=>setSheet(null)} t={S}>
        {r?(()=>{const ns=SHEETS.find(s=>s.id===nestSheet);const nr=nestBoxes(r.width,r.height,ns?.w||1200,ns?.h||1000);
          return <><div style={{display:"flex",gap:6,marginBottom:12}}>{SHEETS.map(s=><button key={s.id} onClick={()=>setNestSheet(s.id)} style={{flex:1,padding:8,borderRadius:10,background:nestSheet===s.id?S.ac+"20":S.bg3,border:"2px solid "+(nestSheet===s.id?S.ac:S.bd),fontSize:11,fontFamily:"monospace",color:nestSheet===s.id?S.ac:S.td}}>{s.n}</button>)}</div>
            <div style={{display:"flex",gap:6,marginBottom:12}}>{[["Per Sheet",nr.count],["Util",nr.util+"%"],["Sheets/"+qty,Math.ceil(qty/Math.max(1,nr.count))]].map(([l,v])=><div key={l} style={{flex:1,padding:10,borderRadius:12,background:S.bg2,textAlign:"center"}}><div style={{fontSize:10,color:S.tm}}>{l}</div><div style={{fontSize:18,fontWeight:800,fontFamily:"monospace",color:S.gn}}>{v}</div></div>)}</div>
            <svg viewBox={`-5 -5 ${(ns?.w||1200)+10} ${(ns?.h||1000)+10}`} style={{width:"100%",height:180,background:S.canvas,borderRadius:10,border:"1px solid "+S.bd}}>
              <rect width={ns?.w||1200} height={ns?.h||1000} fill="none" stroke={S.bd} strokeWidth="2"/>
              {nr.placements.map((p,i)=><rect key={i} x={p.x} y={p.y} width={p.w} height={p.h} fill={S.ac} fillOpacity=".08" stroke={S.ac} strokeWidth="1" rx="1"/>)}</svg></>})()
        :<div style={{textAlign:"center",padding:30,color:S.tm}}>Generate a design first</div>}
      </Sheet>}

      {sheet==="inserts"&&<Sheet title="Insert Generator" onClose={()=>setSheet(null)} t={S}>
        {(()=>{const ir=genPartition(L,W,H,insR,insC,mT);
          return <><div style={{display:"flex",gap:16,marginBottom:16}}>
            <div style={{flex:1}}><div style={{fontSize:11,color:S.tm,marginBottom:4}}>Rows: {insR}</div><input type="range" min="1" max="8" value={insR} onChange={e=>setInsR(+e.target.value)}/></div>
            <div style={{flex:1}}><div style={{fontSize:11,color:S.tm,marginBottom:4}}>Cols: {insC}</div><input type="range" min="1" max="8" value={insC} onChange={e=>setInsC(+e.target.value)}/></div></div>
            <div style={{display:"flex",gap:6,marginBottom:12}}>{[["Cells",insR*insC],["Parts",(insR-1)+(insC-1)],["Cell",(L/insC).toFixed(0)+"×"+(W/insR).toFixed(0)]].map(([l,v])=><div key={l} style={{flex:1,padding:10,borderRadius:10,background:S.bg2,textAlign:"center"}}><div style={{fontSize:10,color:S.tm}}>{l}</div><div style={{fontSize:16,fontWeight:800,fontFamily:"monospace",color:S.gn}}>{v}</div></div>)}</div>
            {ir&&<svg viewBox={`-5 -5 ${ir.width+10} ${ir.height+10}`} style={{width:"100%",height:160,background:S.canvas,borderRadius:10,border:"1px solid "+S.bd}}>
              {ir.segments.map((s,i)=><line key={i} x1={s.x1} y1={ir.height-s.y1} x2={s.x2} y2={ir.height-s.y2} stroke={S.rd} strokeWidth=".8"/>)}</svg>}
            <button onClick={()=>{const ir2=genPartition(L,W,H,insR,insC,mT);if(ir2)dl(makeDXF({segments:ir2.segments,width:ir2.width,height:ir2.height},blade),"insert_"+insR+"x"+insC+".dxf","application/dxf");setSheet(null)}}
              style={{width:"100%",marginTop:12,padding:14,borderRadius:12,background:S.ac,border:"none",color:"#000",fontWeight:700,fontSize:14}}>Export Insert DXF</button></>})()}
      </Sheet>}

      {sheet==="sustain"&&<Sheet title="Sustainability" onClose={()=>setSheet(null)} t={S}>
        {r&&mat?(()=>{const sus=calcSustain(mat,(r.width*r.height)/1e6,qty);
          return <><div style={{textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:56,fontWeight:900,fontFamily:"monospace",color:sus.score>70?S.gn:sus.score>40?S.or:S.rd}}>{sus.score}</div>
            <div style={{fontSize:11,color:S.tm}}>Eco Score / 100</div>
            <div style={{width:"100%",height:5,borderRadius:3,background:S.bg3,marginTop:6,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:sus.score+"%",background:`linear-gradient(90deg,${S.rd},${S.or},${S.gn})`}}/></div></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[["CO2/box",sus.co2+"kg"],["Total",sus.total+"kg"],["Trees/yr",sus.trees],["Recycled",sus.rec+"%"],["Water",(+sus.co2*10/.45).toFixed(0)+"L"],["Energy",(+sus.co2*2.5/.45).toFixed(1)+"kWh"]].map(([l,v])=>
                <div key={l} style={{padding:12,borderRadius:10,background:S.bg2,textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,fontFamily:"monospace",color:S.gn}}>{v}</div><div style={{fontSize:10,color:S.tm}}>{l}</div></div>)}</div></>})()
        :<div style={{textAlign:"center",padding:30,color:S.tm}}>Generate a design first</div>}
      </Sheet>}

      {sheet==="matcomp"&&<Sheet title="Material Compare" onClose={()=>setSheet(null)} t={S}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
          {MATS.map(m=>{const sel=compareMats.includes(m.id);return <button key={m.id} onClick={()=>setCompareMats(p=>sel?p.filter(x=>x!==m.id):p.length<5?[...p,m.id]:p)}
            style={{padding:"4px 9px",borderRadius:8,fontSize:10,background:sel?S.ac+"20":S.bg3,border:"1px solid "+(sel?S.ac:S.bd),color:sel?S.ac:S.td}}>{m.name}</button>})}</div>
        {r?(()=>{const comps=compareMats.map(mid=>{const m=MATS.find(x=>x.id===mid);if(!m)return null;
            return{mat:m,q:calcQuote(r,m,selFins,qty),b:calcBCT(L,W,H,m),s:calcSustain(m,(r.width*r.height)/1e6,qty)}}).filter(Boolean);
          if(!comps.length)return null;
          return <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr><th style={{textAlign:"left",padding:8,color:S.tm}}>Metric</th>{comps.map(c=><th key={c.mat.id} style={{textAlign:"center",padding:8,color:S.ac}}>{c.mat.name}</th>)}</tr></thead>
            <tbody>{[["Unit $",c=>c.q?"$"+c.q.unitCost:"—"],["Weight",c=>c.q?c.q.weight+"g":"—"],["BCT",c=>c.b?c.b.bct+"N":"—"],["Stack",c=>c.b?"~"+c.b.stackHeight:"—"],["Eco",c=>c.s?c.s.score+"/100":"—"],["Thick",c=>c.mat.t+"mm"]].map(([l,fn])=>
              <tr key={l} style={{borderTop:"1px solid "+S.bd}}><td style={{padding:"6px 8px",color:S.tm}}>{l}</td>{comps.map(c=><td key={c.mat.id} style={{padding:"6px 8px",fontFamily:"monospace",textAlign:"center"}}>{fn(c)}</td>)}</tr>)}</tbody></table></div>})()
        :<div style={{textAlign:"center",padding:30,color:S.tm}}>Generate a design first</div>}
      </Sheet>}

    </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
