function $(a,x1,y1,x2,y2,t){a.push({x1,y1,x2,y2,type:t})}

function genSlotted(L,W,H,T,mode){const a=[];
  const ov=mode==="partial"?25:0;
  const mjFD=mode==="full"?W:mode==="center"?W/2:W/2+ov, mnFD=mode==="center"?L/2:W/2;
  const mxFD=Math.max(mjFD,mnFD),yB=mxFD,yT=mxFD+H;

  for(let i=2;i<px.length;i++)$(a,px[i],yB,px[i],yT,i<px.length-1?"fold":"cut");

    const fd=p.mj?mjFD:mnFD,pw=p.x2-p.x1,e=!p.mj?Math.max(1,Math.min(4,pw*.015)):0;

    if(e>0)$(a,p.x2-e,yB-e*.3,p.x2,yB,"cut");

  return{segments:a,width:px[5],height:mxFD+H+mxFD};}

function genSnapLock(L,W,H,T){const a=[],fD=W/2,yB=fD+15,yT=yB+H;

      $(a,cx-6,yB-fD*.85,cx-6,yB-fD*.85-8,"cut");$(a,cx-6,yB-fD*.85-8,cx+6,yB-fD*.85-8,"cut");

  $(a,cx-20,y1+(tH-y1)*.5,cx+20,y1+(tH-y1)*.5,"perf");return{segments:a,width:tW,height:tH+lh}}

function genBookWrap(L,W,H){const a=[];
  // Book wrap = cruciform. Wraps fold up the side (H) + across top (W/2) + overlap (15mm)
  const wrapD=H+Math.ceil(W/2)+15; // wrap panel depth each side
  const endD=H+15; // end flap depth
  const tW=wrapD+L+wrapD, tH=endD+W+endD;
  const x0=wrapD, x1=wrapD+L, y0=endD, y1=endD+W;
  // Main horizontal strip outer boundary
  $(a,0,y0,0,y1,"cut");$(a,0,y0,x0,y0,"cut");$(a,0,y1,x0,y1,"cut"); // left wrap
  $(a,x1,y0,tW,y0,"cut");$(a,x1,y1,tW,y1,"cut");$(a,tW,y0,tW,y1,"cut"); // right wrap
  // Base edge folds
  $(a,x0,y0,x0,y1,"fold");$(a,x1,y0,x1,y1,"fold");
  // Bottom end flap
  $(a,x0,y0,x0,0,"cut");$(a,x0,0,x1,0,"cut");$(a,x1,0,x1,y0,"cut");
  $(a,x0,y0,x1,y0,"fold"); // fold line at base edge
  // Top end flap
  $(a,x0,y1,x0,tH,"cut");$(a,x0,tH,x1,tH,"cut");$(a,x1,tH,x1,y1,"cut");
  $(a,x0,y1,x1,y1,"fold"); // fold line at base edge
  // Primary side fold-up lines (where wraps fold up to form box sides at height H)
  $(a,x0-H,y0,x0-H,y1,"fold"); // left side fold
  $(a,x1+H,y0,x1+H,y1,"fold"); // right side fold

  for(let d=5;d<wrapD-3;d+=5){if(Math.abs(d-H)>2){$(a,x0-d,y0,x0-d,y1,"crease");$(a,x1+d,y0,x1+d,y1,"crease")}}

  for(let d=5;d<endD-3;d+=5){$(a,x0,y0-d,x1,y0-d,"crease");$(a,x0,y1+d,x1,y1+d,"crease")}

  $(a,x0,y0-H,x1,y0-H,"fold");$(a,x0,y1+H,x1,y1+H,"fold");

function genRigidMail(L,W,H){const a=[];

  $(a,tW,y0+5,tW,y1-5,"cut");$(a,x1,y0,tW,y0+5,"cut");$(a,x1,y1,tW,y1-5,"cut");$(a,x1,y0,x1,y1,"fold");
  // Bottom flap
  $(a,x0,y0,x0,0,"cut");$(a,x0,0,x1,0,"cut");$(a,x1,0,x1,y0,"cut");$(a,x0,y0,x1,y0,"fold");
  // Top flap (sealing flap with adhesive)
  $(a,x0,y1,x0,tH,"cut");$(a,x0,tH,x1,tH,"cut");$(a,x1,tH,x1,y1,"cut");$(a,x0,y1,x1,y1,"fold");
  $(a,x0+8,y1+flapD*.65,x1-8,y1+flapD*.65,"glue"); // adhesive strip

// Cake/Bakery Box — RSC-style with window cutout on one major panel
function genCakeBox(L,W,H,T){const a=[];
  const fD=W/2,yB=fD,yT=fD+H;
  const px=[0,GW,GW+W,GW+W+L,GW+W+L+W,GW+W+L+W+L];
  glueTab(a,yB,yT,H);
  for(let i=2;i<px.length;i++)$(a,px[i],yB,px[i],yT,i<px.length-1?"fold":"cut");
  // Standard RSC flaps
  [{x1:px[1],x2:px[2],mj:0},{x1:px[2],x2:px[3],mj:1},{x1:px[3],x2:px[4],mj:0},{x1:px[4],x2:px[5],mj:1}].forEach(p=>{
    const fd=fD,pw=p.x2-p.x1,e=!p.mj?Math.max(1,Math.min(4,pw*.015)):0;
    $(a,p.x1,yT,p.x2,yT,"fold");
    $(a,p.x1+e,yT,p.x1+e,yT+fd,"cut");if(e>0)$(a,p.x1,yT,p.x1+e,yT+e*.3,"cut");
    $(a,p.x1+e,yT+fd,p.x2-e,yT+fd,"cut");$(a,p.x2-e,yT+fd,p.x2-e,yT,"cut");
    if(e>0)$(a,p.x2-e,yT+e*.3,p.x2,yT,"cut");
    $(a,p.x1,yB,p.x2,yB,"fold");
    $(a,p.x1+e,yB,p.x1+e,yB-fd,"cut");if(e>0)$(a,p.x1,yB,p.x1+e,yB-e*.3,"cut");
    $(a,p.x1+e,yB-fd,p.x2-e,yB-fd,"cut");$(a,p.x2-e,yB-fd,p.x2-e,yB,"cut");
    if(e>0)$(a,p.x2-e,yB-e*.3,p.x2,yB,"cut");
  });
  // Window cutout on first L-panel (panel index 1, between px[2] and px[3])
  const winM=15; // margin from panel edges
  const wx1=px[2]+winM, wx2=px[3]-winM, wy1=yB+winM, wy2=yT-winM;
  if(wx2>wx1+20&&wy2>wy1+20){ // only if panel large enough
    // Rounded-corner rectangle cutout (perf lines so it can be punched out)
    const cr=Math.min(10,(wx2-wx1)*.08);
    $(a,wx1+cr,wy1,wx2-cr,wy1,"perf");$(a,wx2-cr,wy1,wx2,wy1+cr,"perf");
    $(a,wx2,wy1+cr,wx2,wy2-cr,"perf");$(a,wx2,wy2-cr,wx2-cr,wy2,"perf");
    $(a,wx2-cr,wy2,wx1+cr,wy2,"perf");$(a,wx1+cr,wy2,wx1,wy2-cr,"perf");
    $(a,wx1,wy2-cr,wx1,wy1+cr,"perf");$(a,wx1,wy1+cr,wx1+cr,wy1,"perf");
  }
  return{segments:a,width:px[5],height:fD+H+fD};}

function offsetSegs(segs,kerf){if(kerf<=0)return segs;const hk=kerf/2;
  return segs.map(s=>{if(s.type!=="cut")return s;const dx=s.x2-s.x1,dy=s.y2-s.y1,l=Math.sqrt(dx*dx+dy*dy);
    if(l===0)return s;const nx=-dy/l*hk,ny=dx/l*hk;return{...s,x1:s.x1+nx,y1:s.y1+ny,x2:s.x2+nx,y2:s.y2+ny,kerfOffset:hk}})}

    "0301":()=>genTelescope(L,W,H,T,.5),"0310":()=>genTelescope(L,W,H,T,.25),"0320":()=>genTelescope(L,W,H,T,.85),

    "TG_RSC":()=>genTGRSC(L,W,H,T),"TG_LOCK":()=>genTGLock(L,W,H,T),"TG_TRAY":()=>genTGTray(L,W,H,T),

    "PIZZA":()=>genPizza(L,W,H),"CAKEBOX":()=>genCakeBox(L,W,H,T)};

// Material-box compatibility
const MAT_COMPAT={PILLOW:["F","E","SBS","CCNB","CRB","KRAFT","WKRAFT"],HEXAGON:["F","E","B","SBS","CCNB","KRAFT","WKRAFT"],
  PIZZA:["B","C","E"],CAKEBOX:["E","B","SBS","CCNB","CRB"]};

function validate(id,L,W,H,T,matId){const e=[],w=[];const b=BOXES.find(x=>x.id===id);
  if(L<=0||W<=0||H<=0)e.push("Dims must be > 0");if(T<=0||T>12)e.push("T: 0.1–12mm");
  if(b){if(L<b.mL)e.push(`Min L: ${b.mL}mm`);if(W<b.mW)e.push(`Min W: ${b.mW}mm`);if(H<b.mH)e.push(`Min H: ${b.mH}mm`)}
  if(L>2500||W>2500)w.push("Very large — check sheet capacity");
  if(L>1800||W>1800)w.push("May exceed standard die-cutter (1800mm)");
  if(L/W>8||W/L>8)w.push("Extreme aspect ratio");
  if(H/Math.min(L,W)>5)w.push("Very tall box — consider reinforcement");
  // Material compatibility
  const compat=MAT_COMPAT[id];
  if(compat&&matId&&!compat.includes(matId)){const m=MATS.find(x=>x.id===matId);w.push(`${m?.name||matId} may not suit ${b?.name||id}`)}
  // Thick material on small box
  if(T>4&&Math.min(L,W)<100)w.push("Thick material on small box — check foldability");
  return{errors:e,warnings:w,valid:e.length===0}}

// BCT (McKee formula) & ECT
function calcBCT(L,W,H,mat){if(!mat)return null;
  const perimeter=2*(L+W);const ect=mat.ect;const Z=mat.t;
  const bct=5.87*ect*Math.sqrt(Z*perimeter);
  const safeLoad=bct*0.65; // 65% safety factor
  return{bct:bct.toFixed(0),safeLoad:safeLoad.toFixed(0),ect:ect.toFixed(1),stackHeight:Math.floor(safeLoad/50)}}

function calcQuote(result,mat,selFins,qty=1000){if(!result||!mat)return null;
  const area=(result.width*result.height)/1e6;
  const matCost=area*mat.cost;
  const finCost=selFins.reduce((s,fid)=>{const f=FINS.find(x=>x.id===fid);return s+(f?f.cpm*area*1000:0)},0);
  const dieCost=0; // eliminated by this tool!
  const unitCost=matCost+finCost/qty+0.02; // labor
  return{unitCost:unitCost.toFixed(3),per1k:(unitCost*qty).toFixed(0),matCost:matCost.toFixed(3),finCost:(finCost/qty).toFixed(3),
    weight:(area*mat.gsm).toFixed(0),sheetArea:(area*1e4).toFixed(0),qty}}

// CFF2 Export
function makeCFF2(r,blade,boxId,dims){let o="";const w=s=>{o+=s+"\n"};
  w("# CFF2 - Common File Format Version 2");w(`# Generated by TAG Box Converter V7`);
  w(`# Box: ${boxId} ${dims.L}x${dims.W}x${dims.H}mm`);w(`# Blade: ${blade.type} Kerf:${blade.kerf}mm Angle:${blade.angle}deg`);
  w("UNITS=MM");w(`DESIGN=${boxId}_${dims.L}x${dims.W}x${dims.H}`);w("");
  // Group by type, then chain connected segments into polylines
  const byType={};r.segments.forEach(s=>{if(!byType[s.type])byType[s.type]=[];byType[s.type].push(s)});
  Object.entries(byType).forEach(([type,segs])=>{
    w(`SECTION=${CFF2_LT[type]||1}`);w(`# ${LL[type]||type} (${segs.length} lines)`);
    // Chain connected segments: if seg[n].x2,y2 ≈ seg[n+1].x1,y1, they're one polyline
    const used=new Set();const eps=0.1;
    const chains=[];
    for(let i=0;i<segs.length;i++){
      if(used.has(i))continue;
      const chain=[segs[i]];used.add(i);
      let changed=true;
      while(changed){changed=false;
        const last=chain[chain.length-1];
        for(let j=0;j<segs.length;j++){
          if(used.has(j))continue;
          if(Math.abs(last.x2-segs[j].x1)<eps&&Math.abs(last.y2-segs[j].y1)<eps){
            chain.push(segs[j]);used.add(j);changed=true;break}}}
      chains.push(chain)}
    chains.forEach((ch,ci)=>{
      w(`POLYLINE=${ci+1}`);
      w(`${ch[0].x1.toFixed(3)},${ch[0].y1.toFixed(3)}`);
      ch.forEach(s=>w(`${s.x2.toFixed(3)},${s.y2.toFixed(3)}`));
      w("ENDPOLYLINE")});
    w("")});
  w("END");return o}

// PDF with crop marks, registration marks, bleed
function makePrintSVG(r){const{segments:sg,width:ww,height:hh}=r;const bl=5,mk=15,pad=mk+bl+10;
  const tW=ww+pad*2,tH=hh+pad*2;
  const dm={cut:"",fold:"6,4",crease:"8,3,2,3",glue:"3,3",perf:"2,4",tongue:"4,2",groove:"2,2,6,2"};
  let o=`<?xml version="1.0"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${tW}mm" height="${tH}mm" viewBox="0 0 ${tW} ${tH}">\n`;
  o+=`<rect width="100%" height="100%" fill="white"/>\n`;
  // Crop marks (corners)
  const cx=[pad-bl,pad+ww+bl],cy=[pad-bl,pad+hh+bl];
  cx.forEach(x=>cy.forEach(y=>{
    o+=`<line x1="${x-mk}" y1="${y}" x2="${x-3}" y2="${y}" stroke="black" stroke-width="0.3"/>\n`;
    o+=`<line x1="${x+3}" y1="${y}" x2="${x+mk}" y2="${y}" stroke="black" stroke-width="0.3"/>\n`;
    o+=`<line x1="${x}" y1="${y-mk}" x2="${x}" y2="${y-3}" stroke="black" stroke-width="0.3"/>\n`;
    o+=`<line x1="${x}" y1="${y+3}" x2="${x}" y2="${y+mk}" stroke="black" stroke-width="0.3"/>\n`}));
  // Registration marks (center of each edge)
  [[(cx[0]+cx[1])/2,cy[0]-mk-2],[(cx[0]+cx[1])/2,cy[1]+mk+2],[cx[0]-mk-2,(cy[0]+cy[1])/2],[cx[1]+mk+2,(cy[0]+cy[1])/2]].forEach(([rx,ry])=>{
    o+=`<circle cx="${rx}" cy="${ry}" r="4" fill="none" stroke="black" stroke-width="0.3"/>\n`;
    o+=`<line x1="${rx-5}" y1="${ry}" x2="${rx+5}" y2="${ry}" stroke="black" stroke-width="0.2"/>\n`;
    o+=`<line x1="${rx}" y1="${ry-5}" x2="${rx}" y2="${ry+5}" stroke="black" stroke-width="0.2"/>\n`});
  // Bleed box
  o+=`<rect x="${pad-bl}" y="${pad-bl}" width="${ww+bl*2}" height="${hh+bl*2}" fill="none" stroke="#ccc" stroke-width="0.2" stroke-dasharray="2,2"/>\n`;
  // Dieline
  sg.forEach(s=>{const ds=dm[s.type]?` stroke-dasharray="${dm[s.type]}"`:"";
    o+=`<line x1="${(s.x1+pad).toFixed(2)}" y1="${(hh+pad-s.y1).toFixed(2)}" x2="${(s.x2+pad).toFixed(2)}" y2="${(hh+pad-s.y2).toFixed(2)}" stroke="${LC[s.type]}" stroke-width="0.5"${ds}/>\n`});
  // Info block
  o+=`<text x="${pad}" y="${tH-3}" fill="#999" font-size="3" font-family="monospace">TAG Box Converter V7 | ${ww.toFixed(1)}x${hh.toFixed(1)}mm | Crop: 5mm bleed</text>\n`;
  return o+"</svg>"}

  t(m,y,`Volume: ${((L*W*H)/1e6).toFixed(3)}L    Surface Area: ${(2*(L*W+L*H+W*H)/100).toFixed(0)}cm²`,2.8,"#0f172a");y+=6;hr(y);y+=5;
  // Material
  t(m,y,"MATERIAL",3,"#64748b","bold");y+=5;
  t(m,y,`${mat?.name||"—"} · ${T}mm · ${mat?.gsm||0}gsm · ECT: ${mat?.ect||0} kN/m`,3,"#0f172a");y+=6;hr(y);y+=5;

// Structural Report PDF
function makeStructPDF(bt,L,W,H,T,mat,bctData){
  const w=210,h=297,m=15;let y=m+5;const lines=[];
  const t=(x,yy,txt,sz=3,col="#1e293b",fw="normal")=>{lines.push(`<text x="${x}" y="${yy}" font-size="${sz}" fill="${col}" font-weight="${fw}" font-family="Helvetica,sans-serif">${txt}</text>`);};
  const hr=(yy)=>{lines.push(`<line x1="${m}" y1="${yy}" x2="${w-m}" y2="${yy}" stroke="#e2e8f0" stroke-width="0.3"/>`);};
  t(m,y,"TAG BOX CONVERTER — STRUCTURAL ANALYSIS REPORT",5,"#f59e0b","bold");y+=4;
  t(m,y,`${new Date().toLocaleDateString()} · v7`,2.5,"#94a3b8");y+=6;hr(y);y+=6;
  t(m,y,`${bt?.name||"Box"} — ${L.toFixed(0)}×${W.toFixed(0)}×${H.toFixed(0)}mm`,4,"#0f172a","bold");y+=5;
  t(m,y,`Material: ${mat?.name||"—"} · ${T}mm · ${mat?.gsm||0}gsm`,3,"#475569");y+=8;
  // BCT Analysis
  t(m,y,"BOX COMPRESSION TEST (BCT) — McKee Formula",3.5,"#0f172a","bold");y+=6;
  t(m,y,"BCT = 5.87 × ECT × √(Z × P)",3,"#2563eb","bold");y+=5;
  t(m,y,"Where:",2.8,"#475569");y+=4;
  t(m+5,y,`ECT = ${mat?.ect||0} kN/m (Edge Crush Test for ${mat?.name||"material"})`,2.8,"#0f172a");y+=4;
  t(m+5,y,`Z = ${T}mm (combined board caliper / thickness)`,2.8,"#0f172a");y+=4;
  t(m+5,y,`P = ${(2*(L+W)).toFixed(0)}mm (box perimeter = 2L + 2W = 2×${L.toFixed(0)} + 2×${W.toFixed(0)})`,2.8,"#0f172a");y+=6;
  if(bctData){
    t(m,y,`RESULT: BCT = ${bctData.bct} N`,4,"#16a34a","bold");y+=5;
    t(m,y,`Safe Working Load (65% safety factor): ${bctData.safeLoad} N`,3.5,"#16a34a","bold");y+=5;
    t(m,y,`Estimated Max Stack Height: ~${bctData.stackHeight} boxes (at 50N/box avg)`,3,"#0f172a");y+=8;hr(y);y+=6;
    // Derating factors
    t(m,y,"DERATING FACTORS",3.5,"#0f172a","bold");y+=5;
    const dr=[[">90% RH humidity","×0.50","Severe — use moisture barrier"],[">80% RH humidity","×0.65","Significant — PE or wax coating recommended"],
      ["60-80% RH humidity","×0.80","Moderate — standard storage"],["Pallet overhang >25mm","×0.70","Misaligned stacking"],
      ["Storage >30 days","×0.75","Long-term creep deformation"],["Dynamic load (transit)","×0.60","Vibration + shock"],
      ["Printing coverage >40%","×0.90","Ink weakens board fibers"]];
    dr.forEach(([cond,factor,note])=>{t(m,y,cond,2.5,"#0f172a","bold");t(m+55,y,factor,2.5,"#ef4444","bold");t(m+70,y,note,2.3,"#475569");y+=3.8;});
    y+=4;hr(y);y+=6;
    // Applied derating example
    const worstCase=parseFloat(bctData.safeLoad)*0.65*0.80;
    t(m,y,"WORST-CASE SCENARIO (humid storage + transit)",3,"#0f172a","bold");y+=5;
    t(m,y,`${bctData.safeLoad}N × 0.80 (humidity) × 0.65 (transit+time) = ${worstCase.toFixed(0)}N`,3,"#ef4444","bold");y+=5;
    t(m,y,`Stack height at worst case: ~${Math.floor(worstCase/50)} boxes`,3,"#0f172a");y+=8;hr(y);y+=6;
    // Additional metrics
    t(m,y,"ADDITIONAL STRUCTURAL METRICS",3.5,"#0f172a","bold");y+=5;
    const burst=(mat?.ect||0)*1.6*T;const flatCrush=(mat?.ect||0)*0.7;
    t(m,y,`Estimated Burst Strength: ~${burst.toFixed(0)} kPa`,2.8,"#0f172a");y+=4;
    t(m,y,`Flat Crush Resistance: ~${flatCrush.toFixed(1)} kN/m`,2.8,"#0f172a");y+=4;
    t(m,y,`Flute Direction: Parallel to Height (vertical) for maximum stacking strength`,2.8,"#0f172a");y+=4;
    t(m,y,`Board Perimeter: ${(2*(L+W)).toFixed(0)}mm · Board Area: ${(2*(L*W+L*H+W*H)/1e4).toFixed(2)}m²`,2.8,"#0f172a");
  }
  return `<?xml version="1.0"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}">\n<rect width="100%" height="100%" fill="white"/>\n${lines.join("\n")}\n</svg>`;}

    const P="rgba(245,158,11,",P2="rgba(217,119,6,",P3="rgba(180,100,6,";
    const box=(ox,oy,oz,bx,by,bz,col)=>({v:[[ox,oy,oz],[ox+bx,oy,oz],[ox+bx,oy+by,oz],[ox,oy+by,oz],[ox,oy,oz+bz],[ox+bx,oy,oz+bz],[ox+bx,oy+by,oz+bz],[ox,oy+by,oz+bz]],f:[[0,1,2,3],[5,4,7,6],[4,0,3,7],[1,5,6,2],[3,2,6,7],[4,5,1,0]],col});
    const openBox=(ox,oy,oz,bx,by,bz,col)=>({v:[[ox,oy,oz],[ox+bx,oy,oz],[ox+bx,oy+by,oz],[ox,oy+by,oz],[ox,oy,oz+bz],[ox+bx,oy,oz+bz],[ox+bx,oy+by,oz+bz],[ox,oy+by,oz+bz]],f:[[0,1,2,3],[5,4,7,6],[4,0,3,7],[1,5,6,2],[4,5,1,0]],col});
    const quad=(v,col)=>({v,f:[[0,1,2,3]],col});
    const id=boxId;
    if(["0201","0202","0203","0204","0215","0216","0711"].includes(id))parts.push(box(-hl,-hh,-hw,sl,sh,sw,P));
    else if(id==="CAKEBOX"){parts.push(box(-hl,-hh,-hw,sl,sh,sw,P));parts.push(quad([[-hl+hl*.3,-hh+hh*.3,-hw-.1],[hl-hl*.3,-hh+hh*.3,-hw-.1],[hl-hl*.3,hh-hh*.3,-hw-.1],[-hl+hl*.3,hh-hh*.3,-hw-.1]],"rgba(100,100,100,"))}
    else if(id==="0210")parts.push(openBox(-hl,-hh,-hw,sl,sh,sw,P));
    else if(id==="0713"){parts.push(box(-hl,-hh,-hw,sl,sh,sw,P));parts.push(quad([[-hl*.5,hh,-hw],[hl*.5,hh,-hw],[hl*.5,hh+sh*.08,-hw-sh*.06],[-hl*.5,hh+sh*.08,-hw-sh*.06]],P2))}
    else if(cat==="telescope"){const bH=sh*.55,lH=sh*.4,gap=sh*.15,ex=sl*.025;parts.push(openBox(-hl,-hh,-hw,sl,bH,sw,P));parts.push(box(-hl-ex,-hh+bH+gap,-hw-ex,sl+ex*2,lH,sw+ex*2,P2))}
    else if(id==="0401"||id==="0421"||id==="TG_TRAY")parts.push(openBox(-hl,-hh,-hw,sl,sh,sw,P));
    else if(id==="0427"){parts.push(openBox(-hl,-hh,-hw,sl,sh,sw,P));const la=55*Math.PI/180,ll=sw*.8;parts.push(quad([[-hl,hh,hw],[hl,hh,hw],[hl,hh+ll*Math.cos(la),hw+ll*Math.sin(la)],[-hl,hh+ll*Math.cos(la),hw+ll*Math.sin(la)]],P2))}
    else if(id==="MAILER"){parts.push(openBox(-hl,-hh,-hw,sl,sh,sw,P));const fa=65*Math.PI/180,fp=sh*.85;parts.push(quad([[-hl,-hh,-hw],[hl,-hh,-hw],[hl,-hh-fp*Math.sin(fa),-hw-fp*Math.cos(fa)],[-hl,-hh-fp*Math.sin(fa),-hw-fp*Math.cos(fa)]],P2))}
    else if(id==="PIZZA"){parts.push(openBox(-hl,-hh,-hw,sl,sh,sw,P));const la=50*Math.PI/180,ll=sw*.9;parts.push(quad([[-hl,hh,hw],[hl,hh,hw],[hl,hh+ll*Math.cos(la),hw+ll*Math.sin(la)],[-hl,hh+ll*Math.cos(la),hw+ll*Math.sin(la)]],P2))}
    else if(id==="DISPLAY"){parts.push(openBox(-hl,-hh,-hw,sl,sh*.35,sw,P));parts.push(quad([[-hl,-hh+sh*.35,hw],[hl,-hh+sh*.35,hw],[hl,hh*1.3,hw],[-hl,hh*1.3,hw]],P2))}
    else if(id==="BOOKWRAP"){const bt=sh*.15;parts.push(box(-hl,-hh,-hw,sl,bt,sw,P));const wa=55*Math.PI/180,wl=hw*1.2;parts.push(quad([[-hl,-hh+bt,-hw],[-hl,-hh+bt,hw],[-hl-wl*Math.sin(wa),-hh+bt+wl*Math.cos(wa),hw],[-hl-wl*Math.sin(wa),-hh+bt+wl*Math.cos(wa),-hw]],P2));parts.push(quad([[hl,-hh+bt,-hw],[hl,-hh+bt,hw],[hl+wl*Math.sin(wa),-hh+bt+wl*Math.cos(wa),hw],[hl+wl*Math.sin(wa),-hh+bt+wl*Math.cos(wa),-hw]],P3))}
    else if(id==="RIGIDMAIL"){parts.push(box(-hl,-hh*.2,-hw,sl,sh*.4,sw,P))}
    else if(id==="PILLOW"){const n=10,pts=[];for(let i=0;i<=n;i++){const t=i/n;pts.push({x:-hl+sl*t,c:Math.sin(t*Math.PI)*hh*.6})}for(let i=0;i<n;i++){parts.push(quad([[pts[i].x,-hh-pts[i].c,-hw],[pts[i+1].x,-hh-pts[i+1].c,-hw],[pts[i+1].x,hh+pts[i+1].c,-hw],[pts[i].x,hh+pts[i].c,-hw]],P));parts.push(quad([[pts[i].x,-hh-pts[i].c,hw],[pts[i+1].x,-hh-pts[i+1].c,hw],[pts[i+1].x,hh+pts[i+1].c,hw],[pts[i].x,hh+pts[i].c,hw]],P2))}}
    else if(id==="HEXAGON"){const r=hw*.9,n=6;const tops=[],bots=[];for(let i=0;i<n;i++){const a=i/n*Math.PI*2-Math.PI/2;tops.push([Math.cos(a)*r,hh,Math.sin(a)*r]);bots.push([Math.cos(a)*r,-hh,Math.sin(a)*r])}for(let i=0;i<n;i++){const j=(i+1)%n;parts.push(quad([bots[i],bots[j],tops[j],tops[i]],[P,P2,P3,P,P2,P3][i]))}}
    else if(id==="TG_SLEEVE"){parts.push(box(-hl,-hh,-hw,sl,sh,sw,P));parts.push(box(-hl-sl*.25,-hh*.9,-hw*.85,sl*.9,sh*.8,sw*.85,P2))}
    else parts.push(box(-hl,-hh,-hw,sl,sh,sw,P));

    const allFaces=[];const allEdges=[];
    parts.forEach(mesh=>{const pv=mesh.v.map(v=>proj(v[0],v[1],v[2]));
      mesh.f.forEach(f=>{const pts=f.map(i=>pv[i]);const v1={x:pts[1].px-pts[0].px,y:pts[1].py-pts[0].py};const v2={x:pts[f.length-1].px-pts[0].px,y:pts[f.length-1].py-pts[0].py};
        const cr=v1.x*v2.y-v1.y*v2.x;const alpha=Math.min(.55,Math.abs(cr)/(80*Math.max(sl,sw,sh)+1)*.6+.04);
        allFaces.push({pts,avgZ:pts.reduce((s,p)=>s+p.z,0)/pts.length,alpha,cross:cr,col:mesh.col||P})});
      if(mesh.v.length===8)[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]].forEach(([a,b])=>allEdges.push([pv[a],pv[b]]));
      else if(mesh.v.length===4)[[0,1],[1,2],[2,3],[3,0]].forEach(([a,b])=>allEdges.push([pv[a],pv[b]]));
    });
    allFaces.sort((a,b)=>a.avgZ-b.avgZ);
    const mB=proj(0,-sh/2-18,0),mS=proj(sl/2+18,0,0),mL=proj(-sl/2-18,0,0);
    return <svg viewBox="0 0 400 350" style={{width:"100%",height:"100%",background:S.canvas||"#0d1117",pointerEvents:"none"}}>
      <rect width="400" height="350" fill={S.canvas||"#0d1117"}/>
      <ellipse cx={cx} cy={cy+sh/2*zm+22} rx={sl*.6} ry={sw*.15} fill="#f59e0b" fillOpacity=".06"/>
      {allFaces.filter(f=>f.cross>0).map((f,i)=><polygon key={i} points={f.pts.map(p=>p.px+","+p.py).join(" ")} fill={f.col+f.alpha.toFixed(2)+")"} stroke="#f59e0b" strokeWidth=".6" strokeOpacity=".4"/>)}
      {allEdges.map(([p1,p2],i)=><line key={"e"+i} x1={p1.px} y1={p1.py} x2={p2.px} y2={p2.py} stroke="#f59e0b" strokeWidth="1" strokeOpacity=".5"/>)}
      <text x={mB.px} y={mB.py+14} textAnchor="middle" fill="#94a3b8" fontSize="12" fontFamily="monospace" fontWeight="700">{L}mm</text>
      <text x={mS.px+10} y={mS.py} fill="#94a3b8" fontSize="12" fontFamily="monospace" fontWeight="700">{H}mm</text>
      <text x={mL.px-10} y={mL.py} textAnchor="end" fill="#94a3b8" fontSize="12" fontFamily="monospace" fontWeight="700">{W}mm</text>
      <text x={200} y={18} textAnchor="middle" fill="#f59e0b" fontSize="12" fontWeight="700">{bt?.name||"Box"}</text>
      <text x={200} y={340} textAnchor="middle" fill="#64748b" fontSize="10" fontFamily="monospace">Drag: orbit · Pinch: zoom · {(zm*100).toFixed(0)}%</text>
    </svg>};

  // ═══ RENDER ═══
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:S.bg0||S.bg,overflow:"hidden"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 6px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,"+S.ac+","+S.ac2+")",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#000"}}>BX</div>
          <div><div style={{fontWeight:800,fontSize:16,color:S.tx}}>{bt?.name||"TAG Box"}</div>
            <div style={{fontSize:11,color:S.tm||S.t3}}>{mat?.name} · {L}×{W}×{H}mm</div></div></div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setDk(!dk)} style={{width:36,height:36,borderRadius:18,background:S.bg3||S.c2,border:"none",fontSize:17}}>{dk?"☀️":"🌙"}</button>
          <button onClick={()=>setSheet("export")} style={{height:36,padding:"0 16px",borderRadius:18,background:"linear-gradient(135deg,"+S.ac+","+S.ac2+")",border:"none",fontWeight:800,fontSize:13,color:"#000"}}>Export</button>
        </div></div>

      {/* Quick stats */}
      {unitCost&&<div style={{display:"flex",gap:12,padding:"4px 16px 6px"}}>
        <span style={{fontSize:11,color:S.tm||S.t3}}>$<b style={{color:S.gn}}>{unitCost}</b>/unit</span>
        {bctData&&<span style={{fontSize:11,color:S.tm||S.t3}}>BCT: <b style={{color:S.gn}}>{bctData.safeLoad}N</b></span>}
        <button onClick={()=>setSheet("quote")} style={{fontSize:11,color:S.ac,background:"none",border:"none",fontWeight:700,marginLeft:"auto"}}>Quote →</button>
      </div>}

      {/* Content */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>

        {tab==="design"&&<div style={{flex:1,overflow:"auto",padding:"0 16px 16px",WebkitOverflowScrolling:"touch"}}>
          <Dim label="LENGTH" k="L"/><Dim label="WIDTH" k="W"/><Dim label="HEIGHT" k="H"/>
          <button onClick={resetDims} style={{width:"100%",padding:12,borderRadius:12,background:S.bg3||S.c2,border:"1px solid "+S.bd,color:S.td||S.t2,fontSize:13,fontWeight:600,marginBottom:16}}>↺ Reset Dimensions</button>
          {!v.valid&&<div style={{padding:14,borderRadius:14,background:(S.rd||"#ef4444")+"15",border:"1px solid "+(S.rd||"#ef4444")+"33",marginBottom:12}}>
            {v.errors.map((e,i)=><div key={i} style={{color:S.rd,fontSize:13,fontWeight:600}}>✗ {e}</div>)}</div>}
          {v.warnings.length>0&&<div style={{padding:10,borderRadius:12,background:S.ac+"15",marginBottom:12}}>
            {v.warnings.map((w,i)=><div key={i} style={{color:S.ac,fontSize:12}}>⚠ {w}</div>)}</div>}
          <div style={{fontWeight:800,fontSize:13,color:S.tm,marginBottom:6,letterSpacing:1}}>MATERIAL</div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:12,WebkitOverflowScrolling:"touch"}}>
            {MATS.map(m=><button key={m.id} onClick={()=>setMatId(m.id)} style={{flexShrink:0,padding:"10px 16px",borderRadius:12,background:matId===m.id?S.ac+"20":(S.bg2||S.c1),border:"2px solid "+(matId===m.id?S.ac:S.bd),minWidth:90}}>
              <div style={{fontWeight:700,fontSize:13,color:matId===m.id?S.ac:S.tx}}>{m.name}</div>
              <div style={{fontSize:11,color:S.tm,marginTop:2}}>{m.t}mm</div></button>)}</div>
          <div style={{fontWeight:800,fontSize:13,color:S.tm,marginBottom:6,letterSpacing:1}}>BOX TYPE</div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:8,WebkitOverflowScrolling:"touch"}}>
            <button onClick={()=>setCatF(null)} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,background:!catF?S.ac:"transparent",border:"1px solid "+(!catF?S.ac:S.bd),color:!catF?"#000":(S.td||S.t2),fontSize:12,fontWeight:700}}>All</button>
            {CATS.map(c=><button key={c.id} onClick={()=>setCatF(catF===c.id?null:c.id)} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,background:catF===c.id?S.ac:"transparent",border:"1px solid "+(catF===c.id?S.ac:S.bd),color:catF===c.id?"#000":(S.td||S.t2),fontSize:12,fontWeight:600}}>{c.icon} {c.name}</button>)}</div>
          {fBoxes.map(b=>{const sel=boxId===b.id;return <button key={b.id} onClick={()=>changeBox(b.id)}
            style={{display:"flex",alignItems:"center",gap:14,padding:16,borderRadius:16,background:sel?S.ac+"12":(S.bg2||S.c1),border:"2px solid "+(sel?S.ac:S.bd),width:"100%",marginBottom:8,textAlign:"left"}}>
            <div style={{width:40,height:40,borderRadius:12,background:sel?S.ac+"22":(S.bg3||S.c2),display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{CATS.find(x=>x.id===b.cat)?.icon}</div>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15,color:sel?S.ac:S.tx}}>{b.name}</div>
              <div style={{fontSize:12,color:S.tm}}>{b.sub} — {b.desc}</div></div>
            {sel&&<div style={{width:28,height:28,borderRadius:14,background:S.ac,display:"flex",alignItems:"center",justifyContent:"center",color:"#000",fontWeight:900,fontSize:14}}>✓</div>}
          </button>})}
        </div>}

        {tab==="preview"&&<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{display:"flex",gap:6,padding:"6px 16px",flexShrink:0}}>
            {[["2d","2D Dieline"],["3d","3D Interactive"]].map(([k,l])=><button key={k} onClick={()=>setPm(k)}
              style={{flex:1,padding:12,borderRadius:12,background:pm===k?S.ac:(S.bg3||S.c2),border:"none",color:pm===k?"#000":(S.td||S.t2),fontSize:15,fontWeight:700}}>{l}</button>)}</div>
          <div ref={canvasRef} style={{flex:1,overflow:"hidden",margin:"6px 12px 8px",borderRadius:16,border:"1px solid "+S.bd,touchAction:"none",cursor:pm==="3d"?"grab":"default",userSelect:"none",WebkitUserSelect:"none"}}>
            {!r?<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:S.tm}}>Fix dimensions to preview</div>
            :pm==="2d"?(()=>{const{segments:ss,width:ww,height:hh}=r;const p=10;
              const dm={cut:"none",fold:"6,3",crease:"8,3,2,3",glue:"3,3",perf:"2,4",tongue:"4,2",groove:"2,2,6,2"};
              const sw2={cut:1.2,fold:.7,crease:.5,glue:.5,perf:.6,tongue:1,groove:.8};
              return <svg viewBox={-p+" "+(-p)+" "+(ww+p*2)+" "+(hh+p*2)} style={{width:"100%",height:"100%",background:S.canvas||"#0d1117",pointerEvents:"none"}}>
                <defs><pattern id="gr" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke={S.bd} strokeWidth=".15"/></pattern></defs>
                <rect x={-p*4} y={-p*4} width={(ww+p*2)*4} height={(hh+p*2)*4} fill="url(#gr)"/>
                {ss.map((s,i)=><line key={i} x1={s.x1} y1={hh-s.y1} x2={s.x2} y2={hh-s.y2} stroke={LC[s.type]} strokeWidth={sw2[s.type]||.6} strokeDasharray={dm[s.type]} strokeLinecap="round"/>)}
                <text x={ww/2} y={hh+p-1} textAnchor="middle" fill={S.ac} fontSize="5" fontFamily="monospace">{ww.toFixed(0)}×{hh.toFixed(0)}mm</text></svg>})()
            :render3D()}
          </div>
          {r&&<div style={{display:"flex",gap:8,padding:"0 16px 6px",overflowX:"auto",flexShrink:0}}>
            {Object.entries(LC).filter(([t])=>segC[t]).map(([t,c])=><div key={t} style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
              <div style={{width:14,height:3,borderRadius:2,background:c}}/><span style={{fontSize:11,color:S.tm}}>{LL[t]} {segC[t]}</span></div>)}</div>}
        </div>}

        {tab==="specs"&&<div style={{flex:1,overflow:"auto",padding:"0 16px 16px",WebkitOverflowScrolling:"touch"}}>
          {/* Specs / Structural toggle */}
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            {[["specs","📋 Specs"],["struct","📊 Structural"]].map(([k,l])=>
              <button key={k} onClick={()=>setSpecView(k)} style={{flex:1,padding:12,borderRadius:12,background:specView===k?S.ac:(S.bg3||S.c2),border:"none",color:specView===k?"#000":(S.td||S.t2),fontSize:14,fontWeight:700}}>{l}</button>)}</div>

          {specView==="specs"&&<>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div><div style={{fontWeight:800,fontSize:20,color:S.ac}}>{bt?.name}</div>
                <div style={{fontSize:13,color:S.td||S.t2}}>{bt?.sub} — {bt?.desc}</div></div>
              <button onClick={()=>doExport("spec-pdf")} style={{padding:"8px 12px",borderRadius:10,background:(S.rd||"#ef4444")+"22",color:S.rd,border:"none",fontSize:12,fontWeight:700,flexShrink:0}}>📄 PDF</button></div>

            {/* External Dimensions */}
            <div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>EXTERNAL DIMENSIONS</div>
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              {[["L",L+"mm"],["W",W+"mm"],["H",H+"mm"]].map(([l,v])=>
                <div key={l} style={{flex:1,padding:12,borderRadius:12,background:S.bg2||S.c1,border:"1px solid "+S.bd,textAlign:"center"}}>
                  <div style={{fontSize:10,color:S.tm}}>{l}</div><div style={{fontSize:22,fontWeight:900,fontFamily:"monospace"}}>{v}</div></div>)}</div>

            {/* Internal Dimensions */}
            <div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>INTERNAL DIMENSIONS</div>
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              {[["Int.L",(L-mT*2).toFixed(0)+"mm"],["Int.W",(W-mT*2).toFixed(0)+"mm"],["Int.H",(H-mT).toFixed(0)+"mm"],["Vol",((L-mT*2)*(W-mT*2)*(H-mT)/1e6).toFixed(2)+"L"]].map(([l,v])=>
                <div key={l} style={{flex:1,padding:8,borderRadius:10,background:S.bg2||S.c1,border:"1px solid "+S.bd,textAlign:"center"}}>
                  <div style={{fontSize:9,color:S.tm}}>{l}</div><div style={{fontSize:13,fontWeight:800,fontFamily:"monospace"}}>{v}</div></div>)}</div>

            {/* Material */}
            <div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>MATERIAL & CONSTRUCTION</div>
            <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
              {[["Material",mat?.name||"—"],["Thick",mT+"mm"],["GSM",""+mat?.gsm],["ECT",(mat?.ect||0)+"kN/m"],
                ["Strength","★".repeat(mat?.str||0)+"☆".repeat(5-(mat?.str||0))],["Print","★".repeat(mat?.prt||0)+"☆".repeat(5-(mat?.prt||0))]].map(([l,v])=>
                <div key={l} style={{width:"31%",padding:8,borderRadius:10,background:S.bg2||S.c1,border:"1px solid "+S.bd,marginBottom:4}}>
                  <div style={{fontSize:9,color:S.tm}}>{l}</div><div style={{fontSize:12,fontWeight:700,fontFamily:"monospace"}}>{v}</div></div>)}</div>

            {/* Surface Area */}
            {(()=>{const sa=2*(L*W+L*H+W*H);return <div style={{display:"flex",gap:6,marginBottom:12}}>
              {[["Surface",(sa/100).toFixed(0)+"cm²"],["Print Area",(sa*.85/100).toFixed(0)+"cm²"],["Ext Vol",((L*W*H)/1e6).toFixed(2)+"L"]].map(([l,v])=>
                <div key={l} style={{flex:1,padding:8,borderRadius:10,background:S.bg2||S.c1,border:"1px solid "+S.bd,textAlign:"center"}}>
                  <div style={{fontSize:9,color:S.tm}}>{l}</div><div style={{fontSize:13,fontWeight:700,fontFamily:"monospace"}}>{v}</div></div>)}</div>})()}

            {/* Production Metrics */}
            {quote&&<><div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>PRODUCTION METRICS</div>
            <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
              {[["Sheet",r?r.width.toFixed(0)+"×"+r.height.toFixed(0)+"mm":"—"],["Area",quote.sheetArea+"cm²"],["Weight",quote.weight+"g"],
                ["Utilization",(()=>{if(!r)return"—";const u=Math.min(99,Math.round(2*(L*W+L*H+W*H)/(r.width*r.height)*100));return u+"%"})()],
                ["Cut Len",totalCutLen?(totalCutLen/1000).toFixed(1)+"m":"—"],["Segments",r?r.segments.length:"—"],
                ["Unit $","$"+quote.unitCost],["Per "+qty.toLocaleString(),"$"+quote.per1k]].map(([l,v])=>
                <div key={l} style={{width:"24%",padding:8,borderRadius:10,background:S.bg2||S.c1,border:"1px solid "+S.bd,marginBottom:4,textAlign:"center"}}>
                  <div style={{fontSize:9,color:S.tm}}>{l}</div><div style={{fontSize:12,fontWeight:800,fontFamily:"monospace",color:S.gn}}>{v}</div></div>)}</div></>}

            {/* Panel Analysis */}
            <div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>PANEL ANALYSIS</div>
            <div style={{borderRadius:12,overflow:"hidden",border:"1px solid "+S.bd,marginBottom:12}}>
              {[["Front",W,H],["Back",W,H],["Left",L,H],["Right",L,H],["Top Flap",L,W/2],["Bot Flap",L,W/2],["Side Flap",W,W/2],["Glue Tab",GW,H]].map(([n,pw,ph],i)=>
                <div key={n} style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",background:i%2?(S.bg2||S.c1):(S.bg1||S.c2),borderBottom:"1px solid "+S.bd}}>
                  <span style={{fontSize:12,color:S.td||S.t2,flex:1}}>{n}</span>
                  <span style={{fontSize:11,fontFamily:"monospace",width:55,textAlign:"right"}}>{pw.toFixed(0)}×{ph.toFixed(0)}</span>
                  <span style={{fontSize:11,fontFamily:"monospace",color:S.gn,width:50,textAlign:"right"}}>{(pw*ph/100).toFixed(0)}cm²</span></div>)}</div>

            {/* Segment Breakdown */}
            <div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>SEGMENT BREAKDOWN</div>
            <div style={{borderRadius:12,overflow:"hidden",border:"1px solid "+S.bd,marginBottom:12}}>
              {Object.entries(segC).map(([t,cnt],i)=>{const len=segLens[t]||0;
                return <div key={t} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:i%2?(S.bg2||S.c1):(S.bg1||S.c2),borderBottom:"1px solid "+S.bd}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}><div style={{width:14,height:4,borderRadius:2,background:LC[t]}}/><span style={{fontSize:12,color:S.td||S.t2}}>{LL[t]}</span></div>
                  <span style={{fontSize:11,fontFamily:"monospace",color:S.tm,width:40,textAlign:"right"}}>{(len/10).toFixed(0)}cm</span>
                  <span style={{fontSize:11,fontFamily:"monospace",color:S.tm,width:30,textAlign:"right"}}>{totalCutLen?(len/totalCutLen*100).toFixed(0):0}%</span>
                  <span style={{fontSize:13,fontWeight:700,fontFamily:"monospace",width:30,textAlign:"right"}}>{cnt}</span></div>})}</div>

            {/* Shipping */}
            <div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>SHIPPING & LOGISTICS</div>
            {(()=>{const pL=1200,pW=1000,pH=1800;const perL=Math.floor(pL/L)*Math.floor(pW/W);const layers=Math.floor(pH/H);
              return <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                {[["Per Pallet","~"+(perL*layers)],["Per Layer",perL],["Layers",layers]].map(([l,v])=>
                  <div key={l} style={{flex:1,padding:8,borderRadius:10,background:S.bg2||S.c1,border:"1px solid "+S.bd,textAlign:"center"}}>
                    <div style={{fontSize:9,color:S.tm}}>{l}</div><div style={{fontSize:14,fontWeight:800,fontFamily:"monospace"}}>{v}</div></div>)}</div>})()}

            {/* Blade + Finishes */}
            <div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>BLADE CONFIG</div>
            <div style={{display:"flex",gap:6,marginBottom:12}}>
              {[["Type",bt2],["Kerf",bk+"mm"],["Angle",ba+"°"]].map(([l,v])=>
                <div key={l} style={{flex:1,padding:8,borderRadius:10,background:S.bg2||S.c1,border:"1px solid "+S.bd,textAlign:"center"}}>
                  <div style={{fontSize:9,color:S.tm}}>{l}</div><div style={{fontSize:13,fontWeight:700,fontFamily:"monospace",color:S.or||S.ac}}>{v}</div></div>)}</div>
            {selFins.length>0&&<><div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>FINISHES ({selFins.length})</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                {selFins.map(fid=>{const f=FINS.find(x=>x.id===fid);return f?<span key={fid} style={{fontSize:12,padding:"6px 12px",borderRadius:8,background:S.bg2||S.c1,border:"1px solid "+S.bd}}>{f.name}</span>:null})}</div></>}
          </>}

          {specView==="struct"&&<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontWeight:800,fontSize:20,color:S.ac}}>Structural Analysis</div>
              {bctData&&<button onClick={()=>doExport("struct-pdf")} style={{padding:"8px 12px",borderRadius:10,background:(S.rd||"#ef4444")+"22",color:S.rd,border:"none",fontSize:12,fontWeight:700,flexShrink:0}}>📄 PDF</button>}</div>

            {bctData?<>
              {/* Key metrics */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                {[["BCT (McKee)",bctData.bct+" N"],["Safe Load (65%)",bctData.safeLoad+" N"],["ECT",bctData.ect+" kN/m"],["Stack Height","~"+bctData.stackHeight+" boxes"]].map(([l,v])=>
                  <div key={l} style={{padding:16,borderRadius:14,background:S.bg2||S.c1,border:"1px solid "+S.bd,textAlign:"center"}}>
                    <div style={{fontSize:10,color:S.tm}}>{l}</div>
                    <div style={{fontSize:24,fontWeight:900,fontFamily:"monospace",color:S.gn,marginTop:4}}>{v}</div></div>)}</div>

              {/* McKee formula */}
              <div style={{padding:16,borderRadius:14,background:S.bg2||S.c1,border:"1px solid "+S.bd,marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:800,color:S.tm,marginBottom:6}}>McKee Formula</div>
                <div style={{fontSize:16,fontFamily:"monospace",color:S.ac,fontWeight:700,marginBottom:8}}>BCT = 5.87 × ECT × √(Z × P)</div>
                <div style={{fontSize:12,color:S.tf||S.tm,lineHeight:1.8}}>
                  ECT = {bctData.ect} kN/m ({mat?.name})<br/>
                  Z = {mT}mm (caliper)<br/>
                  P = {(2*(L+W)).toFixed(0)}mm (2×{L} + 2×{W})</div></div>

              {/* Additional metrics */}
              <div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>ADDITIONAL METRICS</div>
              <div style={{display:"flex",gap:6,marginBottom:16}}>
                {[["Burst",((mat?.ect||0)*1.6*mT).toFixed(0)+" kPa"],["Flat Crush",((mat?.ect||0)*0.7).toFixed(1)+" kN/m"],["Board",((2*(L*W+L*H+W*H))/1e4).toFixed(2)+"m²"]].map(([l,v])=>
                  <div key={l} style={{flex:1,padding:10,borderRadius:12,background:S.bg2||S.c1,border:"1px solid "+S.bd,textAlign:"center"}}>
                    <div style={{fontSize:9,color:S.tm}}>{l}</div><div style={{fontSize:14,fontWeight:800,fontFamily:"monospace"}}>{v}</div></div>)}</div>

              {/* Derating factors */}
              <div style={{fontWeight:800,fontSize:11,color:S.tm,marginBottom:6,letterSpacing:2}}>ENVIRONMENTAL DERATING</div>
              <div style={{borderRadius:12,overflow:"hidden",border:"1px solid "+S.bd,marginBottom:16}}>
                {[["Humidity >80% RH","×0.65"],["Storage >30 days","×0.75"],["Transit / vibration","×0.60"],["Pallet overhang","×0.70"],["Print coverage >40%","×0.90"],["Temperature >40°C","×0.85"]].map(([cond,factor],i)=>{
                  const adj=(parseFloat(bctData.safeLoad)*parseFloat(factor.slice(1))).toFixed(0);
                  return <div key={cond} style={{display:"flex",justifyContent:"space-between",padding:"10px 12px",background:i%2?(S.bg2||S.c1):(S.bg1||S.c2),borderBottom:"1px solid "+S.bd}}>
                    <span style={{fontSize:12,color:S.td||S.t2,flex:1}}>{cond}</span>
                    <span style={{fontSize:12,fontWeight:700,color:S.rd,fontFamily:"monospace",width:40,textAlign:"center"}}>{factor}</span>
                    <span style={{fontSize:12,fontFamily:"monospace",color:S.or||S.ac,width:50,textAlign:"right"}}>{adj}N</span></div>})}
                <div style={{display:"flex",justifyContent:"space-between",padding:"10px 12px",background:S.bg3||S.c2,borderTop:"1px solid "+S.bd}}>
                  <span style={{fontSize:12,fontWeight:800,color:S.rd}}>Worst case (all factors)</span>
                  <span style={{fontSize:12,fontWeight:800,fontFamily:"monospace",color:S.rd}}>{(parseFloat(bctData.safeLoad)*0.20).toFixed(0)}N</span></div></div>

              {/* Flute direction */}
              <div style={{padding:14,borderRadius:14,background:S.bg2||S.c1,border:"1px solid "+S.bd,marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:800,color:S.tm,marginBottom:4}}>FLUTE DIRECTION</div>
                <div style={{fontSize:12,color:S.td||S.t2,lineHeight:1.6}}>Flute runs <b>parallel to height</b> (vertical on dieline). This maximizes stacking strength — flute columns resist top-to-bottom compression. Shown as blue arrows on 2D view.</div></div>

              {/* Recommendations */}
              <div style={{padding:14,borderRadius:14,background:S.gn+"11",border:"1px solid "+S.gn+"33",marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:800,color:S.gn,marginBottom:6}}>RECOMMENDATIONS</div>
                <div style={{fontSize:12,color:S.td||S.t2,lineHeight:1.6}}>
                  {parseFloat(bctData.safeLoad)>500?"✓ Good compression for general shipping.":"⚠ Low compression — consider upgrading material."}<br/>
                  {H/Math.min(L,W)>3?"⚠ Tall/narrow — add partition or upgrade to double wall.":"✓ Proportions structurally sound."}<br/>
                  {mT>=3?"✓ Thickness adequate for stacking.":"⚠ Thin material — limit stack height."}<br/>
                  ✓ Store on pallets. Keep RH below 70%.</div></div>
            </>:<div style={{padding:40,textAlign:"center",color:S.tm}}>Select a material to see structural data</div>}
          </>}
        </div>}

        {tab==="more"&&<div style={{flex:1,overflow:"auto",padding:"0 16px 16px",WebkitOverflowScrolling:"touch"}}>
          {/* AI */}
          <div style={{fontWeight:800,fontSize:13,color:S.pu||"#a855f7",marginBottom:8,letterSpacing:1}}>🤖 AI TOOLS</div>
          <input ref={aiFileRef} type="file" accept=".pdf,.png,.jpg,.jpeg" onChange={e=>handleAI(e,"pdf")} style={{display:"none"}}/>
          <input ref={aiImgRef} type="file" accept="image/*" capture="environment" onChange={e=>handleAI(e,"img")} style={{display:"none"}}/>
          <button onClick={()=>aiFileRef.current?.click()} disabled={aiLoading} style={{width:"100%",padding:16,borderRadius:14,background:(S.pu||"#a855f7")+"15",border:"2px solid "+(S.pu||"#a855f7")+"44",marginBottom:8,textAlign:"left"}}>
            <div style={{fontWeight:700,fontSize:15,color:S.pu||"#a855f7"}}>{aiLoading?"⏳ Analyzing...":"📄 Upload Spec Sheet"}</div>
            <div style={{fontSize:12,color:S.tm,marginTop:2}}>PDF/image → AI extracts dimensions</div></button>
          <button onClick={()=>aiImgRef.current?.click()} disabled={aiLoading} style={{width:"100%",padding:16,borderRadius:14,background:(S.pk||"#ec4899")+"15",border:"2px solid "+(S.pk||"#ec4899")+"44",marginBottom:8,textAlign:"left"}}>
            <div style={{fontWeight:700,fontSize:15,color:S.pk||"#ec4899"}}>{aiLoading?"⏳ Classifying...":"📷 Photo a Box"}</div>
            <div style={{fontSize:12,color:S.tm,marginTop:2}}>Camera → FEFCO type + dimensions</div></button>
          {aiResult&&!aiResult.error&&<div style={{padding:14,borderRadius:14,background:S.gn+"15",border:"2px solid "+S.gn+"33",marginBottom:12}}>
            <div style={{fontWeight:700,color:S.gn,marginBottom:6}}>✓ AI Result</div>
            {aiResult.box_type&&<div style={{fontSize:13,color:S.td||S.t2}}>Type: <b style={{color:S.ac}}>{aiResult.box_type}</b></div>}
            <div style={{fontSize:13,color:S.td||S.t2}}>Size: <b>{aiResult.length_mm}×{aiResult.width_mm}×{aiResult.height_mm}mm</b></div>
            <button onClick={()=>{if(aiResult.length_mm>0)setDims({L:Math.round(aiResult.length_mm),W:Math.round(aiResult.width_mm),H:Math.round(aiResult.height_mm)});setTab("design")}}
              style={{width:"100%",marginTop:8,padding:10,borderRadius:10,background:S.gn,border:"none",color:"#fff",fontWeight:700,fontSize:13}}>Apply & Design</button></div>}
          {aiResult?.error&&<div style={{padding:12,borderRadius:12,background:S.rd+"15",marginBottom:12,color:S.rd,fontSize:13}}>Error: {aiResult.error}</div>}

          <div style={{fontWeight:800,fontSize:13,color:S.tm,marginBottom:8,marginTop:12,letterSpacing:1}}>ACTIONS</div>
          {[{i:"💰",l:"Quote Details",d:unitCost?"$"+unitCost+"/unit":"—",f:()=>setSheet("quote")},
            {i:"📊",l:"Structural Analysis",d:bctData?"BCT: "+bctData.bct+"N":"—",f:()=>setSheet("struct")},
            {i:"💾",l:"Save Design",d:saved.length+" saved",f:handleSave},
            {i:"📄",l:"Export Spec PDF",d:"Downloadable report",f:()=>doExport("spec-pdf")},
            {i:"📄",l:"Structural PDF",d:"BCT + derating report",f:()=>doExport("struct-pdf")},
            {i:"🎨",l:"Theme",d:dk?"Dark Mode":"Light Mode",f:()=>setDk(!dk)},
          ].map(x=><button key={x.l} onClick={x.f} style={{display:"flex",alignItems:"center",gap:14,padding:16,borderRadius:16,background:S.bg2||S.c1,border:"1px solid "+S.bd,width:"100%",marginBottom:8,textAlign:"left"}}>
            <span style={{fontSize:22}}>{x.i}</span>
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15,color:S.tx}}>{x.l}</div><div style={{fontSize:12,color:S.tm}}>{x.d}</div></div>
            <span style={{color:S.tm,fontSize:20}}>›</span></button>)}
          {saved.length>0&&<><div style={{fontWeight:800,fontSize:13,color:S.tm,marginBottom:8,marginTop:8,letterSpacing:1}}>SAVED DESIGNS</div>
            {saved.map(d=><div key={d.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:12,borderRadius:12,background:S.bg2||S.c1,border:"1px solid "+S.bd,marginBottom:6}}>
              <button onClick={()=>{setBoxId(d.boxType||"0201");setDims(d.dims||{L:300,W:200,H:150});setMatId(d.matId||"B");setTab("design")}} style={{background:"none",border:"none",textAlign:"left",color:S.tx,flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:S.ac}}>{d.name}</div>
                <div style={{fontSize:11,color:S.tm}}>{new Date(d.ts).toLocaleDateString()}</div></button>
              <button onClick={async()=>{await deleteDesign(d.key);setSaved(await loadDesigns())}} style={{color:S.rd,background:"none",border:"none",fontSize:16,padding:8}}>✕</button></div>)}</>}
        </div>}
      </div>

      {/* Bottom Tab Bar */}
      <div style={{display:"flex",background:dk?"rgba(10,15,26,.92)":"rgba(248,250,252,.92)",borderTop:"1px solid "+S.bd,
        backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",flexShrink:0,paddingBottom:"max(4px,env(safe-area-inset-bottom))"}}>
        {[{id:"design",i:"✏️",l:"Design"},{id:"preview",i:"👁",l:"Preview"},{id:"specs",i:"📋",l:"Specs"},{id:"more",i:"⚙️",l:"More"}].map(t=>
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"10px 0 6px",background:"none",border:"none",color:tab===t.id?S.ac:(S.tm||S.t3)}}>
            <span style={{fontSize:24}}>{t.i}</span><span style={{fontSize:10,fontWeight:tab===t.id?800:500}}>{t.l}</span></button>)}</div>

      {/* Sheet Modals */}
      {sheet==="export"&&<Sheet title="Export Dieline" onClose={()=>setSheet(null)} t={S}>
        {[{f:"dxf",i:"📐",l:"DXF File",d:"CAD & die-cutting machines"},{f:"svg",i:"🖼",l:"SVG Vector",d:"Review & print"},
          {f:"cff2",i:"⚙️",l:"CFF2 (Packaging)",d:"Die-cutter polyline format"},{f:"pdf",i:"🖨",l:"Print SVG + Marks",d:"Crop, registration, bleed"}].map(x=>
          <button key={x.f} onClick={()=>{doExport(x.f);setSheet(null)}} style={{display:"flex",alignItems:"center",gap:16,padding:18,borderRadius:16,background:S.bg3||S.c2,border:"1px solid "+S.bd,width:"100%",marginBottom:10,textAlign:"left"}}>
            <span style={{fontSize:28}}>{x.i}</span><div><div style={{fontWeight:700,fontSize:16,color:S.tx}}>{x.l}</div><div style={{fontSize:12,color:S.tm}}>{x.d}</div></div></button>)}
      </Sheet>}

      {sheet==="quote"&&<Sheet title="Quick Quote" onClose={()=>setSheet(null)} t={S}>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:S.tm,marginBottom:8}}>QUANTITY</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
            {[100,250,500,1000,2500,5000,10000,25000,50000,100000].map(q=>
              <button key={q} onClick={()=>setQty(q)} style={{padding:"10px 0",flex:"1 1 22%",borderRadius:10,
                background:qty===q?S.ac+"25":(S.bg3||S.c2),border:qty===q?"2px solid "+S.ac:"2px solid "+S.bd,
                color:qty===q?S.ac:(S.td||S.t2),fontSize:12,fontWeight:qty===q?800:600,fontFamily:"monospace"}}>
                {q>=1000?(q/1000)+"K":q}</button>)}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,color:S.tm}}>Custom:</span>
            <input type="number" value={qty} onChange={e=>setQty(Math.max(1,parseInt(e.target.value)||1000))}
              style={{flex:1,borderRadius:10,padding:"10px 12px",background:S.bg2||S.c1,border:"1px solid "+S.bd,color:S.tx,fontSize:16,fontFamily:"monospace",textAlign:"center",outline:"none"}}/>
            <span style={{fontSize:12,color:S.tm}}>units</span>
          </div>
        </div>
        {quote?<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[["Unit Cost","$"+quote.unitCost],["Per "+qty.toLocaleString(),"$"+quote.per1k],["Weight",quote.weight+"g"],["Sheet",quote.sheetArea+"cm²"],["Die Saved","$"+(0.75*qty/1000).toFixed(0)],["Material",mat?.name]].map(([l,v])=>
            <div key={l} style={{padding:16,borderRadius:14,background:S.bg2||S.c1,textAlign:"center"}}>
              <div style={{fontSize:11,color:S.tm}}>{l}</div><div style={{fontSize:20,fontWeight:800,color:S.gn,fontFamily:"monospace",marginTop:4}}>{v}</div></div>)}
        </div>:<div style={{textAlign:"center",color:S.tm,padding:20}}>Generate a design first</div>}
      </Sheet>}

      {sheet==="struct"&&<Sheet title="Structural Analysis" onClose={()=>setSheet(null)} t={S}>
        {bctData?<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {[["BCT",bctData.bct+"N"],["Safe Load",bctData.safeLoad+"N"],["ECT",bctData.ect+"kN/m"],["Stack",bctData.stackHeight+" boxes"]].map(([l,v])=>
              <div key={l} style={{padding:16,borderRadius:14,background:S.bg2||S.c1,textAlign:"center"}}>
                <div style={{fontSize:11,color:S.tm}}>{l}</div><div style={{fontSize:22,fontWeight:900,color:S.gn,fontFamily:"monospace",marginTop:4}}>{v}</div></div>)}</div>
          <div style={{fontWeight:800,fontSize:13,color:S.tm,marginBottom:8}}>DERATING FACTORS</div>
          {[["Humidity >80%","×0.65"],["Storage >30d","×0.75"],["Transit","×0.60"],["Overhang","×0.70"],["Print >40%","×0.90"],["Temp >40°C","×0.85"]].map(([c,f],i)=>
            <div key={c} style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:i%2?(S.bg2||S.c1):(S.bg1||S.c2),borderBottom:"1px solid "+S.bd}}>
              <span style={{fontSize:13,color:S.td||S.t2}}>{c}</span>
              <div style={{display:"flex",gap:12}}><span style={{fontSize:13,fontWeight:700,color:S.rd,fontFamily:"monospace"}}>{f}</span>
                <span style={{fontSize:13,fontFamily:"monospace",color:S.or||S.ac}}>{(parseFloat(bctData.safeLoad)*parseFloat(f.slice(1))).toFixed(0)}N</span></div></div>)}
          <button onClick={()=>{doExport("struct-pdf");setSheet(null)}} style={{width:"100%",marginTop:16,padding:14,borderRadius:12,background:S.rd+"22",border:"none",color:S.rd,fontWeight:700,fontSize:14}}>📄 Download Full Report PDF</button>
        </>:<div style={{textAlign:"center",color:S.tm,padding:20}}>Select a material first</div>}
      </Sheet>}
    </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
